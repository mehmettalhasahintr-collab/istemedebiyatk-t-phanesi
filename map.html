    "Tokat": {
    base: { img: "", txt: "Tokat, Yeşilırmak’ın suladığı bereketli ovaların üzerine kurulu, Selçuklu’dan Osmanlı’ya her köşesi bir tarih kitabı gibi işlenmiş kadim bir medeniyet merkezidir. Edebiyatımızda 'estetik', 'zenaat' ve 'dingin bilgelik'in sembolüdür. Tokat edebiyatı; Ballıca Mağarası’nın masalsı derinliğinden, yazmacı ustalarının el emeği desenlerine ve Mevlevihane’den yükselen ney seslerine uzanan çok renkli bir kütüphanedir." },
    p1: { img: "", txt: "Tokat’ın edebi kimliği, her şeyden önce bir 'Şehzadeler ve Alimler Şehri' olmasıyla şekillenmiştir. Mevlana’nın bu şehre olan muhabbeti, Tokat edebiyatına tasavvufi bir derinlik ve hoşgörü kazandırmıştır. Tarihi sokaklarda yürürken, Gökmedrese’nin çinilerindeki şiirsel nizamı veya Taşhan’ın vakur sessizliğini duyarsınız. Burası, kelimelerin bir hattat titizliğiyle yazıldığı ve ilmin sanatla kucaklaştığı bilge bir şehirdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Yazmacılık' ve 'Bakırcılık' gibi zenaatlar, yazarlar için sabrın ve emeğin en büyük metaforlarıdır. Ihlamur baskıların kumaşa bıraktığı o eşsiz izler gibi, Tokatlı şairler de Anadolu’nun ruhuna silinmez mısralar bırakmışlardır. Yeşilırmak kıyısında kurulan hayaller, nehrin sakin akışı gibi duru ve bereketli bir anlatı diline dönüşür. Tokat, geleneksel yaşamın en zarif detaylarını modern edebiyatın sayfalarına taşır." },
    p2_back: { img: "", txt: "Tokat edebiyatı aynı zamanda 'Plevne Kahramanı' Gazi Osman Paşa ile simgeleşen bir kahramanlık ve vatanseverlik edebiyatıdır. 'Tuna Nehri Akmam Diyor' marşının ruhu, Tokat’ın sokaklarında bir gurur nişanesi olarak yankılanır. Öte yandan, kentin meşhur mutfağı ve bağ yaprağı etrafında dönen sosyal hikayeler; yerel halkın misafirperverliğini ve neşesini yansıtan en samimi metinlerdir. Kütüphanemiz, tarihin heybetiyle günlük hayatın sıcaklığını aynı kapakta birleştirir." },
    p3_front: { img: "", txt: "Modern dönemde Tokat; üniversitesi, restorasyonu tamamlanan tarihi mahalleleri ve edebiyat günleriyle Anadolu’nun kültürel uyanışına öncülük etmektedir. Şehir, tarihi dokuyu koruyarak geleceğe uzanan bir köprü gibidir. Modern Tokat edebiyatı, kentin 'açık hava müzesi' ruhunu korurken, modern insanın içsel yolculuğunu bu kadim dekorun önünde sorgulayan yeni ve özgün bir ses geliştirmektedir." },
    p3_back: { img: "", txt: "Bugün Tokat; Türkiye’nin en görkemli Mevlevihanelerinden birine, gizemli kalesine ve tarihi kütüphanelerine ev sahipliği yapar. Sulusokak’ın bin yıllık atmosferinde veya Yeşilırmak kıyısında bir kitap okumak, zamanın hem ne kadar hızlı aktığını hem de taşlarda nasıl ölümsüzleştiğini hissetmek demektir. Tokat’ın kütüphanesini açmak; tarihin 900 yıllık adımlarını takip etmek, bir ustanın emeğine ortak olmak ve Anadolu’nun bu en vakur, en zarif hikayesini okumaktır." }
},
    "Trabzon": {
    base: { img: "", txt: "Trabzon, İpek Yolu’nun denize açıldığı, binlerce yıllık liman kenti kimliğiyle Karadeniz’in hem zihni hem de yüreği olan kadim bir metropoldür. Edebiyatımızda 'tutku', 'kararlılık' ve 'melankolik bir coşku'nun sembolüdür. Trabzon edebiyatı; Sümela’nın sisli yamaçlarından yükselen mistik havadan, Bedri Rahmi’nin 'Karadut' tadındaki mısralarına ve balıkçıların denizle olan amansız kavgasına uzanan devasa bir kütüphanedir." },
    p1: { img: "", txt: "Trabzon’un edebi kimliği, Karadeniz’in karakterini en saf haliyle yansıtır. Şehir; Bedri Rahmi Eyüboğlu gibi hem kalemiyle hem fırçasıyla Anadolu’yu dünyaya anlatan dev isimlerin ocağıdır. Trabzon edebiyatı denince akla sadece yazı gelmez; renkler, desenler ve o meşhur 'mavi ile yeşilin kavgası' gelir. Burası, kelimelerin hırçın dalgalar gibi kıyıya vurduğu, mısraların ise birer yelkenli gibi uzağa, hep en uzağa gitmek istediği özgür ruhlu bir şehirdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Sümela Manastırı' ve 'Trabzon Kalesi' gibi yapılar, tarihin ve inancın sessiz anlatıcılarıdır. Bu tarihi mekanlar, pek çok yazarın eserinde gizemli, epik ve zaman ötesi kurguların odağı olmuştur. Karadeniz’in değişken ruh hali; yazarların kalemine bir an neşeli bir horon, bir an ise sislerin içinde kaybolmuş yanık bir tulum sesi olarak yansır. Trabzon, coğrafyanın edebiyatı bizzat dikte ettiği, her sokağın kendi öyküsünü bağırdığı bir şehirdir." },
    p2_back: { img: "", txt: "Trabzon edebiyatı aynı zamanda bir 'liman ve ticaret' kültürü edebiyatıdır. Farklı milletlerin ve kültürlerin yüzyıllarca harmanlandığı bu şehirde, çok seslilik en büyük zenginliktir. Ganita’nın akşamüstü sohbetleri, Uzun Sokak’ın devinimi ve bordo-mavi renklerin yarattığı toplumsal aidiyet; Trabzon’un sosyal hafızasının temel taşlarıdır. Kütüphanemiz, denize açılan pencerelerden dökülen şiirler ve gurbete gidenlerin arkasından yakılan o meşhur Karadeniz ağıtlarıyla doludur." },
    p3_front: { img: "", txt: "Modern dönemde Trabzon; üniversitesi, köklü tiyatro geleneği ve yerel basın gücüyle Karadeniz’in entelektüel lokomotifi olmaya devam etmektedir. Şehir, son yıllarda yetişen romancılar ve düşünürlerle, Karadeniz insanının o çok boyutlu ve bazen de çatışmalı iç dünyasını modern edebiyatın süzgecinden geçirerek sunmaktadır. Trabzon, yerel ağzın sıcaklığını evrensel kurguların derinliğiyle birleştiren, Türkiye’nin en dinamik edebi merkezlerinden biridir." },
    p3_back: { img: "", txt: "Bugün Trabzon; Atatürk Köşk’ündeki huzuru, Boztepe’den denizi kucaklayan manzarası ve tarihi kütüphaneleriyle bir kültür kalesidir. Ganita’da çayınızı yudumlarken bir kitap okumak, denizin sesini kelimelere fon müziği yapmak demektir. Trabzon’un kütüphanesini açmak; hırçın dalgalarla baş etmeyi öğrenmek, bir ressamın gözüyle doğaya bakmak ve Anadolu’nun bu en vakur, en tutkulu ve en köklü hikayesini bordo-mavi bir aşkla okumaktır." }
},
   "Tunceli": {
    base: { img: "", txt: "Tunceli, Munzur Dağları’nın heybetli gölgesinde, her biri birer kutsal durak olan vadileri ve hür akan sularıyla Anadolu’nun mistik kalbidir. Edebiyatımızda 'direniş', 'kadim inanç' ve 'doğaya sarsılmaz bağlılık'ın sembolüdür. Tunceli edebiyatı; Munzur Baba efsanesinden yükselen kutsiyetten, binlerce yıllık sözlü gelenekten süzülen deyişlere ve yüksek rakımlı yaylaların hür nefesine uzanan derin bir kütüphanedir." },
    p1: { img: "", txt: "Tunceli’nin edebi kimliği, her şeyden önce doğanın kutsandığı bir 'Doğa Edebiyatı'dır. Munzur Çayı sadece bir su değil, üzerine yemin edilen bir canlıdır. Bu coğrafyada dağlar, nehirler ve yaşlı ağaçlar birer edebi karakterdir. Şehir; her taşın bir hikayesi, her vadinin bir sırrı olduğuna inanan bilge bir anlatı geleneğine sahiptir. Tunceli, kelimelerin suyun şırıltısıyla yarıştığı, mısraların ise kartalların kanadında yükseldiği efsunlu bir şehirdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda inanç ve sözlü kültür ayrılmaz bir bütündür. Alevi-Bektaşi geleneğinin en duru haliyle yaşandığı bu topraklarda, deyişler ve düaz-ı imamlar edebiyatın temel taşlarıdır. Tunceli edebiyatı, haksızlığa karşı duran bir çığlık olduğu kadar, en derin yaraları saran lirik bir ağıttır. Cem evlerinde ve ziyaretgahların başında anlatılan menkıbeler, bu kütüphanenin en kıymetli ve dokunulmaz sayfalarını oluşturur." },
    p2_back: { img: "", txt: "Tunceli edebiyatı aynı zamanda bir 'toplumsal hafıza' edebiyatıdır. Acının ve göçün harmanlandığı bu topraklarda, anlatılan her hikaye aslında bir varoluş mücadelesidir. Şehrin yerel ağzındaki o keskin zeka ve derin ironi, hikaye anlatıcılığına benzersiz bir tat katar. Kütüphanemiz, Munzur’un soğuk suları gibi berrak, dağ çiçekleri gibi kırılgan ama bir o kadar da dirençli insan öyküleriyle doludur." },
    p3_front: { img: "", txt: "Modern dönemde Tunceli; eğitim seviyesinin yüksekliğiyle orantılı olarak Türkiye’nin en üretken edebi merkezlerinden biri haline gelmiştir. Şehir, son yıllarda yetişen pek çok yazar ve şairle, yerel mitolojiyi modern anlatım teknikleriyle birleştirerek evrensel bir ses yakalamıştır. Munzur Gözeleri’nden süzülen kadim bilgelik, bugün modern romanların ve deneysel şiirlerin en güçlü esin kaynağı olmaya devam etmektedir." },
    p3_back: { img: "", txt: "Bugün Tunceli; Munzur Festivali’ndeki coşkusu, yeni açılan kütüphaneleri ve doğayla barışık yaşam tarzıyla bir huzur limanıdır. Munzur Vadisi’nde, suyun sesine karışan bir kitap okumak, evrenin ritmine ortak olmak demektir. Tunceli’nin kütüphanesini açmak; doğaya saygı duymayı öğrenmek, kadim efsanelerin izini sürmek ve Anadolu’nun bu en asi ama en merhametli, en dürüst hikayesini okumaktır." }
},
    "Sanliurfa": {
    base: { img: "", txt: "Şanlıurfa, Mezopotamya’nın bereketli hilalinde yer alan, insanlık tarihinin yeniden yazıldığı 'Peygamberler Şehri'dir. Edebiyatımızda 'inanç', 'kadim gelenek' ve 'sabır'ın sembolüdür. Urfa edebiyatı; Göbeklitepe’nin 12 bin yıllık sırlarından, Balıklıgöl’ün mucizevi hikayesine ve Harran’ın kadim felsefesine uzanan, her satırı tarih ve mistisizm kokan bir kütüphanedir." },
    p1: { img: "", txt: "Urfa’nın edebi kimliği, kutsal anlatılarla ve peygamberler tarihiyle iç içedir. Hz. İbrahim’in Nemrut’a karşı duruşu ve ateşin suya dönüşmesi, Türk edebiyatında ilahi adaletin ve sabrın en güçlü imgesi olmuştur. Şehir, sadece bir yerleşim yeri değil; kelimelerin dua gibi okunduğu, hikayelerin ise kutsal birer emanet gibi nesilden nesile aktarıldığı manevi bir duraktır. Urfa, edebiyatın kalbiyle inancın ruhunun birleştiği yerdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Sıra Geceleri' ve 'Hoyratlar' eşsiz bir yere sahiptir. Sözlü edebiyatın en canlı haliyle yaşandığı bu gecelerde, müzik ve şiir birbirine karışır. Urfa hoyratları, insan ruhunun en derin acılarını ve en yüce sevinçlerini kısa ama sarsıcı mısralarla anlatır. Burası, edebiyatın sadece kitaplarda değil, bir fincan mırranın buğusunda ve bir udun telinde yaşadığı, sesin söze galip geldiği büyüleyici bir coğrafyadır." },
    p2_back: { img: "", txt: "Urfa edebiyatı aynı zamanda bir 'toprak ve Harran' anlatısıdır. Dünyanın ilk üniversitelerinden birine ev sahipliği yapan Harran, astronomi ve felsefenin bu topraklardaki edebi kökenidir. Külah evlerin gölgesinde anlatılan masallar, Fırat’ın kıyısında yükselen Halfeti’nin hüzünlü siyah gülü ve pamuk tarlalarındaki emeğin destanı; şehrin sosyal hafızasını oluşturur. Kütüphanemiz, tarihin başlangıcına şahitlik eden kadim sayfalar ve yanık gönüllerin sesiyle bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Şanlıurfa; Göbeklitepe’nin keşfiyle birlikte dünya edebiyatının ve arkeolojik kurguların odak noktası haline gelmiştir. Şehir, 'tarihin sıfır noktası' olarak modern yazarlara zaman ve varoluş üzerine yeni perspektifler sunar. Yerel yazarların kaleminden çıkan metinler, geleneksel yaşamın zorluklarını ve güzelliklerini, modern dünyanın hızıyla çarpıştıran derinlikli analizler ve özgün imgeler barındırır." },
    p3_back: { img: "", txt: "Bugün Şanlıurfa; Balıklıgöl’deki huzuru, tarihi çarşılarındaki hareketliliği ve yeni açılan modern kütüphaneleriyle bir kültür vahasıdır. Harran’ın kadim kalıntılarında veya bir mağara kafede közde kahve eşliğinde kitap okumak, binlerce yıllık bir zaman yolculuğuna çıkmak demektir. Şanlıurfa’nın kütüphanesini açmak; tarihin köklerine inmek, efsanelerin gerçekliğine inanmak ve Anadolu’nun bu en sıcak, en bilge hikayesini bir hoyratın içli sesinden dinlemektir." }
},
    "Usak": {
    base: { img: "", txt: "Uşak, Ege ile İç Anadolu’nun kesiştiği noktada, 'Aşıklar Diyarı' olarak bilinen, Türkiye’nin ilk sanayi hamlelerine tanıklık etmiş çalışkan bir şehirdir. Edebiyatımızda 'yenilik', 'emek' ve 'kadim gizem'in sembolüdür. Uşak edebiyatı; dünyanın en zengin hazinelerinden biri olan Karun’un efsanevi zenginliğinden, dünyanın en derin kanyonlarından biri olan Ulubey’in vahşi doğasına ve dokunan her halının ilmiğindeki sabra uzanan bir kütüphanedir." },
    p1: { img: "", txt: "Uşak’ın edebi kimliği, her şeyden önce Cumhuriyet’in kuruluş ruhuyla şekillenmiştir. Türkiye’nin ilk şeker fabrikasının burada kurulması, şehri edebiyatımızda 'kalkınmanın ve modernleşmenin' simgesi haline getirmiştir. Uşak, mısraların bir fabrika çarkı gibi tıkır tıkır işlediği, metinlerin ise bir milletin kendi küllerinden doğuşunu anlattığı umut dolu bir şehirdir. Burası, kelimelerin emekle ve üretimle değer kazandığı bir düşünce ocağıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Karun Hazineleri' ve antik dönem hikayeleri büyük bir yer tutar. Kanatlı Denizatı Broşu gibi eşsiz eserler, yerel yazarlar için görkem, hırs ve zamanın geçiciliği üzerine kurulan metaforların kaynağıdır. Öte yandan, Uşak’ın dünyaca ünlü halıları, edebiyatın 'ilmek ilmek işlenmesi' kavramının ete kemiğe bürünmüş halidir. Bir Uşak halısındaki her motif, bu toprakların aslında yazılmamış birer şiiri, okunmamış birer hikayesidir." },
    p2_back: { img: "", txt: "Uşak edebiyatı aynı zamanda 'Cirit' oyununun yiğitliği ve 'Tarhana'nın sıcaklığı etrafında dönen samimi bir halk edebiyatıdır. Ege’nin o yumuşak ama İç Anadolu’nun o mert karakterini taşıyan insan hikayeleri, şehrin sosyal hafızasının temelidir. 'Aşıklar Diyarı' unvanına yakışır şekilde, köylerinde hala yankılanan halk ozanlarının deyişleri ve yerel ağızdaki o bilgece şakalar; kütüphanemizin en renkli ve en içten sayfalarını oluşturur." },
    p3_front: { img: "", txt: "Modern dönemde Uşak; üniversitesi ve hızla gelişen kültürel alanlarıyla, Anadolu’nun 'sessiz ama derinden' giden entelektüel duraklarından biridir. Şehir, Ulubey Kanyonu’nun sunduğu o muazzam perspektif gibi, geniş bir vizyonla geçmişi ve geleceği harmanlayan yeni nesil kalemlere ilham vermektedir. Modern Uşak edebiyatı, kentsel dönüşümün ve değişen Anadolu insanının iç dünyasını incelikle işleyen metinler sunar." },
    p3_back: { img: "", txt: "Bugün Uşak; Arkeoloji Müzesi’ndeki altın parıltıları, tarihi kütüphaneleri ve restore edilen eski Uşak evleriyle keşfedilmeyi bekleyen bir hazinedir. Ulubey Kanyonu’nda cam terastan boşluğa bakarken bir kitap okumak, doğanın büyüklüğü ve tarihin derinliği karşısında kelimelerin gücünü hissetmek demektir. Uşak’ın kütüphanesini açmak; emeğin kutsallığını anlamak, Karun’un sırrına ortak olmak ve Anadolu’nun bu 'ilkler şehrinin' azimli hikayesini okumaktır." }
},
    "Van": {
    base: { img: "", txt: "Van, Doğu Anadolu’nun en görkemli coğrafyasında, Urartu başkentinden bugüne uzanan bir 'Güneş Şehri'dir. Edebiyatımızda 'destan', 'hasret' ve 'suyun mucizesi'nin sembolüdür. Van edebiyatı; Akdamar Kilisesi’nin taşlarına kazınan efsanelerden, Van Kalesi’nin surlarında yankılanan savaş ve barış öykülerine, gölün sodalı sularında saklı olan o mistik derinliğe kadar uzanan zengin bir kütüphanedir." },
    p1: { img: "", txt: "Van’ın edebi ruhu, efsanelerle beslenen derin bir kurgu yeteneğine sahiptir. Tamara ile bir gencin imkansız aşkını anlatan 'Ah Tamara' efsanesi, bu toprakların en lirik ve en hüzünlü sayfasını oluşturur. Şehir, sadece tarihiyle değil, aynı zamanda Yaşar Kemal’in 'Karıncanın Su İçtiği' gibi eserlerinde tasvir ettiği o devasa göl ekosistemi ve insan manzaralarıyla Türk edebiyatında silinmez bir yer edinmiştir. Van, mısraların dalgalarla şekillendiği bir hayal coğrafyasıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Urartu mirası, bir 'taş yazıt' estetiği olarak varlığını hissettirir. Dünyanın en eski kanalizasyon ve sulama sistemlerine sahip olan bu antik zeka, Van edebiyatına 'kalıcılık' ve 'mühendislik dehası' metaforlarını kazandırmıştır. Öte yandan, kentin sembolü olan kehribar gözlü Van kedileri ve inci kefalinin suyun akışına karşı verdiği o destansı mücadele, yerel yazarlar için yaşam azminin ve sadakatin en güçlü temsilleridir." },
    p2_back: { img: "", txt: "Van edebiyatı aynı zamanda bir 'kültürel kavşak' anlatısıdır. İpek Yolu üzerindeki konumuyla farklı medeniyetlerin hikayelerini biriktiren şehir; Erçek Gölü’nün sessizliğinden, Muradiye Şelalesi’nin gürültüsüne kadar her sesi edebi bir tona büründürür. Kütüphanemiz, Van Kalesi’nin zirvesinden batan güneşin turuncusuna boyanmış, içinde hem kadim Mezopotamya’nın hem de sert Kafkas rüzgarlarının hatıralarını taşıyan sayfalarla doludur." },
    p3_front: { img: "", txt: "Modern dönemde Van; üniversitesi, düzenlenen Van Denizi Kitap Fuarı ve gelişen sanat galerileriyle Doğu’nun kültürel başkenti konumunu pekiştirmiştir. Şehir, göçün ve değişimin getirdiği toplumsal dönüşümleri, geleneksel 'Van Evleri'nin sıcaklığıyla modern kent yaşamının soğukluğu arasındaki dengeyi işleyen yeni kuşak yazarlara ilham vermektedir. Van’ın modern sesi, geçmişin destansı dilini bugünün gerçekçi anlatısıyla harmanlar." },
    p3_back: { img: "", txt: "Bugün Van; kalesi, Akdamar Adası’ndaki badem ağaçları ve dünyaca ünlü kahvaltı sofralarının etrafında dönen o sıcak sohbetlerle yaşayan bir kültür hazinesidir. Van Denizi’nin kıyısında, güneşin batışına karşı bir kitap okumak, zamanın ötesindeki bir krallığın hikayesine ortak olmak demektir. Van’ın kütüphanesini açmak; güneşin doğuşuna şahitlik etmek, bir inci kefali gibi akıntıya karşı yüzmek ve Anadolu’nun bu en görkemli hikayesini masmavi bir ufka bakarak okumaktır." }
},
    "Yozgat": {
    base: { img: "", txt: "Yozgat, İç Anadolu’nun kalbinde, Türkiye’nin ilk milli parkı olan Çamlık’ın eteklerinde kurulu, geleneklerine bağlılığın ve bozkır vakarının şehridir. Edebiyatımızda 'bozkır', 'yalnızlık' ve 'direnç'in sembolüdür. Yozgat edebiyatı; Abbas Sayar’ın toprağa ve hayata dair sert gerçekçiliğinden, Sürmeli’nin hüzünlü tınısına ve Saat Kulesi’nin zamanı durduran tanıklığına uzanan vakur bir kütüphanedir." },
    p1: { img: "", txt: "Yozgat’ın edebi kimliği denince akla gelen ilk isim, Türk edebiyatının bozkırı en iyi anlatan kalemlerinden Abbas Sayar’dır. Onun 'Yılkı Atı' romanı, sadece bir hayvanın hikayesi değil; doğanın sertliği karşısında insanın ve yaşamın hayatta kalma mücadelesidir. Yozgat sokaklarında ve köylerinde edebiyat; tarladaki çatlaktan, kerpiç duvarın serinliğinden ve rüzgarın savurduğu tozun içinden süzülüp gelir. Burası, kelimelerin toprak koktuğu bir edebiyat durağıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Sürmeli' türküsü ve 'Çapanoğlu' mirası sarsılmaz bir yere sahiptir. 'Yozgat Sürmelisi', Anadolu insanının sevdasını ve gurbet acısını anlatan en derin edebi metinlerden biri kabul edilir. Öte yandan, Çapanoğlu Camii’nin zarafeti, şehrin köklü aile yapısını ve kültürel birikimini yansıtan sessiz bir anlatıcıdır. Yozgat edebiyatı, dışarıdan bakıldığında sert görünen ama içinde uçsuz bucaksız bir gönül zenginliği barındıran bir hikayedir." },
    p2_back: { img: "", txt: "Yozgat edebiyatı aynı zamanda bir 'kış ve sabır' edebiyatıdır. Bozkırın dondurucu soğuğunda, soba başında anlatılan masallar ve 'Arabaşı' sofralarında pekişen dostluklar; şehrin sözlü kültürünün ana damarıdır. Hayatın tüm zorluklarına rağmen eksilmeyen o mizah duygusu ve kendine has Yozgat şivesi, yerel hikayelere benzersiz bir samimiyet katar. Kütüphanemiz, kıraç toprakların arasından fışkıran çiğdemler gibi umut dolu ve dürüst mısralarla bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Yozgat; üniversitesi ve yetiştirdiği akademisyenlerle Anadolu’nun sessiz güçlerinden biri olmaya devam etmektedir. Şehir, son yıllarda düzenlenen 'Sürmeli Festivali' ve kültürel etkinliklerle kendi öz değerlerini modern sanat formlarıyla buluşturmaktadır. Yozgat’ın genç kalemleri, bozkırın o melankolik yalnızlığını modern insanın şehirdeki yabancılaşmasıyla harmanlayan özgün eserler üretmektedir." },
    p3_back: { img: "", txt: "Bugün Yozgat; Çamlık Milli Parkı’nın asırlık çamları, tarihi Saat Kulesi ve misafirperver insanıyla keşfedilmeyi bekleyen bir Anadolu öyküsüdür. Çamlık’ın serinliğinde, kuş sesleri eşliğinde bir kitap okumak, bozkırın ortasında bir vahada soluklanmak demektir. Yozgat’ın kütüphanesini açmak; sadakatin ve sabrın izini sürmek, toprağın en saf halini dinlemek ve Anadolu’nun bu en yiğit, en yanık hikayesini bir Sürmeli havasıyla okumaktır." }
},
    "Zonguldak": {
    base: { img: "", txt: "Zonguldak, Karadeniz’in hırçın kıyılarında, yerin altındaki 'kara elmas' ile yerin üstündeki yeşilin buluştuğu, Türkiye’nin ilk sanayi şehridir. Edebiyatımızda 'emek', 'dayanışma' ve 'fedakarlık'ın sembolüdür. Zonguldak edebiyatı; maden ocaklarının karanlığından süzülen ışık huzmelerinden, grizu kokulu hüzünlere ve limandaki kömür tozlu rüzgarlara uzanan, alın teriyle yazılmış en sahici kütüphanedir." },
    p1: { img: "", txt: "Zonguldak’ın edebi kimliği, her şeyden önce 'Maden Edebiyatı'dır. Şehir, Türk edebiyatında işçi sınıfının ve emeğin en güçlü temsil edildiği coğrafyadır. Yer altındaki karanlık galerilerde verilen yaşam mücadelesi, yerel ve ulusal yazarların kaleminde epik birer anlatıya dönüşür. Burası, kelimelerin kömürle yoğrulduğu, kağıdın ise madencinin kazma sesiyle titrediği, Anadolu’nun en 'derin' ve en ağırbaşlı edebiyat durağıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Kelebeğin Rüyası'na konu olan şairlerin, Rüştü Onur ve Muzaffer Tayyip Uslu’nun yeri sarsılmazdır. Genç yaşta veremle boğuşurken yazdıkları o ince, narin ve yaşam dolu şiirler, Zonguldak’ın sisli havasına romantik bir hüzün katar. Onların mısralarında kömür karası, bir aşkın ve yaşama tutunma arzusunun rengine dönüşür. Zonguldak, ölümün gölgesinde hayatın ve şiirin nasıl yeşerdiğini gösteren bir mucize mekanıdır." },
    p2_back: { img: "", txt: "Zonguldak edebiyatı aynı zamanda bir 'liman ve gurbet' edebiyatıdır. Türkiye’nin dört bir yanından rızkını aramak için gelen insanların oluşturduğu çok kültürlü yapı, şehrin sosyal hafızasını zenginleştirmiştir. Maden fenerlerinin aydınlattığı bu hikayeler, limana yanaşan şileplerin düdük sesleriyle dünyaya açılır. Kütüphanemiz, demir çelik fabrikalarının gürültüsünden limandaki dalga sesine kadar, endüstriyel bir estetikle harmanlanmış samimi insan öyküleriyle doludur." },
    p3_front: { img: "", txt: "Modern dönemde Zonguldak; Maden Müzesi, endüstriyel miras projeleri ve üniversitesiyle kültürel bir dönüşüm yaşamaktadır. Şehir, geçmişin ağır işçi edebiyatını, bugün çevre bilinci ve modern kent kültürüyle birleştiren yeni nesil yazarlara ev sahipliği yapar. Filyos’un antik kalıntılarından modern liman tesislerine kadar her köşe, yazarın zihninde geçmişle geleceği birbirine bağlayan sağlam bir köprü oluşturur." },
    p3_back: { img: "", txt: "Bugün Zonguldak; madenci fenerlerinin ışığında aydınlanan caddeleri, Karadeniz’e nazır falezleri ve emek kokan kütüphaneleriyle vakur bir duruş sergiler. Fener Mahallesi’nin tarihi evlerinde veya denizi gören bir bankta kitap okumak, emeğin kutsiyetini ve denizin özgürlüğünü aynı anda solumak demektir. Zonguldak’ın kütüphanesini açmak; yerin altına saygı duymayı öğrenmek, alın terinin şiirini duymak ve Türkiye’nin bu en kara ama en aydınlık hikayesini okumaktır." }
},
    "Aksaray": {
    base: { img: "", txt: "Aksaray, İpek Yolu’nun kalbinde, Kapadokya’nın giriş kapısı olan ve tarih boyunca 'Şehr-i Süleha' (Salihler Şehri) olarak anılan kadim bir duraktır. Edebiyatımızda 'maneviyat', 'yolculuk' ve 'bozkır sabrı'nın sembolüdür. Aksaray edebiyatı; Somuncu Baba’nın tevazu dolu öğretisinden, Hasan Dağı’nın zirvesindeki yalnızlığa ve Ihlara Vadisi’nin kayalara oyulmuş sessiz dualarına uzanan derinlikli bir kütüphanedir." },
    p1: { img: "", txt: "Aksaray’ın edibi ruhunun en önemli taşıyıcısı Somuncu Baba’dır. Onun 'Somunlar müminler!' nidaları, sadece ekmeğin değil, sevginin ve bilginin de paylaşıldığı bir dönemin başlangıcıdır. Şehir, onun manevi mirasıyla yoğrulmuş; edebiyatı ise dünyevi hırslardan arınmış, hikmet arayan bir dile bürünmüştür. Aksaray, kelimelerin bir dervişin hırkası gibi sade ama bir o kadar da sıcak olduğu bir gönül durağıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Yol' ve 'Kervansaray' temaları merkezi bir yer tutar. Sultanhanı gibi devasa yapılar, yüzyıllarca gezginlerin, ozanların ve tacirlerin hikayelerine ev sahipliği yapmıştır. Aksaray edebiyatı, uzak diyarlardan gelen bu farklı seslerin Anadolu bozkırında yankılanmasıdır. Hasan Dağı’nın heybeti ise yerel şairler için ulaşılmaz aşkların, sarsılmaz iradenin ve doğanın insan ruhuna fısıldadığı o büyük yalnızlığın metaforudur." },
    p2_back: { img: "", txt: "Aksaray edebiyatı aynı zamanda bir 'doğa ve inanç' sentezidir. Ihlara Vadisi’nin derinliklerinde saklı kiliseler ve manastırlar, farklı inançların tarihsel metinlerini günümüze taşır. Melendiz Çayı’nın vadideki akışı, hayatın devinimini ve her zorluğun içinden süzülen bir yaşam sevincini simgeler. Kütüphanemiz, bozkırın sarı sıcaklığına inat, vadinin serinliği ve maneviyatın huzuruyla yazılmış bilgece mısralarla bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Aksaray; üniversitesi ve hızla gelişen turizm odağıyla geleneksel mirasını geleceğe taşımaktadır. Şehir, Selçuklu mimarisinin geometrik nizamını modern şiirin yapısal disipliniyle birleştiren yeni nesil yazarlara ilham kaynağı olmaktadır. Bugün Aksaray, tarihi kervansarayları birer kültür merkezine dönüştürerek, geçmişin o hikaye anlatan kervanlarını modern edebiyat festivalleriyle yeniden selamlamaktadır." },
    p3_back: { img: "", txt: "Bugün Aksaray; Eğri Minare’nin (Kızıl Minare) şaşırtıcı duruşu, Somuncu Baba Külliyesi’nin huzuru ve Ihlara’nın doğa harikası yollarıyla yaşayan bir tarihtir. Melendiz kıyısında, kuş sesleri eşliğinde bir kitap okumak, zamanın hem ne kadar hızlı aktığını hem de taşların içinde nasıl ebedileştiğini hissetmek demektir. Aksaray’ın kütüphanesini açmak; bir dervişin sofrasına oturmak, İpek Yolu’nun tozlu hatıralarını okumak ve Anadolu’nun bu en vakur hikayesini bizzat yerinde dinlemektir." }
},
    "Bayburt": {
    base: { img: "", txt: "Bayburt, Çoruh Nehri’nin kıyısında, sarp dağların arasında yükselen, Anadolu’nun en köklü ve en azimli şehirlerinden biridir. Edebiyatımızda 'vakar', 'mizah' ve 'geleneğe sadakat'in sembolüdür. Bayburt edebiyatı; Dede Korkut’un kopuzundan dökülen epik anlatılardan, Bayburtlu Zihnî’nin 'Vardım ki yurdundan ayağ çekilmiş' diyen hüzünlü ve hiciv dolu mısralarına uzanan vakur bir kütüphanedir." },
    p1: { img: "", txt: "Bayburt’un edebi kimliği, her şeyden önce bir 'Ozanlar ve Şairler Ocağı' olmasıyla perçinlenmiştir. Türk halk edebiyatının en büyük ustalarından Bayburtlu Zihnî, şehrin ruhunu hem lirik hem de satirik bir dille ölümsüzleştirmiştir. Onun gurbeti ve memleket hasretini işlediği şiirler, Bayburt’un sosyal hafızasının temelidir. Şehir, kelimelerin bir kılıç gibi keskin, bir bal gibi tatlı olduğu, sözün gücüne inanılan bir edebi kaledir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Dede Korkut' mirası sarsılmaz bir yere sahiptir. Bamsı Beyrek’in hikayesinin geçtiği bu topraklar, Türk dünyasının ortak anlatı kültürünün merkezidir. Bayburt Kalesi’nin (Çinimaçin Kalesi) heybetli surları, pek çok efsaneye ve tarihsel hikayeye dekor olmuştur. Bayburt edebiyatı, geçmişin o destansı dilini, bozkırın sessizliği ve Çoruh’un coşkusuyla birleştirerek benzersiz bir tını yaratır." },
    p2_back: { img: "", txt: "Bayburt edebiyatı aynı zamanda bir 'mizah ve ironi' edebiyatıdır. Bayburt insanının zorluklar karşısındaki kıvrak zekası ve olaylara bakış açısındaki o meşhur nükte, yerel anlatıların can damarıdır. 'Bayburt Bayburt olalı böyle zulüm görmedi' gibi ironik ifadelerle simgeleşen bu bakış açısı, aslında bir yaşam felsefesidir. Kütüphanemiz, sert kış akşamlarında anlatılan masallar ve tandır başında pekişen bilgece sohbetlerle doludur." },
    p3_front: { img: "", txt: "Modern dönemde Bayburt; Baksı Müzesi ve Kenan Yavuz Etnografya Müzesi gibi projelerle, geleneği modern sanat ve edebiyatla buluşturan bir vizyona imza atmıştır. Bu müzeler, yerel hikayelerin nasıl evrensel bir sanat diline dönüşebileceğinin en güzel örnekleridir. Şehir, bugün düzenlenen 'Dede Korkut Şölenleri' ile kadim köklerini modern dünyanın genç kalemleriyle buluşturmaya devam etmektedir." },
    p3_back: { img: "", txt: "Bugün Bayburt; Çoruh Nehri’nin kıyısındaki yürüyüş yolları, kalesi ve taş konaklarıyla bir sükunet adasıdır. Kale’nin tepesinden şehre bakarken bir kitap okumak, tarihin ve doğanın o sarsılmaz dengesine tanıklık etmek demektir. Bayburt’un kütüphanesini açmak; Dede Korkut’un bir hikayesine misafir olmak, Bayburtlu Zihnî ile dertleşmek ve Anadolu’nun bu en küçük ama kalbi en büyük şehriyle tanışmaktır." }
},
    "Karaman": {
    base: { img: "", txt: "Karaman, İç Anadolu’nun güneyinde, Toroslar’ın eteğinde yükselen, Türk dilinin ve kültürünün sarsılmaz kalesi olan bir 'Dil Şehri'dir. Edebiyatımızda 'kimlik', 'özgürlük' ve 'tasavvufi derinlik'in sembolüdür. Karaman edebiyatı; Karamanoğlu Mehmet Bey’in dil devriminden, Yunus Emre’nin gönül diliyle yazdığı şiirlere ve Mevlana’nın bu topraklarda geçen çocukluk hatıralarına uzanan köklü bir kütüphanedir." },
    p1: { img: "", txt: "Karaman’ın edebi kimliği, her şeyden önce Türkçenin resmi dil ilan edildiği o tarihi an ile mühürlenmiştir. 1277 yılında yayımlanan ferman, Türk edebiyatının ve milli benliğin en büyük dönüm noktalarından biridir. Karaman, kelimelerin sadece iletişim aracı değil, bir milletin var oluş mücadelesi olduğu bir yerdir. Burası, her cümlenin altında bir vatan savunması ve her harfin içinde bir bağımsızlık aşkı barındıran edebi bir merkezdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Yunus Emre’nin mezarı ve mirası çok özel bir yere sahiptir. Onun 'Biz gelmedik kavga için, bizim işimiz sevgi için' diyen felsefesi, Karaman edebiyatına insan odaklı ve barışçıl bir ruh katmıştır. Karadağ’ın heybetli duruşu ve antik Binbirkilise kalıntıları, yerel yazarlar için mistik ve tarihsel birer fon oluşturur. Karaman, Anadolu’nun ortasında hem epik bir destan hem de lirik bir ilahidir." },
    p2_back: { img: "", txt: "Karaman edebiyatı aynı zamanda bir 'hoşgörü ve göç' anlatısıdır. Mevlana Celaleddin Rumi’nin ailesiyle birlikte Belh’ten gelip yerleştiği ilk duraklardan biri olması, şehre derin bir entelektüel miras bırakmıştır. Akmedrese’nin taç kapısındaki işçilik gibi, Karamanlı şairlerin mısraları da büyük bir incelikle dokunmuştur. Kütüphanemiz, elma bahçelerinin kokusuyla karışan medrese sessizliği ve Türkçenin en yalın, en saf halleriyle doludur." },
    p3_front: { img: "", txt: "Modern dönemde Karaman; Türk Dil Bayramı kutlamaları, üniversitesi ve gelişen yayıncılık hayatıyla 'Türkçenin Başkenti' unvanını gururla taşımaya devam etmektedir. Şehir, son yıllarda yetişen araştırmacı ve yazarlarla, dil biliminden yerel tarihe kadar geniş bir sahada edebi üretim yapmaktadır. Karaman’ın modern sesi, geleneğin o sarsılmaz köklerine yaslanarak, dijital çağda Türkçenin doğru ve etkili kullanımı için bir pusula görevi görmektedir." },
    p3_back: { img: "", txt: "Bugün Karaman; Karaman Kalesi’nin vakur duruşu, Hatuniye Medresesi’nin estetiği ve elma ağaçlarının gölgesindeki huzuruyla keşfedilmeyi bekleyen bir hazinedir. Türk Dil Bayramı’nda meydanlarda yankılanan Türkçe şiirleri dinlemek, bir milletin ruhuna dokunmak demektir. Karaman’ın kütüphanesini açmak; diline sahip çıkmanın önemini kavramak, Yunus’un gönlünde yıkanmak ve Anadolu’nun bu en asil hikayesini öz Türkçe ile okumaktır." }
},
    "Kirikkale": {
    base: { img: "", txt: "Kırıkkale, Kızılırmak’ın kıyısında, küçük bir köyken Cumhuriyet’in 'fabrika kuran fabrikalar' vizyonuyla modern bir şehre dönüşen, emeğin ve çeliğin vatanıdır. Edebiyatımızda 'disiplin', 'üretim' ve 'sadakat'in sembolüdür. Kırıkkale edebiyatı; demir-çelik fabrikalarının ritmik gürültüsünden, bozkırın sessizliğine ve vatan savunması için çarpan yüreklerin azmine uzanan vakur bir kütüphanedir." },
    p1: { img: "", txt: "Kırıkkale’nın edebi kimliği, Cumhuriyet dönemi 'Sanayileşme Edebiyatı' ile iç içedir. Şehir, bir milletin bağımsızlığını korumak için ürettiği mühimmatın ve çeliğin hikayesini anlatır. Burada edebiyat; sabah ezanıyla fabrika servislerine binen işçilerin gözlerindeki umut, döküm potalarından yayılan sıcaklık ve vatan sevgisinin somut bir ürüne dönüşmesidir. Kırıkkale, kelimelerin bir örs üzerinde dövülerek sertleştiği, gerçekçi ve sarsılmaz bir edebi duraktır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Kızılırmak’ın sakin ama güçlü akışı büyük bir yer tutar. Nehrin kıyısında kurulan hayaller, bozkırın sert rüzgarlarıyla harmanlanarak dayanıklı bir karaktere bürünür. Öte yandan, kentin sembolü olan MKE (Makine ve Kimya Endüstrisi) hatıraları, yerel yazarlar için bir aidiyet ve gurur kaynağıdır. Kırıkkale edebiyatı, Anadolu’nun ortasında yükselen bu modern kalenin içindeki insan sıcaklığını ve komşuluk kültürünü incelikle işler." },
    p2_back: { img: "", txt: "Kırıkkale edebiyatı aynı zamanda bir 'orta Anadolu insanı' anlatısıdır. Keskin ilçesinin yetiştirdiği meşhur ozanlar ve bozlak kültürü, şehrin ruhuna yanık bir tını katar. Hacı Taşan gibi ustaların teliyle yankılanan havalar, Kırıkkale’nin modern çehresinin altındaki kadim Anadolu damarını gösterir. Kütüphanemiz, sanayi dişlilerinin arasından sızan bir bağlama sesi gibi hem modern hem de geleneksel bir armoniyle doludur." },
    p3_front: { img: "", txt: "Modern dönemde Kırıkkale; Ankara’ya yakınlığına rağmen kendi özgün kültürel kimliğini koruyan, üniversitesi ve Silah Sanayi Müzesi ile dikkat çeken bir merkezdir. Şehir, son yıllarda yetişen şair ve yazarlarla, işçi kenti imajını entelektüel bir derinlikle birleştirmektedir. Kırıkkale’nin sesi, bugün hem üretimin kutsallığını savunan hem de bozkırın ortasında gelişen kentsel yaşamın yeni öykülerini anlatan dinamik bir tona sahiptir." },
    p3_back: { img: "", txt: "Bugün Kırıkkale; Çeşnigir Köprüsü’nün tarihi ihtişamı, Celal Bayar Parkı’nın huzuru ve fabrikaların vakur duruşuyla bir 'emek ve tarih' mozaiğidir. Kızılırmak kıyısında, suyun sesine karışan bir kitap okumak, bir milletin nasıl kenetlendiğini ve çeliğin nasıl şiire dönüştüğünü hissetmek demektir. Kırıkkale’nin kütüphanesini açmak; üretimin gücünü anlamak, bozkırın ortasındaki bu azimli şehri tanımak ve Anadolu’nun demir yürekli hikayesini okumaktır." }
},
    "Batman": {
    base: { img: "", txt: "Batman, Mezopotamya’nın bereketli topraklarında, antik Hasankeyf’in mirasıyla modern sanayinin birleştiği, Türkiye’nin petrolle büyüyen 'kara altın' şehridir. Edebiyatımızda 'değişim', 'kadim hafıza' ve 'emek'in sembolüdür. Batman edebiyatı; Dicle Nehri’nin binlerce yıllık akışından, petrol işçilerinin barakalarından yükselen hikayelere ve Raman Dağı’nın sessizliğine uzanan katmanlı bir kütüphanedir." },
    p1: { img: "", txt: "Batman’ın edebi kimliği, her şeyden önce Hasankeyf’in tarihsel derinliğiyle şekillenmiştir. Mağara evlerden saraylara uzanan o eski dünya anlatıları, şairler için zamanın geçiciliği ve medeniyetlerin sürekliliği üzerine kurulan birer metafordur. Şehir; kelimelerin Dicle’nin suları gibi bazen durgun bazen hırçın aktığı, tarihin her taşın altında fısıldadığı mistik bir duraktır. Batman, Mezopotamya’nın yazılı olmayan ama kalplere kazınan o büyük hikayesinin modern sesidir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda petrolün keşfiyle başlayan toplumsal dönüşüm geniş bir yer tutar. Küçük bir köyden devasa bir şehre dönüşme süreci; yazarlar için göç, aidiyet ve modernleşme sancılarını işleyen zengin bir damardır. Raman Dağı’nda ilk petrolün fışkırması, Batman edebiyatına 'üretim' ve 'yeni bir gelecek' temasını katmıştır. Burası, bir yanda binlerce yıllık mağaraların sessizliğini, diğer yanda petrol kulelerinin ritmik sesini taşıyan zıtlıkların uyumudur." },
    p2_back: { img: "", txt: "Batman edebiyatı aynı zamanda bir 'sözlü kültür ve ağıt' edebiyatıdır. Dengbêjlerin gırtlağından dökülen destanlar, aşklar ve acılar; şehrin ruhundaki o yanık ve lirik tonun kaynağıdır. Şehrin hızla büyüyen sokaklarında yankılanan çok dilli yaşam, anlatılara kültürel bir çeşitlilik ve derinlik katar. Kütüphanemiz, petrol karasıyla yoğrulmuş ellerin emeği, Dicle’nin serinliğinde kurulan hayaller ve gidenlerin arkasından yakılan o kadim Mezopotamya ağıtlarıyla doludur." },
    p3_front: { img: "", txt: "Modern dönemde Batman; üniversitesi, devasa halk kütüphanesi ve düzenlenen kitap fuarlarıyla Güneydoğu’nun en önemli entelektüel merkezlerinden birine dönüşmüştür. Şehir, özellikle son yıllarda yetişen genç şair ve yazarlarla, bölgenin geleneksel yapısını modern edebiyatın sorgulayıcı ve yenilikçi diliyle buluşturmaktadır. Batman’ın sesi bugün, yerel değerleri evrensel bir dille harmanlayan güçlü ve umutlu bir tona sahiptir." },
    p3_back: { img: "", txt: "Bugün Batman; Hasankeyf Müzesi’ndeki sessiz hatıraları, Raman’ın zirvesindeki rüzgarı ve hareketli şehir yaşamıyla bir keşif noktasıdır. Dicle kıyısında, güneşin batışına karşı bir kitap okumak, zamanın akışını bizzat nehrin kendisinden dinlemek demektir. Batman’ın kütüphanesini açmak; petrolün ve tarihin nasıl bir kenti var ettiğini anlamak, kadim destanların modern sokaklardaki izini sürmek ve Anadolu’nun bu en genç ama en derin hikayesini okumaktır." }
},
    "Sirnak": {
    base: { img: "", txt: "Şırnak, Cudi Dağı’nın gölgesinde, Dicle Nehri’nin kucağında yer alan, Hz. Nuh’un şehri (Şehr-i Nuh) olarak anılan kadim bir yerleşimdir. Edebiyatımızda 'yeniden doğuş', 'sabır' ve 'epik aşklar'ın sembolüdür. Şırnak edebiyatı; Nuh’un Gemisi’nin bıraktığı umut izlerinden, Ahmed-i Hânî’nin kalbinden dökülen Mem û Zîn destanına ve dengbêjlerin rüzgarla yarışan seslerine uzanan mistik bir kütüphanedir." },
    p1: { img: "", txt: "Şırnak’ın edebi kimliği, her şeyden önce bir 'Aşk ve Destan' kimliğidir. Cizre’de geçen Mem û Zîn, sadece bir kavuşamama hikayesi değil; tasavvufi derinliği, toplumsal yapısı ve diliyle Doğu edebiyatının şahikalarındandır. Şehir; kelimelerin bir hançer gibi keskin, bir gül gibi zarif olduğu, sevdanın ise bir kader gibi yaşandığı edebi bir duraktır. Şırnak, anlatıların Cudi’nin zirvesindeki bulutlar kadar mağrur ve ulaşılmaz olduğu bir şehirdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Hz. Nuh ve Tufan efsanesi kurucu bir rol oynar. Cudi Dağı, sadece bir coğrafi yükselti değil; insanlığın yeniden başladığı, tufandan sonra kurulan ilk köylerin ve ekilen ilk tohumların hikayesidir. Bu 'yeniden başlama' teması, yerel edebiyatın dirençli ve umut dolu karakterini besler. Öte yandan, İsmail Ebul-İz El Cezeri’nin Cizre’den dünyaya yayılan sibernetik dehası, Şırnak edebiyatına 'akıl' ve 'buluş' temasını katar." },
    p2_back: { img: "", txt: "Şırnak edebiyatı aynı zamanda bir 'sınır ve ticaret' kültürü anlatısıdır. Habur’dan esen rüzgarların getirdiği farklı diller, kültürler ve yaşanmışlıklar; şehrin sözlü kültürünü zenginleştirmiştir. Mezopotamya’nın o çok katmanlı yapısı, Şırnak’ın masallarında, atasözlerinde ve özellikle dengbêj divanlarında hayat bulur. Kütüphanemiz, tarihin en eski taş binalarının serinliğinde yankılanan bilgece fısıltılar ve Dicle’nin hırçın akışına yazılmış lirik şiirlerle bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Şırnak; üniversitesi ve kültürel festivalleriyle, köklü geçmişini geleceğe taşıyan bir köprü kurmaktadır. Şehir, son yıllarda yetişen yazarlar ve şairlerle, bölgenin kadim sözlü geleneğini modern romanın ve şiirin kalıplarıyla yeniden yorumlamaktadır. Şırnak’ın modern sesi; Cudi’nin eteklerinden yükselen, barışın, kardeşliğin ve kadim Mezopotamya bilgeliğinin evrensel bir dille ifadesidir." },
    p3_back: { img: "", txt: "Bugün Şırnak; Kırmızı Medrese’nin (Medresa Sor) tarihi atmosferi, Cizre Kalesi’nin vakur duruşu ve Hz. Nuh Türbesi’nin manevi havasıyla bir kültür hazinesidir. Dicle Nehri’nin kıyısında, güneşin kızıla boyadığı surlara karşı bir kitap okumak, insanlık tarihinin başlangıç sayfalarına yeniden göz atmak demektir. Şırnak’ın kütüphanesini açmak; Nuh’un gemisine binmek, Mem ile Zîn’in aşkına tanıklık etmek ve Anadolu’nun bu en kadim, en gizemli hikayesini okumaktır." }
},
    "Bartin": {
    base: { img: "", txt: "Bartın, Karadeniz’in iç kısımlarına kadar sokulan devasa çayı, Amasra’nın 'Çeşm-i Cihan' (Dünyanın Gözü) dedirten güzelliği ve tarihi ahşap evleriyle masalsı bir kıyı şehridir. Edebiyatımızda 'estetik', 'denizle iç içe yaşam' ve 'doğa tutkusu'nun sembolüdür. Bartın edebiyatı; Roma köprülerinden Osmanlı ahşap işçiliğine, Çekiciler Çarşısı’ndaki el emeğinden Barış Akarsu’nun rüzgarla yarışan sesine uzanan zarif bir kütüphanedir." },
    p1: { img: "", txt: "Bartın’ın edebi ruhu, her şeyden önce Amasra’nın büyülü atmosferiyle şekillenmiştir. Fatih Sultan Mehmet’in 'Lala, Lala! Çeşm-i Cihan bu mu ola?' dediği andan itibaren şehir, gezginlerin ve yazarların hayranlık dolu metinlerine konu olmuştur. Şehir; kelimelerin Karadeniz’in o derin lacivertiyle yıkandığı, mısraların ise dik yamaçlardan denize inen birer patika gibi kıvrımlı ve sürprizlerle dolu olduğu edebi bir duraktır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Gemi Yapımcılığı' (Teknecilik) ve 'Ahşap Oyma Sanatı' merkezi bir yer tutar. Kurucaşile’de yüzyıllardır devam eden tekne yapımı, edebiyatımızda sabrın, ustalığın ve denize olan aşkın en güçlü metaforudur. Bartın Çayı üzerinde yapılan taşımacılık ve nehrin dingin akışı, yerel anlatılara hüzünlü ama umutlu bir tını katar. Burası, doğanın sanata, ağacın ise şiire dönüştüğü kadim bir atölyedir." },
    p2_back: { img: "", txt: "Bartın edebiyatı aynı zamanda bir 'liman kasabası ve balıkçı' edebiyatıdır. Amasra’nın dar sokaklarında yankılanan martı sesleri, taze balık kokusu ve 'Ağlayan Ağaç' efsanesi; şehrin duygusal hafızasını oluşturur. Barış Akarsu’nun temsil ettiği o hür ve sevgi dolu Karadeniz ruhu, Bartın’ın modern edebi kimliğine 'müzikal ve samimi' bir derinlik kazandırmıştır. Kütüphanemiz, denize açılan ahşap pencereler ve fırtına sonrası sığınılan güvenli liman öyküleriyle doludur." },
    p3_front: { img: "", txt: "Modern dönemde Bartın; üniversitesi, düzenlenen tiyatro festivalleri ve kültür yollarıyla Karadeniz’in batısındaki entelektüel ışık olmaya devam etmektedir. Şehir, son yıllarda yetişen şair ve yazarlarla, kırsalın dinginliğini modern kentsel yaşamın dinamizmiyle harmanlayan eserlere ev sahipliği yapar. Bartın’ın sesi, bugün hem ekolojik değerleri savunan hem de tarihin estetik mirasını modern dünyaya anlatan bilgece bir tona sahiptir." },
    p3_back: { img: "", txt: "Bugün Bartın; Kemere Köprüsü’nün altındaki akıntısı, İnkumu’nun eşsiz kumsalı ve tarihi kütüphaneleriyle bir huzur rotasıdır. Amasra Kalesi’nin burçlarında denize karşı bir kitap okumak, Fatih’in hayran kaldığı o manzarayı kelimelerle yeniden keşfetmek demektir. Bartın’ın kütüphanesini açmak; ahşabın sıcaklığını hissetmek, Karadeniz’in en zarif limanına sığınmak ve Anadolu’nun bu 'Dünya Gözü' hikayesini bir martı kanadında okumaktır." }
},
   "Ardahan": {
    base: { img: "", txt: "Ardahan, Anadolu’nun en kuzeydoğusunda, Yalnızçam Dağları’nın gölgesinde ve Kura Nehri’nin kıvrımlarında yükselen, sert iklimli ama yumuşak kalpli insanların şehridir. Edebiyatımızda 'sınır', 'direnç' ve 'kar beyazı hüzün'ün sembolüdür. Ardahan edebiyatı; Çıldır Gölü’nde buzun altından çıkan balıkçı hikâyelerinden, Kafkasya’nın destansı anlatılarına ve soğuğun kristalleştiği şiirlere uzanan vakur bir kütüphanedir." },

    "Iğdır": {
    base: { img: "", txt: "Iğdır, Doğu Anadolu’nun sert coğrafyasında, deniz seviyesinden alçaktaki konumuyla 'Doğu’nun Çukurovası' olarak anılan, kayısı bahçeleri ve pamuk tarlalarıyla bezeli bir vaha şehridir. Edebiyatımızda 'sınır ötesi bağlar', 'kültürel kavşak' ve 'bereket'in sembolüdür. Iğdır edebiyatı; Ağrı Dağı efsanelerinden Aras Nehri’nin kıyısında yakılan manilere ve Kafkasya’dan süzülen zengin sözlü geleneğe uzanan çok dilli bir kütüphanedir." },
    p1: { img: "", txt: "Iğdır’ın edebi kimliği, her şeyden önce devasa komşusu Ağrı Dağı ile şekillenmiştir. Yaşar Kemal’in 'Ağrı Dağı Efsanesi'nde anlattığı o destansı atmosfer, Iğdır’ın her sokağında hissedilir. Şehir; kelimelerin bir sınır rüzgârı gibi özgür, mısraların ise Aras Nehri gibi coşkulu aktığı bir edebi duraktır. Burası, Türkiye, Azerbaycan ve İran kültürlerinin iç içe geçtiği, edebiyatın bir barış ve kardeşlik dili olarak kullanıldığı bilge bir coğrafyadır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Nevruz' kutlamaları ve baharın gelişi büyük bir yer tutar. Iğdır edebiyatı, kışın ardından gelen uyanışı, çiçek açan kayısı ağaçlarını ve toprağın canlanışını kutlayan neşeli bir tona sahiptir. Öte yandan, kentin tarihi 'Koç Başlı Mezarlar'ı, yazarlar için geçmişin sessiz tanıklığı ve atalara saygı üzerine kurulan derin metaforların kaynağıdır. Iğdır, tarihin taşlara kazındığı, hayatın ise toprağa ekildiği bir hikâye merkezidir." },
    p2_back: { img: "", txt: "Iğdır edebiyatı aynı zamanda bir 'sınır ve hasret' edebiyatıdır. Aras Nehri’nin ayırdığı ama gönüllerin bir olduğu o 'karşı kıyı' hikâyeleri, yerel şiirlerin ve türkülerin en hüzünlü damarıdır. Kütüphanemiz, 'Lala' ve 'Kosa' oyunlarından süzülen mizahla, sınır hatlarında bekleyen askerlerin ve köylülerin gerçekçi hayat öyküleriyle doludur. Burası, hem Kafkasya’nın zarif danslarını hem de bozkırın vakur duruşunu aynı sayfada buluşturan bir kütüphanedir." },
    p3_front: { img: "", txt: "Modern dönemde Iğdır; üniversitesi ve artan kültürel etkinlikleriyle bölgenin parlayan bir yıldızıdır. Şehir, özellikle son yıllarda yetiştiren araştırmacı yazarlar aracılığıyla, bölgedeki zengin folklorik unsurları ve sözlü edebiyatı kayıt altına alarak geleceğe taşımaktadır. Iğdır’ın modern sesi, üç ülkeye komşu olmanın verdiği vizyonla, yerel değerleri evrensel bir perspektifle yorumlayan bir tona sahiptir." },
    p3_back: { img: "", txt: "Bugün Iğdır; Ağrı Dağı’nın ihtişamı, Tuzluca’nın şifalı tuz mağaraları ve yemyeşil bahçeleriyle keşfedilmeyi bekleyen bir huzur adasıdır. Bir kayısı ağacının gölgesinde, Ağrı Dağı’na karşı kitap okumak, doğanın büyüklüğünü ve insanın bu dünyadaki yerini yeniden sorgulamak demektir. Iğdır’ın kütüphanesini açmak; Kafkasya’nın kapısını aralamak, bereketli toprağın sesini dinlemek ve Anadolu’nun bu en doğu, en güneşli hikâyesini okumaktır." }

    "Yalova": {

    p1: { img: "", txt: "Yalova’nın edebi kimliği, her şeyden önce Mustafa Kemal Atatürk’ün şehre olan tutkusuyla şekillenmiştir. 'Yalova benim kentimdir' sözü, kentin modern Türk edebiyatı ve siyasi tarihindeki yerini perçinlemiştir. Yürüyen Köşk, sadece bir mimari yapı değil; bir ağacı yaşatmak uğruna koca bir binayı raylar üzerinde kaydıran o muazzam doğa sevgisinin ve ekolojik bilincin en güçlü edebi sembolüdür. Burası, kelimelerin yeşile boyandığı bir nefes durağıdır." },

    p2_back: { img: "", txt: "Yalova edebiyatı aynı zamanda bir 'çiçek ve bahçe' anlatısıdır. Türkiye’nin en zengin arboretumlarına (ağaç müzeleri) ev sahipliği yapması, kenti botanik bir şiire dönüştürür. Karaca Arboretum’un kurucusu Hayrettin Karaca’nın toprak sevdası, kentin edebi ruhuna 'toprak ana' ve 'korumacılık' kavramlarını derinlemesine işlemiştir. Kütüphanemiz, denizin iyot kokusuyla karışan yasemin parfümleri ve sahil bandında batan güneşin turuncusuna yazılmış lirik şiirlerle doludur." },
    p3_front: { img: "", txt: "Modern dönemde Yalova; üniversitesi ve hızla gelişen kültürel yapısıyla bir çekim merkezidir. Şehir, göçle gelen farklı kültürlerin harmanlandığı bir 'küçük Türkiye' mozaiği sunar. Bu kültürel çeşitlilik, Yalova edebiyatına zengin bir karakter yelpazesi ve toplumsal bir derinlik katar. Modern Yalova yazarları, kentin sayfiye yeri ruhunu korurken, Marmara’nın bu dinamik merkezinde yaşanan değişimi ve insan öykülerini başarıyla kaleme almaktadır." },
    p3_back: { img: "", txt: "Bugün Yalova; Yürüyen Köşk’ün vakur duruşu, Termal’in buharlı sokakları ve Çiftlikköy’ün sahiliyle yaşayan bir dinlenme durağıdır. Bir çınarın gölgesinde, denize karşı kitap okumak, Atatürk’ün hayalindeki modern ve çevreci Türkiye’nin sayfalarını karıştırmak demektir. Yalova’nın kütüphanesini açmak; doğayla barışık yaşamayı öğrenmek, şifalı bir suyun sesini dinlemek ve Marmara’nın bu en yeşil, en huzurlu hikayesini okumaktır." }

    "Karabuk": {

},

    const cities = ["Adana", "Adıyaman", "Afyonkarahisar", "Ağrı", "Amasya", "Ankara", "Antalya", "Artvin", "Aydın", "Balıkesir", "Bilecik", "Bingöl", "Bitlis", "Bolu", "Burdur", "Bursa", "Çanakkale", "Çankırı", "Çorum", "Denizli", "Diyarbakır", "Edirne", "Elazığ", "Erzincan", "Erzurum", "Eskişehir", "Gaziantep", "Giresun", "Gümüşhane", "Hakkari", "Hatay", "Isparta", "Mersin", "İstanbul", "İzmir", "Kars", "Kastamonu", "Kayseri", "Kırklareli", "Kırşehir", "Kocaeli", "Konya", "Kütahya", "Malatya", "Manisa", "Kahramanmaraş", "Mardin", "Muğla", "Muş", "Nevşehir", "Niğde", "Ordu", "Rize", "Sakarya", "Samsun", "Siirt", "Sinop", "Sivas", "Tekirdağ", "Tokat", "Trabzon", "Tunceli", "Şanlıurfa", "Uşak", "Van", "Yozgat", "Zonguldak", "Aksaray", "Bayburt", "Karaman", "Kırıkkale", "Batman", "Şırnak", "Bartın", "Ardahan", "Iğdır", "Yalova", "Karabük", "Kilis", "Osmaniye", "Düzce"];

    let currentOpenPage = 0;
    const totalPages = 3; 

    function init() {
        const shelf = document.getElementById('cityGroup');
        cities.forEach(city => {
            let book = document.createElement('div');
            book.className = 'city-book-spine';
            book.innerText = city;
            book.onclick = () => openBook(city);
            shelf.appendChild(book);
        });
    }

    function openBook(city) {
        const container = document.getElementById('bookContainer');
        container.querySelectorAll('.book-page').forEach(el => el.remove());
        
        container.style.width = "400px";
        document.getElementById('basePage').style.opacity = "0";
        document.getElementById('left-title').innerText = city;
        currentOpenPage = 0;

        const data = cityData[city] || { base: { img: "", txt: "Bu şehir için henüz veri girişi yapılmadı." } };

        // Sol Taban Sayfası Verisi
        document.getElementById('img-base').src = data.base?.img || "";
        document.getElementById('txt-base').innerText = data.base?.txt || "";

        for (let i = 1; i <= totalPages; i++) {
            let page = document.createElement('div');
            page.className = 'book-page';
            page.id = `p-${i}`;
            page.style.zIndex = (totalPages + 1) - i;

            if (i === 1) {
                const p1Data = data.p1 || { img: "", txt: "Sayfa 1 içeriği yok." };
                page.innerHTML = `
                    <div class="page-front cover-page"><h1>${city}</h1><p>İSTEM KOLEJİ</p></div>
                    <div class="page-back">
                        <img class="book-img" src="${p1Data.img}">
                        <div class="text-content">${p1Data.txt}</div>
                    </div>`;
            } else {
                const pf = data[`p${i}_front`] || { img: "", txt: "..." };
                const pb = data[`p${i}_back`] || { img: "", txt: "..." };
                page.innerHTML = `
                    <div class="page-front">
                        <img class="book-img" src="${pf.img}">
                        <div class="text-content">${pf.txt}</div>
                    </div>
                    <div class="page-back">
                        <img class="book-img" src="${pb.img}">
                        <div class="text-content">${pb.txt}</div>
                    </div>`;
            }
            container.appendChild(page);
        }
        document.getElementById('detail-page').style.display = 'block';
    }

    function nextPage() {
        if (currentOpenPage < totalPages) {
            if(currentOpenPage === 0) {
                document.getElementById('bookContainer').style.width = "800px";
                document.getElementById('basePage').style.opacity = "1";
            }
            currentOpenPage++;
            const page = document.getElementById(`p-${currentOpenPage}`);
            page.classList.add('flipped');
            setTimeout(() => { if(page.classList.contains('flipped')) page.style.zIndex = currentOpenPage; }, 600);
        }
    }

    function prevPage() {
        if (currentOpenPage > 0) {
            const page = document.getElementById(`p-${currentOpenPage}`);
            page.classList.remove('flipped');
            page.style.zIndex = (totalPages + 1) - currentOpenPage;
            currentOpenPage--;
            if(currentOpenPage === 0) {
                document.getElementById('bookContainer').style.width = "400px";
                document.getElementById('basePage').style.opacity = "0";
            }
        }
    }

    function closeDetail() { document.getElementById('detail-page').style.display = 'none'; }

    function filterCities() {
        let val = document.getElementById('citySearch').value.toUpperCase();
        document.querySelectorAll('.city-book-spine').forEach(b => {
            b.style.display = b.innerText.toUpperCase().includes(val) ? "" : "none";
        });
    }

    init();
</script>
</body>
</html>
