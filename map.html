    "İstanbul": {
    base: { img: "", txt: "İstanbul, yedi tepesi üzerinde yükselen medeniyetlerin, iki denizi birleştiren boğazın ve tarihin akışını değiştiren surların şehridir. Şairlerin 'Sultanı', yazarların 'Aşinası' olan bu kent, Türk edebiyatının sadece merkezi değil, bizatihi kendisidir. İstanbul edebiyatı; Bizans’ın gizeminden Osmanlı’nın zarafetine, Galata’nın rüzgarından Kız Kulesi’nin yalnızlığına kadar uzanan, her sokağı mısralarla döşeli devasa bir evrensel anlatıdır." },
    p1: { img: "", txt: "İstanbul denince akla gelen ilk edebi durak, Ahmet Hamdi Tanpınar’ın 'Huzur'u ve Yahya Kemal Beyatlı’nın 'Aziz İstanbul'udur. Yahya Kemal için İstanbul, sadece bir şehir değil, bir vatanın ruhudur. Necip Fazıl’ın 'Canım İstanbul'u, Orhan Veli’nin 'Gözleri Kapalı' dinlediği o eşsiz şehir, Türk şiirinin nefes aldığı yerdir. Sait Faik’in Burgazada’sından Orhan Pamuk’un hüzünlü sokaklarına kadar İstanbul, kalem tutan herkesin en büyük esin kaynağı ve başkahramanıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, Boğaz’ın sularında parlayan yalı hikayeleriyle ve Beyoğlu’nun bohem atmosferiyle örülüdür. Divan edebiyatının kasidelerinden modern romanın karmaşık kurgularına kadar her tür, İstanbul’un semtlerinde kendine bir kimlik bulmuştur. Kanlıca’nın yoğurdu, Emirgan’ın çınar altı, Üsküdar’ın manevi havası; her biri birer edebi imge olarak kütüphanemizin raflarında yerini almıştır. İstanbul, kelimelerin bile aşık olduğu, anlatılamayan ama her an yaşanan bir şehirdir." },
    p2_back: { img: "", txt: "İstanbul edebiyatı aynı zamanda bir 'mahalle ve sokak' edebiyatıdır. Hüseyin Rahmi Gürpınar’ın sokak aralarındaki canlı tasvirleri, Ahmet Rasim’in fıkraları ve eski İstanbul beyefendilerinin-hanımefendilerinin nezaketi; şehrin sosyal hafızasını oluşturur. Boğaz’ın akıntısı gibi sürekli değişen ama özünü asla yitirmeyen bu edebi yapı, Galata Köprüsü üstünde balık tutan amcanın hikayesiyle, Kapalıçarşı’nın gizemli dehlizlerini aynı heyecanla anlatmayı bilir." },
    p3_front: { img: "", txt: "Modern dönemde İstanbul; dünya edebiyatının da vazgeçilmez duraklarından biridir. Nobel ödüllü eserlerden polisiye romanlara, yeraltı edebiyatından fantastik kurgulara kadar her türlü türün can bulduğu bu metropol, kaosu ve huzuru aynı anda barındırır. Kadıköy’ün sahafları, Sirkeci’nin tren rayları ve İstiklal Caddesi’nin kalabalığı; modern yazarlar için insan ruhunun labirentlerini keşfetmek için en ideal sahadır. İstanbul, her okuyuşta yeni bir sayfa açan, bitmeyen bir romandır." },
    p3_back: { img: "", txt: "Bugün İstanbul; sayısız kütüphanesi, kütüphane-kafeleri, uluslararası kitap fuarları ve edebi rotalarıyla dünyanın kültür başkentidir. Pierre Loti Tepesi’nde Haliç’e bakarak bir kitap okumak veya Vapurda martı sesleri eşliğinde bir sayfayı çevirmek, İstanbul’un kendisine dahil olmaktır. İstanbul’un kütüphanesini açmak; imparatorlukların mirasına dokunmak, denizin ve tarihin fısıltısını duymak ve her mısrada bir aşkın, bir kavganın, bir rüyanın izini sürmektir." }
},
    "İzmir": {
    base: { img: "", txt: "İzmir, Ege’nin parlayan incisi, imbat rüzgarlarının ve özgürlük tutkusunun başkentidir. Tarihin en eski çağlarından beri bir liman ve ticaret merkezi olan bu şehir, edebiyatımızda 'aydınlanma', 'modernlik' ve 'yaşama sevinci'nin sembolüdür. İzmir edebiyatı; Homeros’un destansı nefesinden Attila İlhan’ın Kordon boyu şiirlerine, levanten konaklarının gizeminden incir bahçelerinin kokusuna uzanan masmavi bir anlatıdır." },
    p1: { img: "", txt: "İzmir’in edebi ruhu denince akla gelen en dev isimlerden biri Attila İlhan’dır. Onun şiirlerinde İzmir; yağmurlu sokakları, eski rıhtımı ve 'Pia'sı ile hüzünlü ama son derece estetik bir şehirdir. Şehir, aynı zamanda Halikarnas Balıkçısı’nın (Cevat Şakir Kabaağaçlı) sürgünle başlayıp aşka dönüşen yolculuğunun başlangıç noktasıdır. İzmir, kelimelerin deniz tuzuyla yıkandığı ve özgürlüğün mısralara nakşedildiği bir edebiyat denizidir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, Homeros’un 'İlyada' ve 'Odysseia'yı yazdığı Meles Çayı’nın kıyılarından bugüne ulaşan kadim bir mirastır. İzmir, tarih boyunca farklı kültürlerin, dillerin ve inançların bir arada yaşadığı kozmopolit yapısıyla edebiyata çok seslilik kazandırmıştır. Kemeraltı’nın hanlarında yankılanan Yahudi ezgileri, Levanten ailelerin anıları ve Müslüman Türk mahallelerinin samimiyeti; Necati Cumalı’nın eserlerinde o unutulmaz Ege insanı karakterlerine dönüşmüştür." },
    p2_back: { img: "", txt: "İzmir edebiyatı aynı zamanda bir 'kurtuluş ve diriliş' edebiyatıdır. Milli Mücadele’nin ilk kurşununun atıldığı ve zaferin taçlandığı yer olarak İzmir, Türk edebiyatında bağımsızlığın en güçlü kalesidir. Şehrin dağlarında çiçekler açtıran o büyük zafer, sayısız roman ve şiire konu olmuş; İzmir’in kurtuluşu, küllerinden doğan bir milletin edebi hafızasındaki en parlak sayfa haline gelmiştir. Burası, her satırda hürriyetin kokusunu duyabileceğiniz bir kütüphanedir." },
    p3_front: { img: "", txt: "Modern dönemde İzmir; yayın evleri, tiyatroları ve Dario Moreno sokağındaki melodileriyle sanatın her dalını kucaklar. Kordon’da gün batımını izlerken yazılan mısralar, Karşıyaka’nın kendine has ruhu ve Alsancak’ın entelektüel derinliği, şehri genç yazarlar için vazgeçilmez bir esin kaynağı yapar. İzmir, sadece geçmişiyle değil, festivalleri ve kütüphane-kafeleriyle geleceğin edebiyatına yön veren dinamik bir kalemdir." },
    p3_back: { img: "", txt: "Bugün İzmir; devasa kütüphaneleri, tarihi asansörü ve her yıl düzenlenen uluslararası kitap fuarlarıyla bir kültür çekim merkezidir. Pasaport’ta denize karşı demli bir çay ve elinde bir kitapla oturmak, bu şehrin ruhuna dahil olmanın en kısa yoludur. İzmir’in kütüphanesini açmak; imbat rüzgarını teninde hissetmek, maviliklere açılmak ve Anadolu’nun dünyaya bakan o en güler yüzlü, en aydınlık penceresinden hayata gülümsemektir." }
},
    "Kars": {
    base: { img: "", txt: "Kars, Anadolu’nun en doğusunda, her kış beyaz bir masalın içine gömülen, taş binaları ve geniş caddeleriyle kendine has bir karaktere sahip olan serhat şehridir. Edebiyatımızda 'hüzün', 'sınır' ve 'kış'ın en güçlü simgesidir. Kars edebiyatı; Ani Harabeleri’nin bin yıllık suskunluğundan, aşıkların sazından dökülen yanık türkülerden ve kristal kar tanelerinin sessizce örttüğü o derin hikayelerden beslenir." },
    p1: { img: "", txt: "Kars’ın dünya edebiyatındaki en bilinen durağı, Orhan Pamuk’un 'Kar' romanıdır. Şehir, bu eserde sadece bir dekor değil; karın sessizliği altında siyasetin, aşkın ve inancın sorgulandığı canlı bir karakterdir. Kars’ın kışı, yazarlar için dış dünyadan kopuşun ve içe dönüşün metaforudur. Baltık mimarisinin o vakur taş binaları arasında dolaşan rüzgar, kütüphanemizde hep o hüzünlü ve etkileyici 'kar' kokusunu hatırlatır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Aşıklık Geleneği'nin sarsılmaz bir yeri vardır. Murat Çobanoğlu ve Şeref Taşlıova gibi dev ozanların yetiştiği bu topraklar, Türk halk edebiyatının yaşayan en canlı damarlarından biridir. Aşıklar kahvelerinde yapılan atışmalar, dudakdeğmezler ve koçaklamalar; Kars’ın sözlü kütüphanesini her kış gecesi yeniden canlandırır. Bu gelenek, Kars insanının zekasını, dertlerini ve toplumsal olaylara bakışını sazın teliyle buluşturur." },
    p2_back: { img: "", txt: "Kars edebiyatı aynı zamanda bir 'sınır ve hafıza' edebiyatıdır. Ani Harabeleri, tarihin ve dinlerin sessiz tanığı olarak pek çok şaire ilham kaynağı olmuştur. 'Binbir Kilise Şehri' olarak anılan bu kadim kent, yazarların kaleminde zamanın geçiciliğini ve medeniyetlerin birbirine karışan izlerini anlatır. Kars’ta edebiyat; geçmişin taş binalardan yükselen fısıltısıyla, bugünün modern sınır şehri gerçekliğinin hüzünlü bir valsi gibidir." },
    p3_front: { img: "", txt: "Modern dönemde Kars; Doğu Ekspresi ile gelen gezginlerin, fotoğrafçıların ve yeni nesil yazarların keşfettiği bir estetik merkezidir. Bozkırın ortasında yükselen bu kentsel zarafet, kış festivalleri ve kültür evleriyle edebiyatı sokağa taşır. Şehrin meşhur kaşarı ve kaz eti etrafında dönen yerel hikayeler, kış sofralarının sıcaklığıyla birleşerek Kars’ın toplumsal dokusunu ve insan sıcaklığını anlatan samimi metinlere dönüşür." },
    p3_back: { img: "", txt: "Bugün Kars; kütüphaneleri, konservatuvarları ve tarihi yapıların içinde barındırdığı sanat alanlarıyla Doğu Anadolu’nun en önemli kültür duraklarından biridir. Çıldır Gölü’nün donmuş yüzeyinde yürürken veya bir Rus binasının penceresinden lapa lapa karı izlerken bir kitap okumak, zamanın durduğu o eşsiz ana şahitlik etmektir. Kars’ın kütüphanesini açmak; karın sessizliğini dinlemek, aşıkların sözüne ortak olmak ve tarihin en doğusundaki o vakur duruşu hissetmektir." }
},
    "Kastamonu": {
    base: { img: "", txt: "Kastamonu, Ilgaz Dağları’nın heybetli gölgesinde, Karadeniz’in hırçın kıyılarından İç Anadolu’nun sessiz bozkırına uzanan bir köprü, bir 'kültür kalesi'dir. Edebiyatımızda 'vatan sevgisi', 'sadakat' ve 'tabiatın cömertliği'nin sembolüdür. Kastamonu edebiyatı; Şerife Bacı’nın İstiklal Yolu’ndaki kararlı adımlarından, asırlık konakların ahşap kokulu odalarında anlatılan masallara kadar uzanan derin ve vakur bir anlatıdır." },
    p1: { img: "", txt: "Kastamonu’nun edebi kimliği, Türk edebiyatının çınarı Rıfat Ilgaz ile özdeşleşmiştir. 'Hababam Sınıfı'nın yazarı olan Ilgaz, aynı zamanda Cide’nin sarı yazmasını, Karadeniz insanının çilesini ve mizahını en saf haliyle kalemine taşımıştır. Onun eserlerinde Kastamonu; sadece bir mekan değil, dürüstlüğün ve halkın içinden gelen sesin yankılandığı bir yuvadır. Şehir, Rıfat Ilgaz’ın 'Sarı Yazma' romanındaki gibi, doğasına ve insanına aşık kalemlerin yurdudur." },
    p2_front: { img: "", txt: "Şehrin edebi hafızasında Milli Mücadele’nin ve İstiklal Yolu’nun kutsal bir yeri vardır. İnebolu’dan Ankara’ya uzanan bu yol, sadece mühimmatın değil, bir milletin bağımsızlık azminin metinleştiği yerdir. Mehmet Akif Ersoy’un Kastamonu Nasrullah Camii’nde verdiği vaazlar, halk edebiyatında vatanseverliğin en güçlü hitabet örnekleri olarak yer alır. Kastamonu, mısraların şehadetle, kelimelerin hürriyet aşkıyla yıkandığı bir direniş kütüphanesidir." },
    p2_back: { img: "", txt: "Kastamonu edebiyatı aynı zamanda bir 'Evliyalar ve Maneviyat' edebiyatıdır. Şeyh Şaban-ı Veli gibi gönül sultanlarının öğretileri, şehrin edebi çehresine derin bir hoşgörü ve ahlaki bir olgunluk katmıştır. Bu manevi iklim, yerel yazarların ve şairlerin kaleminde nefse hitap eden mistik bir dile dönüşür. Şehrin tarihi sokaklarında yankılanan bu sessiz bilgelik, Kastamonu’yu Anadolu’nun manevi kütüphanelerinden biri haline getirir." },
    p3_front: { img: "", txt: "Modern dönemde Kastamonu; tarihi konakları, kanyonları ve el sanatlarıyla edebiyatın daha pastoral ve kültürel yönlerini besler. Taşköprü’nün sarımsağından Tosya’nın pirincine, Cide’nin hırçın denizinden Valla Kanyonu’nun görkemine kadar her detay; seyyah yazarlar ve modern romancılar için zengin imgeler sunar. Kastamonu, ahşabın üzerine işlenen o ince işçilik gibi, kelimelerin de sabırla ve özenle dizildiği bir edebi atölye gibidir." },
    p3_back: { img: "", txt: "Bugün Kastamonu; üniversitesi, kütüphaneleri ve her yıl düzenlenen kültürel şenlikleriyle Anadolu’nun kadim sesini yarınlara taşımaktadır. Saat kulesinden şehri seyrederken bir kitap okumak, tarihin ve doğanın o sarsılmaz dengesine tanıklık etmek demektir. Kastamonu’nun kütüphanesini açmak; bir kahramanlık destanına ortak olmak, Rıfat Ilgaz ile Karadeniz’i selamlamak ve ahşap konakların fısıltısında geçmişin huzurunu bulmaktır." }
},
    "Kayseri": {
    base: { img: "", txt: "Kayseri, Erciyes Dağı’nın görkemli zirvesinden süzülen bir vakarla, Anadolu’nun kalbinde yükselen bir ticaret, sanayi ve bilim merkezidir. Selçuklu mimarisinin en zarif örnekleriyle donatılmış bu şehir, edebiyatımızda 'akıl', 'üretim' ve 'hayırseverlik'in sembolüdür. Kayseri edebiyatı; kervansarayların taş duvarlarında yankılanan yolcu hikayelerinden, Erciyes’in dumanlı başında yazılan lirik şiirlere kadar uzanan, köklü ve disiplinli bir kütüphanedir." },
    p1: { img: "https://bunny-wp-pullzone-nfqzsydbnl.b-cdn.net/wp-content/uploads/2023/01/kayseri_cumhuriyet_meydani-1024x577.jpg", txt: "Kayseri’nin edebi ve kültürel dünyasının en büyük gururu, dünya mimarlık tarihinin dâhisi Mimar Sinan’dır. Ağırnas’tan çıkan bu büyük deha, aslında taşın üzerine yazılmış en büyük 'şiirlerin' şairidir. Onun eserlerindeki matematiksel kusursuzluk ve estetik denge, Kayserili yazarlar için her zaman bir ilham kaynağı olmuştur. Şehir, sadece kelimelerle değil, taşlarla da anlatılan devasa bir açık hava kitabıdır." },
    p2_front: { img: "https://www.kayseri.bel.tr/uploads/kesfet/erciyes-dagi-1.jpg", txt: "Şehrin edebi dokusunda Gevher Nesibe Şifahanesi ve Hunat Hatun Külliyesi gibi yapılar, kadim bir bilgelik ve şifa kültürünü temsil eder. Anadolu’nun ilk tıp merkezi olan bu mekanlar, edebiyatta merhametin ve insan ruhuna duyulan saygının simgesi olarak işlenir. Kayseri, bilgiyi sadece saklayan değil, onu ticari ve sosyal bir ahlakla birleştirerek hayata dahil eden, 'ahilik' geleneğinin o dürüst ve üretken sesini mısralarına taşıyan bir şehirdir." },
    p2_back: { img: "https://i.test.neredekal.com/i/75/800x600/606f4ace385592215d886a66", txt: "Kayseri edebiyatı aynı zamanda bir 'mizah ve pratik zeka' edebiyatıdır. Kayseri insanının ticari zekası ve hayatı kolaylaştıran çözüm odaklı yapısı, sayısız fıkraya ve öyküye konu olmuştur. Ancak bu mizahın altında her zaman bir ders ve hayat tecrübesi saklıdır. Pastırmanın, sucuğun ve mantının etrafında dönen o bereketli sofralar, yerel anlatıların en samimi ve iştah açıcı sahnelerini oluşturur. Kayseri kütüphanesi, cömertliğin ve emeğin tadını taşır." },
    p3_front: { img: "https://www.yahyali.bel.tr/images/ustmenu/20191012115233_0.jpg", txt: "Modern dönemde Kayseri; yetiştirdiği akademisyenler, düşünürler ve şairlerle Anadolu’nun entelektüel lokomotiflerinden biridir. Erciyes Üniversitesi’nin etrafında şekillenen kültürel hayat, şehri her daim dinamik tutar. Erciyes’in bembeyaz karları altında yazılan modern şiirler, bozkırın ortasında yükselen bu modern kentin sanayi devrimiyle yaşadığı dönüşümü ve köklerine bağlılığını aynı ustalıkla anlatır." },
    p3_back: { img: "https://gelecekpartisi.org.tr/uploads/teskilat_tanitim/galeri-kayseri-kalesi-04_03_2021_15_18_15.jpg", txt: "Bugün Kayseri; modern kütüphaneleri, kültür merkezleri ve Talas’ın tarihi sokaklarındaki sanat atölyeleriyle geçmişin mirasını geleceğe taşımaktadır. Erciyes’in yamaçlarında ovaya bakarak bir kitap okumak, tarihin ve geleceğin o devasa kucaklaşmasına tanıklık etmek demektir. Kayseri’nin kütüphanesini açmak; Mimar Sinan’ın dehasına selam durmak, Erciyes’in sabrını öğrenmek ve Anadolu’nun çalışkan ruhuyla kucaklaşmaktır." }
},
    "Kırklareli": {
    base: { img: "", txt: "Kırklareli, Yıldız Dağları’nın eteklerinden Karadeniz’in serin kıyılarına uzanan, doğanın ve tarihin en saf haliyle korunduğu bir Trakya masalıdır. Edebiyatımızda 'doğa sevgisi', 'sınır ötesi özlemler' ve 'bereket'in simgesidir. Kırklareli edebiyatı; Istrancaların dumanlı başından yükselen Balkan türkülerinden, Longoz ormanlarının gizemli fısıltısına kadar uzanan, samimi ve duru bir anlatıdır." },
    p1: { img: "", txt: "Kırklareli’nin edebi kimliği denince akla gelen en önemli isim, ömrünün bir kısmını burada geçiren ve eserlerinde bu coğrafyayı yaşatan Sabahattin Ali’dir. Onun doğaya duyduğu tutku ve toplumsal meselelere bakışı, Kırklareli’nin sakin ama derin ruhuyla örtüşür. Şehir, onun gibi özgür ruhlu kalemler için bir sığınak ve ilham kaynağı olmuş; Yıldız Dağları'nın her bir ağacı, bir şairin dizesinde yeniden can bulmuştur." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, köklü Balkan kültürü ve göç hikayeleriyle şekillenmiştir. Kırklareli, sınırın bu tarafında kalan ama kalbinin bir yarısı hep Rumeli’de atan insanların hikayelerini anlatır. Kakava şenliklerinin coşkusu, baharın gelişiyle yazılan neşeli şiirler ve hıdrellez ateşinin etrafında dönen masallar; Kırklareli’ni Trakya’nın en renkli sözlü kütüphanelerinden biri haline getirir. Burada edebiyat, hayatın içinden fışkıran bir neşedir." },
    p2_back: { img: "", txt: "Kırklareli edebiyatı aynı zamanda bir 'toprak ve bağ' edebiyatıdır. Bağ bozumu gelenekleri, hardaliyenin tadı ve uçsuz bucaksız ayçiçeği tarlaları; yerel yazarlar için emeğin ve bereketin en güçlü imgeleridir. Çiftçinin alın teri, dokuma tezgahlarındaki titizlik ve mutfaktaki zenginlik; Kırklareli’nin toplumsal gerçekçi öykülerindeki temel taşlardır. Kütüphanemiz, bu toprakların bereketiyle yoğrulmuş hikayelerle doludur." },
    p3_front: { img: "", txt: "Modern dönemde Kırklareli; Dupnisa Mağarası’nın mistik atmosferinden İğneada’nın eşsiz ekosistemine kadar, doğacı edebiyatın ve gezi yazarlığının önemli bir odağıdır. Şehir, tarihi taş evleri ve sakin yaşamıyla, büyük şehrin gürültüsünden kaçan yazarlar için dingin bir limandır. Kırklareli’nin her köşesi, bir romanın giriş cümlesi kadar davetkar ve bir şiirin son dizesi kadar akılda kalıcıdır." },
    p3_back: { img: "", txt: "Bugün Kırklareli; kütüphaneleri, kültür merkezleri ve yerel festivalleriyle Trakya’nın kültürel mirasını korumaya ve geliştirmeye devam etmektedir. Istranca ormanlarının sessizliğinde bir kitap okumak, doğanın kendi yazdığı o muazzam destana kulak misafiri olmak demektir. Kırklareli’nin kütüphanesini açmak; Balkan rüzgarını selamlamak, doğanın yeşil kucağında huzur bulmak ve Anadolu’nun Avrupa’ya açılan o en samimi kapısından içeri girmektir." }
},
    "Kırşehir": {
    base: { img: "", txt: "Kırşehir, Anadolu’nun ortasında, kelimelerin türküleştiği, bilgeliğin ise tevazuyla harmanlandığı bir 'Gönül Şehri'dir. Edebiyatımızda 'öz Türkçe', 'hakikat' ve 'halkın sesi'nin sembolüdür. Kırşehir edebiyatı; Ahi Evran’ın dürüstlük yasalarından Neşet Ertaş’ın 'bozkırın tezenesi'yle vurduğu o derin sızılara kadar uzanan, her mısrasında insan kokan devasa bir halk kütüphanesidir." },
    p1: { img: "", txt: "Kırşehir’in edebi ruhunun en güçlü damarı, Türkçeye olan büyük sevdasıdır. Türkçenin Anadolu’da edebi bir dil olarak kökleşmesini sağlayan 'Garibname'nin yazarı Aşık Paşa, bu toprakların yetiştirdiği en büyük dil mimarlarından biridir. Onun 'Türk diline kimsene bakmaz idi' diyerek başlattığı bu uyanış, Kırşehir’i Türk dilinin ve kültürünün sarsılmaz bir kalesi haline getirmiştir. Şehir, dilimizin öz suyuyla sulanmış bir kelime bahçesidir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, Ahilik teşkilatının kurucusu Ahi Evran-ı Veli’nin öğretileriyle şekillenmiştir. Ahilik sadece bir esnaf örgütlenmesi değil; dürüstlüğü, cömertliği ve paylaşmayı anlatan muazzam bir 'yaşam edebiyatı'dır. Kırşehir’in çarşılarında yankılanan bu kadim ahlak, yerel yazarların kaleminde 'el ele, el Hakk’a' düsturuyla yoğrulmuş toplumsal gerçekçi hikayelere dönüşür. Burası, emeğin ve doğruluğun metinleştiği yerdir." },
    p2_back: { img: "", txt: "Kırşehir edebiyatı denince bozkırın en yanık sesi Abdal geleneği ve Muharrem Ertaş ile Neşet Ertaş’ı anmamak imkansızdır. Onlar, kelimeleri sadece yazmamış, sazın teliyle gönüllere kazımışlardır. Neşet Ertaş’ın 'Gönül Dağı'ndan süzülen o eşsiz felsefe, en karmaşık insani duyguları en sade dille anlatma sanatıdır. Kırşehir kütüphanesini açmak, bir bağlamanın tellerinde Anadolu’nun bin yıllık kederini ve neşesini okumaktır." },
    p3_front: { img: "", txt: "Modern dönemde Kırşehir; Cacabey Medresesi’nin gökyüzüne açılan penceresi gibi, ilmi ve sanatı birleştiren bir merkez olmaya devam etmektedir. Astronomiden edebiyata uzanan bu köklü geçmiş, bugün şehrin entelektüel birikimini besler. Seyfe Gölü’nün sessizliği ve bozkırın bitmek bilmeyen ufkunda yazılan modern şiirler, Kırşehir’in kadim bilgeliğini günümüzün hızıyla buluşturan lirik birer anlatıdır." },
    p3_back: { img: "", txt: "Bugün Kırşehir; UNESCO Müzik Şehri unvanıyla, kütüphaneleriyle ve her yıl düzenlenen Ahilik haftası etkinlikleriyle kültürel mirasını gururla taşımaktadır. Cacabey’in gölgesinde veya bir ozanlar kahvesinde kitap okumak, kelimelerin tınısındaki o içtenliği hissetmek demektir. Kırşehir’in kütüphanesini açmak; Türkçenin gücünü fark etmek, gönül gözüyle bakmayı öğrenmek ve bozkırın ortasında yeşeren o en sahici insani değerlere dokunmaktır." }
},
    "Kocaeli": {
    base: { img: "", txt: "Kocaeli, Marmara Denizi’nin en iç noktasında, Asya ile Avrupa’yı birbirine bağlayan yolların kesiştiği, emeğin ve üretimin başkentidir. Antik Nikomedya’nın görkeminden Cumhuriyet’in sanayi hamlesine uzanan bu şehir, edebiyatımızda 'çalışkanlık', 'devinim' ve 'geçiş'in sembolüdür. Kocaeli edebiyatı; fabrika düdüklerinin ritminden, körfez rüzgarının getirdiği iyot kokusuna ve Kartepe’nin devasa sessizliğine uzanan dinamik bir anlatıdır." },
    p1: { img: "", txt: "Kocaeli’nin edebi hafızası, Türk edebiyatının 'Mavi Gözlü Dev'i Nazım Hikmet’in ve daha pek çok kalemin yolunun düştüğü, hapislerin ve sürgünlerin değil, üretimin ve mücadelenin şehri olmasıyla şekillenmiştir. Şehir, toplumsal gerçekçi edebiyatın en canlı laboratuvarıdır. İşçi sınıfının öyküleri, limanlarda yüklenen gemilerin gurbet kokulu hikayeleri ve büyük şehrin yanı başındaki bu dev üretim merkezinin insan manzaraları, Kocaeli’yi Anadolu’nun en 'toplumcu' kütüphanesi yapar." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda sadece sanayi değil, muazzam bir doğa ve tarih de saklıdır. Hannibal’ın mezarından bugüne ulaşan antik miras ve Hereke ipeğinin zarafeti, Kocaeli edebiyatına estetik bir derinlik katar. Bir yanda demir-çelik fabrikalarının sertliği, diğer yanda dünyayı süsleyen o incecik halı dokumalarının sabrı; Kocaeli yazarlarının kaleminde zıtlıkların uyumuna dönüşür. Bu şehir, çeliğin üzerine yazılmış en ince şiirdir." },
    p2_back: { img: "", txt: "Kocaeli edebiyatı aynı zamanda bir 'deniz ve körfez' edebiyatıdır. Körfez’in bir zamanlar şairlere ilham veren dinginliği ve kıyı kasabalarının huzuru, yerel yazarların en çok işlediği temalardan biridir. Karamürsel’in sepetinden pişmaniyenin tel tel dökülen tatlılığına kadar şehre has her simge, Kocaeli’nin sözlü kültüründe ve anılarında kendine yer bulur. Kütüphanemiz, bu şehrin hem yorgun hem de umutlu sabahlarını anlatan metinlerle doludur." },
    p3_front: { img: "", txt: "Modern dönemde Kocaeli; Türkiye’nin en büyük kitap fuarlarından birine ev sahipliği yaparak gerçek bir 'edebiyat üssü'ne dönüşmüştür. Kağıt fabrikalarının (SEKA) şehre kattığı kültürel miras, bugün dev kütüphaneler ve sanat merkezleri olarak yaşamaktadır. Üniversite gençliğinin enerjisi, Gebze’den Kartepe’ye kadar uzanan bu devasa coğrafyada yeni nesil bir şehir edebiyatının, dijital anlatıların ve bilim-kurgu denemelerinin filizlenmesini sağlar." },
    p3_back: { img: "", txt: "Bugün Kocaeli; SEKA Park’taki kütüphaneleri, yaşayan müzeleri ve her yıl binlerce okuru ağırlayan kültür şölenleriyle Marmara’nın entelektüel durağıdır. Körfez kenarında, batan güneşin kırmızılığında bir kitap okumak, üretimin ve hayatın tam ortasında nefes almak demektir. Kocaeli’nin kütüphanesini açmak; emeğin kutsallığını anlamak, tarihin ve sanayinin iç içe geçtiği o devasa romanı okumak ve Anadolu’nun dünyaya açılan bu en güçlü kapısından hayatı izlemektir." }
},
    "Konya": {
    base: { img: "", txt: "Konya, Anadolu’nun ruhunu emziren bir bilge, Selçuklu medeniyetinin muazzam bir mührü ve bozkırın ortasında parlayan bir tevazu merkezidir. Edebiyatımızda 'aşk', 'manevi arınma' ve 'köklü bir tarih'in sembolüdür. Konya edebiyatı; Mevlana’nın Mesnevi’sinden yükselen ney sesinden, Şems-i Tebrizi’nin yakıcı sözlerine ve bozkırın rüzgarıyla savrulan kadim halk hikayelerine kadar uzanan devasa bir gönül kütüphanesidir." },
    p1: { img: "", txt: "Konya’nın edebi ve manevi kimliğinin zirvesi şüphesiz Hz. Mevlana’dır. Onun dünyayı kucaklayan hümanizmi ve 'Hamdım, piştim, yandım' diyen içsel yolculuğu, şehri evrensel bir çekim merkezi haline getirmiştir. Mesnevi, bu toprakların sadece bir kitabı değil, anayasası gibidir. Konya, kelimelerin ilahi bir aşka dönüştüğü, mısraların ise Sema ayinindeki gibi sonsuz bir huzurla döndüğü, dünya edebiyatının en derin manevi duraklarından biridir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, Selçuklu’nun taşlara kazıdığı geometrik düzen ve estetikle yoğrulmuştur. Karatay Medresesi’nin çinilerinden İnce Minareli Medrese’nin kapısına kadar her taş, bir yazara sabrı ve zarafeti fısıldar. Ahmet Hamdi Tanpınar’ın 'Beş Şehir'inde anlattığı o vakur ve içe dönük Konya, tarihin bugüne bıraktığı en asil miraslardan biridir. Konya, dünü unutmayan ama yarını o köklü geçmişin üzerine inşa eden bilge bir anlatıdır." },
    p2_back: { img: "", txt: "Konya edebiyatı aynı zamanda bir 'halk ve hikmet' edebiyatıdır. Nasreddin Hoca’nın nüktedanlığı ile Akşehir’den yükselen o zeka dolu ses, Konya’nın toplumsal hafızasının bir parçasıdır. Ovanın genişliği, insanın iç dünyasına yansımış; bu da yerel yazarların ve ozanların eserlerine geniş bir ufuk ve derin bir hoşgörü katmıştır. Konya kütüphanesini açmak, bir dervişin heybesindeki hikmetli sözleri keşfetmek ve bozkırın ortasında açan o nadide sabır çiçeğini koklamaktır." },
    p3_front: { img: "", txt: "Modern dönemde Konya; üniversiteleri, kütüphaneleri ve Şeb-i Arus törenleriyle kültürel mirasını canlı tutan modern bir metropoldür. Şehir, son yıllarda yetişen pek çok yazar ve şair için gelenekle modernin çatışmadığı, aksine birbirini beslediği eşsiz bir laboratuvar sunar. Konya’nın geniş caddeleri ve tarihi mahalleleri, hem mistik bir atmosferin hem de modern hayatın getirdiği yeni soruların edebi bir dille tartışıldığı bir sahadır." },
    p3_back: { img: "", txt: "Bugün Konya; dünyanın en zengin yazma eser kütüphanelerine ve modern sanat merkezlerine ev sahipliği yapmaktadır. Mevlana Müzesi’nin huzurlu bahçesinde veya Meram Bağları’nın gölgesinde bir kitap okumak, zamanın ötesine geçip bir gönül sultanıyla sohbet etmek gibidir. Konya’nın kütüphanesini açmak; kendinden geçip bütüne varmak, aşkın dilini öğrenmek ve Anadolu’nun o en derin, en kadim şarkısına eşlik etmektir." }
},
    "Kütahya": {
    base: { img: "", txt: "Kütahya, Ege’nin İç Anadolu’ya açılan kapısında, toprağın ateşte açan çiçeklere dönüştüğü bir sanat ve tarih şehridir. Çininin başkenti olan bu kadim yerleşim, edebiyatımızda 'estetik', 'gelenek' ve 'ustalık'ın sembolüdür. Kütahya edebiyatı; Germiyan beylerinin saraylarından yükselen şiirlerden, dünyanın ilk borsasının kurulduğu Aizanoi’nin sessiz sütunlarına kadar uzanan, her köşesi emekle işlenmiş bir kütüphanedir." },
    p1: { img: "", txt: "Kütahya’nın edebi kimliği, dünya tarihinin en büyük seyyahı Evliya Çelebi ile taçlanmıştır. Kütahyalı olan Çelebi, bu şehrin meraklı, gezgin ve gözlemci ruhunun bir yansımasıdır. Onun 'Seyahatname'si, Kütahya’nın sokaklarını, insanlarını ve kültürünü ölümsüzleştirirken, şehri bir anlatı merkezi haline getirmiştir. Kütahya, kelimelerin bir seyyahın heybesindeki hazineler gibi biriktiği ve her adımda yeni bir keşfe kapı açtığı edebi bir duraktır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, dünyaca ünlü çinicilik sanatı ile iç içedir. Bir çini ustasının fırçasından çıkan o ince hatlar, şairlerin mısralarındaki vezin ve kafiye gibidir; her ikisi de büyük bir dikkat ve ruhsal derinlik gerektirir. Ahmet Yakupoğlu gibi sanatçıların hem fırçasıyla hem de gönlüyle işlediği bu şehir, görsel sanatların edebiyatla kucaklaştığı nadir yerlerdendir. Kütahya’da yazı yazmak, ham toprağa şekil verip onu ölümsüz bir sanat eserine dönüştürmek gibidir." },
    p2_back: { img: "", txt: "Kütahya edebiyatı aynı zamanda bir 'kuruluş ve kurtuluş' edebiyatıdır. Osmanlı’nın temellerinin atıldığı Domaniç yaylalarından, Milli Mücadele’nin dönüm noktası olan Dumlupınar’a kadar bu coğrafya, bir milletin var oluş hikayesinin yazıldığı yerdir. Şehrin kütüphanesi, Hayme Ana’nın şefkatinden Dumlupınar’ın destansı zaferine uzanan, vatan aşkıyla harmanlanmış vakur metinlerle doludur. Burası, tarihin en can alıcı sayfalarının bizzat yaşandığı bir sahadır." },
    p3_front: { img: "", txt: "Modern dönemde Kütahya; korunan tarihi evleri, Germiyan Sokağı’nın nostaljik havası ve üniversitesinin kültürel enerjisiyle edebiyatın geleneksel damarını diri tutar. Şehir, son yıllarda yerel ağızların ve adetlerin korunduğu hikaye ve derleme çalışmalarıyla Anadolu’nun folklorik zenginliğine büyük katkı sağlar. Kütahya’nın her bir sokağı, bir masalın başlangıcı veya bir halk öyküsünün sonu kadar samimi bir atmosfere sahiptir." },
    p3_back: { img: "", txt: "Bugün Kütahya; Vahit Paşa Yazma Eser Kütüphanesi gibi nadide hazineleri ve modern kültür merkezleriyle bir bilgi yuvasıdır. Aizanoi Antik Kenti’nin devasa sütunları arasında veya tarihi bir konakta kahveni yudumlarken bir kitap okumak, zamanı bir çini tabağın içindeki desenler gibi dondurmak demektir. Kütahya’nın kütüphanesini açmak; toprağın dile gelişini dinlemek, tarihin en saf haline tanık olmak ve sanatın her dalıyla örülmüş bir hayatı okumaktır." }
},
    "Malatya": {
    base: { img: "", txt: "Malatya, Fırat’ın bereketiyle sulanan, arkasını heybetli Beydağları’na yaslamış, güneşin altın meyvesi kayısının ana vatanıdır. Edebiyatımızda 'misafirperverlik', 'sadakat' ve 'toplumsal bilinç'in sembolüdür. Malatya edebiyatı; Arslantepe’den yükselen kadim devlet aklından, Battalgazi’nin kahramanlık destanlarına ve modern Türkiye’nin fikir hayatını şekillendiren güçlü kalemlere uzanan çok katmanlı bir anlatıdır." },
    p1: { img: "", txt: "Malatya’nın edibi kimliği, yetiştirdiği devlet adamları ve entelektüellerle Türk siyasi ve düşünce tarihine damga vurmuştur. Şehir, bir 'fikir mutfağı' gibidir. Yerel edebiyatta Beydağları’nın sarp duruşu insanın karakterine, ovadaki kayısı bahçelerinin yumuşaklığı ise diline yansımıştır. Malatya, mısraların toprakla hemhal olduğu, kelimelerin ise birer 'akıl ve gönül' süzgecinden geçerek kağıda döküldüğü bilge bir şehirdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Battalgazi efsaneleri merkezi bir yer tutar. Anadolu’nun fethini ve İslam’ın yayılışını anlatan bu destanlar, Malatya’nın kahramanlık ve mertlik üzerine kurulu sözlü geleneğinin temelidir. Ayrıca, eski Malatya (Battalgazi) sokaklarında yankılanan tasavvufi sesler ve medrese kültürü, şehrin edebi çehresine derin bir manevi olgunluk katmıştır. Malatya, tarihin tozlu sayfalarını kahramanlık türküleriyle havalandıran bir kütüphanedir." },
    p2_back: { img: "", txt: "Malatya edebiyatı aynı zamanda bir 'hasret ve kavuşma' edebiyatıdır. Gurbete giden Malatyalıların memleket özlemi, meşhur Malatya türkülerinde ve yerel öykülerde en hüzünlü haliyle yer bulur. Kernek Meydanı, Kanalboyu’nun çınar gölgeleri ve dilden dile dolaşan 'Fahri Kayahan' ezgileri; şehrin sosyal hafızasını oluşturan edebi unsurlardır. Kütüphanemiz, kayısı çiçeği kokulu mektuplar ve bir fincan acı kahve tadındaki dostluk hikayeleriyle bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Malatya; güçlü yayıncılık geleneği, kütüphaneleri ve sanat merkezleriyle Doğu’nun en önemli kültür odaklarından biridir. Şehir, toplumsal gerçekçi edebiyata ve modern düşünceye yön veren pek çok yazarı bağrından çıkarmıştır. Malatya’nın dar sokaklarındaki kerpiç evlerden yükselen hikayeler, bugün modern Türk romanında Anadolu insanının modernleşme sancılarını ve köklerine bağlılığını anlatan güçlü birer ses olarak yankılanır." },
    p3_back: { img: "", txt: "Bugün Malatya; kütüphaneleri, üniversitesi ve uluslararası festivalleriyle kültürel mirasını yarınlara taşımaktadır. Bir kayısı ağacının gölgesinde, Beydağları’na karşı kitap okumak, Anadolu’nun o hem mağrur hem de mütevazı ruhuna dokunmak demektir. Malatya’nın kütüphanesini açmak; tarihin derinliklerinden gelen bir fısıltıyı duymak, emeğin tatlı meyvesini tatmak ve Fırat’ın coşkusuyla yazılmış o sarsılmaz kardeşlik destanını okumaktır." }
},
    "Manisa": {
    base: { img: "", txt: "Manisa, Spil Dağı’nın heybetli eteklerinde, Gediz Ovası’nın bereketli kucağında yer alan, Osmanlı şehzadelerinin olgunlaştığı bir 'İrfan Şehri'dir. Edebiyatımızda 'gelenek', 'şifa' ve 'mitoloji'nin sembolüdür. Manisa edebiyatı; Niobe’nin (Ağlayan Kaya) binlerce yıllık hüzünlü hikayesinden, saray kütüphanelerinin vakur sessizliğine ve üzüm bağlarından yükselen neşeli Ege türkülerine kadar uzanan çok katmanlı bir anlatıdır." },
    p1: { img: "", txt: "Manisa’nın edebi kimliği, her şeyden önce bir 'Şehzadeler Şehri' olmasıyla şekillenmiştir. Fatih Sultan Mehmet’ten Kanuni Sultan Süleyman’a kadar pek çok padişahın burada eğitim alması, şehri bir kültürel çekim merkezi haline getirmiştir. Saray çevresinde gelişen divan edebiyatı, Kütüphanemizin en zarif ve ağdalı sayfalarını oluşturur. Manisa, kelimelerin bir devlet disipliniyle seçildiği, mısraların ise bir imparatorluk vizyonuyla dokunduğu bilge bir şehirdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Şifa ve Hoşgörü' kavramları Merkez Efendi ve Mesir geleneğiyle hayat bulur. Her yıl saçılan Mesir macunu, aslında toplumsal bir dayanışmanın ve yaşama sevincinin metinleşmiş halidir. Spil Dağı’nın endemik çiçekleri ve efsaneleri ise, Manisalı şairler için bitmek bilmeyen birer imge deposudur. Niobe’nin taşlaşan hüzünlü hikayesi, bu topraklarda dramatik anlatının ve mitolojik derinliğin köşe taşıdır." },
    p2_back: { img: "", txt: "Manisa edebiyatı aynı zamanda bir 'toprak ve emek' edebiyatıdır. Gediz Ovası’nın dünyaca ünlü çekirdeksiz üzümü, pamuğu ve tütünü; yerel yazarların kaleminde bereketin ve çiftçinin kaderinin simgesi olmuştur. Şehrin dar sokaklarındaki Rumeli göçmenlerinin anıları, mübadelenin getirdiği hüzün ve yeniden kurulan hayatlar; Manisa’nın sosyal hafızasını oluşturan güçlü anlatılardır. Kütüphanemiz, toprak kokan hikayeler ve kadim dostluklarla bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Manisa; Yakup Kadri Karaosmanoğlu gibi dev isimlerin köklerine ev sahipliği yapmasıyla gurur duyar. Karaosmanoğlu’nun 'Yaban'ı yazarken Anadolu insanına bakışı, aslında bu toprakların derin analizlerinden biridir. Şehir, son yıllarda gelişen üniversite kültürü ve sanayi hamlesiyle birlikte, modern kentleşme ve gelenek arasındaki dengeyi sorgulayan yeni nesil yazarların da esin kaynağı olmaya devam etmektedir." },
    p3_back: { img: "", txt: "Bugün Manisa; Muradiye Külliyesi’ndeki huzuru, tarihi kütüphaneleri ve her yıl düzenlenen kitap fuarlarıyla Ege’nin entelektüel duraklarından biridir. Spil Dağı’nın zirvesinden ovayı seyrederken bir kitap okumak, tarihin ve doğanın o muazzam uyumuna tanıklık etmek demektir. Manisa’nın kütüphanesini açmak; bir şehzadenin hayallerine ortak olmak, şifalı bir sözle iyileşmek ve Anadolu’nun o en bereketli, en vakur hikayesini okumaktır." }
},
    "Kahramanmaraş": {
    base: { img: "", txt: "Kahramanmaraş, Akdeniz’in doğusunda, Ahır Dağı’nın eteklerinde yükselen, ruhu şiirle yıkanmış bir 'Edebiyat Başkenti'dir. Milli Mücadele’de gösterdiği eşsiz kahramanlıkla 'Kendi kendini kurtaran şehir' unvanını alan bu topraklar, edebiyatımızda direnişin, imanın ve lirik bir bilgeliğin sembolüdür. Maraş edebiyatı; kalesindeki bayrak rüzgarından, dar sokaklarındaki o derin manevi iklime uzanan sarsılmaz bir destandır." },
    p1: { img: "", txt: "Kahramanmaraş’ın edebi kimliği denince akla gelen en büyük olgu 'Yedi Güzel Adam'dır. Cahit Zarifoğlu, Erdem Bayazıt, Rasim Özdenören ve arkadaşlarının bu şehirde filizlenen edebi dostluğu, Türk edebiyatına modern ve mistik bir soluk getirmiştir. Maraş, sadece bir yerleşim yeri değil, bir 'ekol'dür. Şiirin her evde ekmek gibi bölüşüldüğü, kelimelerin ise mühimmat gibi titizlikle seçildiği bu şehir, Türkiye’nin en güçlü kalemlerini bağrında büyütmüştür." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda İstiklal ruhu her satırda kendini hissettirir. Sütçü İmam’ın attığı ilk kurşun, Maraş edebiyatında hürriyetin en temel imgesidir. Halkın bağımsızlık aşkı, Necip Fazıl Kısakürek’in bu topraklara olan derin bağlılığı ve yerel şairlerin kaleminden dökülen epik mısralar; Maraş’ı vatan edebiyatının kalesi yapar. Burada şair olmak, sadece hislenmek değil, bir milletin onurunu ve inancını kelimelerle savunmaktır." },
    p2_back: { img: "", txt: "Maraş edebiyatı aynı zamanda bir 'halk bilgeliği' ve 'gönül dili' edebiyatıdır. Aşık Mahzuni Şerif gibi ozanların yetiştiği bu topraklar, Anadolu’nun dertlerini ve toplumsal gerçeklerini sazın teliyle dünyaya duyurmuştur. Şehrin meşhur dondurması ve mutfağı etrafında şekillenen sosyal hayat ise, hikayelerin en lezzetli ve samimi dekorunu oluşturur. Maraş kütüphanesi; hem bir destan kitabı kadar ağırbaşlı hem de bir halk türküsü kadar içtendir." },
    p3_front: { img: "", txt: "Modern dönemde Kahramanmaraş; Türkiye’nin tek Edebiyat Müzesi’ne ev sahipliği yapması ve UNESCO Tasarım Şehri (Edebiyat dalında) yolundaki adımlarıyla bu mirası dünya vitrinine taşımaktadır. Şehirdeki kıraathanelerden üniversite sıralarına kadar her yerde şiir konuşulur. Maraş, geleneğin o sarsılmaz köklerinden beslenirken, modern edebiyatın en yenilikçi ve soyut denemelerine de kapılarını sonuna kadar açan entelektüel bir merkezdir." },
    p3_back: { img: "", txt: "Bugün Kahramanmaraş; kütüphaneleri, şiir festivalleri ve 'Şiir Yolu' gibi tematik alanlarıyla edebiyat tutkunları için bir hac mekanı gibidir. Tarihi kaleden şehri seyrederken bir şiir kitabı açmak, rüzgarın getirdiği o destansı fısıltıyı duymak demektir. Kahramanmaraş’ın kütüphanesini açmak; 'Yedi Güzel Adam'ı selamlamak, bağımsızlığın tadına varmak ve Türkçenin en gür, en temiz ve en dokunaklı sesini yüreğinde hissetmektir." }
},
    "Mardin": {
    base: { img: "", txt: "Mardin, Mezopotamya’nın uçsuz bucaksız denizine tepeden bakan, evlerin birbirinin ışığını kesmediği, taşın nakış gibi işlendiği bir 'müze şehir'dir. Edebiyatımızda 'çok kültürlülük', 'mistisizm' ve 'zamanın durduğu yer'in sembolüdür. Mardin edebiyatı; Süryanice duaların, Arapça ezgilerin ve Türkçe şiirlerin Mezopotamya rüzgarıyla harmanlandığı, her taşı ayrı bir efsane anlatan kadim bir kütüphanedir." },
    p1: { img: "", txt: "Mardin’in edebi kimliği, iç içe geçmiş kültürlerin yarattığı muazzam bir zenginlikten beslenir. Şehir, Murathan Mungan gibi kalemlerin eserlerinde masalsı bir atmosfere bürünür. 'Mezopotamya Üçlemesi'nde olduğu gibi, Mardin sadece bir mekan değil; cinlerin, insanların, aşkların ve kadim törelerin dans ettiği büyülü bir gerçeklik alanıdır. Burada yazılan her satır, binlerce yıllık bir tortunun gün yüzüne çıkmış halidir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda manastırların, camilerin ve dar abbara sokaklarının mistik havası hakimdir. Deyrulzafaran Manastırı’nın binlerce yıllık yazma eserleri ve Kasımiye Medresesi’nin felsefi derinliği, Mardin’i bölgenin en önemli ilim ve irfan merkezlerinden biri yapar. Taş işçiliğindeki o inanılmaz detaylar, Mardinli yazarların diline bir 'nakış titizliği' olarak yansımıştır. Mardin, kelimelerin taşın sertliğiyle değil, ruhun inceliğiyle yontulduğu bir şehirdir." },
    p2_back: { img: "", txt: "Mardin edebiyatı aynı zamanda bir 'kardeşlik ve barış' edebiyatıdır. Ezan sesinin çan sesine karıştığı bu coğrafyada, farklı inançların hikayeleri birbirine eklemlenerek devasa bir insanlık anlatısı oluşturur. Telkari gümüşünün inceliği, mahlep kokulu çöreklerin tadı ve damlarda anlatılan yıldız hikayeleri; şehrin sözlü kültürünün en değerli hazineleridir. Mardin kütüphanesi, ötekileştirmeyen, herkesi kendi diliyle kucaklayan bilge bir gönül sofrasıdır." },
    p3_front: { img: "", txt: "Modern dönemde Mardin; film festivalleri, sanat bienalleri ve şiir günleriyle Mezopotamya’nın parlayan kültürel yıldızıdır. Dar sokaklardaki butik otellere dönüşen tarihi konaklar, bugün genç yazarların ve seyyahların ilham tazelediği mekanlardır. Şehir, göçün ve değişimin sancılarını taşırken bir yandan da köklerinden aldığı güçle dünya edebiyatına 'yerelden evrensele' uzanan özgün imgeler sunmaya devam etmektedir." },
    p3_back: { img: "", txt: "Bugün Mardin; daracık sokaklarındaki gizemli abbaraları, Mezopotamya ovasına açılan balkonları ve tarihi kütüphaneleriyle bir dünya mirasıdır. Geceleyin 'yeryüzünün gökyüzü' gibi parlayan bu şehirde bir kitap okumak, zamanın ötesine geçip bir masal kahramanıyla tanışmak gibidir. Mardin’in kütüphanesini açmak; tarihin derin nefesini hissetmek, farklı dillerin ortak şarkısını duymak ve taşların fısıldadığı o ölümsüz aşkları okumaktır." }
},
    "Muğla": {
    base: { img: "", txt: "Muğla, dantel gibi işlenmiş koyları, gökyüzüne uzanan çam ormanları ve beyaz duvarlı evleriyle Ege’nin en mavi, en yeşil ve en bilge şehridir. Edebiyatımızda 'mavi yolculuk', 'deniz tutkusu' ve 'doğaya dönüş'ün sembolüdür. Muğla edebiyatı; antik çağın Karya mitolojisinden, Halikarnas Balıkçısı’nın Akdeniz’e yazdığı aşk mektuplarına kadar uzanan, her sayfası iyot ve çam kokan bir özgürlük anlatısıdır." },
    p1: { img: "", txt: "Muğla’nın edebi kimliği, Cevat Şakir Kabaağaçlı (Halikarnas Balıkçısı) ile yeniden tanımlanmıştır. Sürgün olarak geldiği bu şehre aşık olan yazar, Bodrum’u ve çevresini dünya edebiyatının deniz merkezlerinden biri haline getirmiştir. Onun 'Merhaba!' deyişi, sadece bir selam değil; denize, emeğe ve antik tarihe açılan bir kapıdır. Muğla, kelimelerin bir balıkçı ağındaki pullar gibi parladığı ve mavisini her dizeye bulaştırdığı bir sahil kütüphanesidir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, Knidos’tan Kaunos’a uzanan antik kentlerin kalıntılarında saklıdır. Filozofların, astronomların ve şairlerin yetiştiği bu topraklar, modern yazarlar için de bitmek bilmeyen birer arkeolojik ve entelektüel hazinedir. Şadan Gökovalı’nın rehberliğinde şekillenen 'Mavi Yolculuk' kültürü, edebiyatı sadece kağıt üzerinden çıkarıp teknelerin güvertesine, yıldızların altına ve Akdeniz’in köpüklerine taşımıştır. Muğla, tarihin ve denizin iç içe geçtiği bir destandır." },
    p2_back: { img: "", txt: "Muğla edebiyatı aynı zamanda bir 'yayla ve toprak' edebiyatıdır. Kıyıdaki turistik hayatın ötesinde, iç kısımlardaki Muğla evleri, bacaları ve dar sokakları; geleneksel yaşamın en naif öykülerini barındırır. Yerel halkın şiveli anlatımları, Muğla ağzıyla söylenen türküler (Ormancı, Çökertme vb.) ve Yörük kültürünün getirdiği o hür ses; şehrin sosyal hafızasının en samimi parçalarıdır. Kütüphanemiz, bu toprakların hem hüzünlü hem de neşeli insan manzaralarıyla doludur." },
    p3_front: { img: "", txt: "Modern dönemde Muğla; sadece Bodrum ile değil, Datça’nın o sessiz ve şiirsel derinliğiyle de anılır. Can Yücel’in 'Mekanım Datça olsun' vasiyeti, ilçeyi modern Türk şiirinin kutsal bir mekanı haline getirmiştir. Muğla, bugün pek çok sanatçıya, yazara ve düşünürlere ev sahipliği yaparak Türkiye’nin en büyük entelektüel sığınaklarından biri olmaya devam etmektedir. Şehir, kaosun uzağında, zeytin ağaçlarının gölgesinde yazılan eserlerin ana yurdudur." },
    p3_back: { img: "", txt: "Bugün Muğla; üniversitesi, yerel festivalleri ve sayısız kültür eviyle Ege’nin entelektüel kalbidir. Akyaka’nın azmak nehrinde, Datça’nın taş sokaklarında veya Bodrum kalesinin gölgesinde bir kitap okumak, Halikarnas Balıkçısı’nın mirasına sahip çıkmak demektir. Muğla’nın kütüphanesini açmak; mavinin her tonunu öğrenmek, antik çağın bilgeliğine dokunmak ve hayatın en güzel mısrasını bir zeytin dalının ucunda bulmaktır." }
},
    "Muş": {
    base: { img: "", txt: "Muş, Doğu Anadolu’nun kalbinde, tarihin akışını değiştiren Malazgirt Zaferi’nin ruhuyla harmanlanmış, bereketli ovası ve heybetli dağlarıyla vakur bir şehirdir. Edebiyatımızda 'kahramanlık', 'hasret' ve 'sarsılmaz sabır'ın simgesidir. Muş edebiyatı; 1071’den bugüne uzanan epik destanlardan, kışın sessizliğinde damlarda anlatılan masallara ve her dizede yankılanan 'Muş Türküsü'nün o derin hüznüne uzanan bir kütüphanedir." },
    p1: { img: "", txt: "Muş’un edebi kimliği, her şeyden önce bir 'kapı' olma özelliğiyle şekillenmiştir. Anadolu’nun kapılarını açan Malazgirt, Türk edebiyatında fetih ve vatanseverlik konulu şiirlerin, romanların en görkemli sahnesidir. Şehir, bu büyük tarihi mirasın gölgesinde, sözlü gelenekle beslenen kahramanlık anlatılarını modern döneme taşımıştır. Muş, kelimelerin bir bayrak gibi yükseldiği, mısraların ise bir milletin kaderini fısıldadığı destansı bir duraktır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Muş Ovası' ve 'Muş Türküsü' ayrılmaz bir bütündür. Meşhur 'Burası Muş’tur, yolu yokuştur' dizesi, edebiyatımızda gurbetin, askerin ve ayrılığın en çarpıcı ifadesidir. Bu türküyle özdeşleşen hüzün, Muşlu şairlerin kaleminde lirik bir derinliğe dönüşür. Kışın karlarla kaplanan, baharda ise endemik Muş lalesiyle kırmızıya boyanan bu coğrafya, doğacı ve duygusal bir anlatının en saf halini sunar." },
    p2_back: { img: "", txt: "Muş edebiyatı aynı zamanda bir 'maneviyat ve söz' edebiyatıdır. Şehirdeki tarihi medreseler ve dini merkezler, Kuran kurslarından yetişen şairlerin mistik ve tasavvufi yönünü beslemiştir. Dengbejlik geleneğinin bu topraklardaki izdüşümleri, Doğu Anadolu’nun o yanık ve öyküsel anlatım tarzını Muş’un yerel ağzıyla birleştirir. Kütüphanemiz, Fırat’ın kollarının şırıltısı gibi akan uzun anlatılar ve köklü halk hikayeleriyle bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Muş; üniversitesinin getirdiği kültürel hareketlilik ve yerel yazarların 'şehir ve kimlik' üzerine kurduğu yeni anlatılarla dikkat çeker. Şehir, sert iklim şartlarına rağmen insanının kalbindeki sıcaklığı ve misafirperverliği anlatan sosyal gerçekçi metinlere ev sahipliği yapar. Muş, sadece bir coğrafya değil; geçmişin heybetli hatıralarıyla bugünün modern arayışlarını ovadaki bir rüzgar gibi birbirine karıştıran canlı bir eserdir." },
    p3_back: { img: "", txt: "Bugün Muş; kütüphaneleri, Malazgirt kutlamaları ve ovayı seyreden tarihi kalesiyle kültürel bir hafıza merkezidir. Malazgirt Meydan Muharebesi alanında veya ovadaki bir köy evinde kitap okumak, tarihin o büyük adımlarını iliklerinde hissetmek demektir. Muş’un kütüphanesini açmak; Malazgirt’in sesini duymak, Muş lalesinin narinliğine tanık olmak ve Anadolu’nun o en hüzünlü ama en mağrur türkülerine eşlik etmektir." }
},
    "Nevşehir": {
    base: { img: "", txt: "Nevşehir, 'Güzel Atlar Ülkesi' Kapadokya’nın kalbi, doğanın sabırla yonttuğu bir heykel şehir ve insan elinin kayalara kazıdığı kadim bir sığınaktır. Edebiyatımızda 'mistisizm', 'hoşgörü' ve 'fantastik gerçeklik'in sembolüdür. Nevşehir edebiyatı; Hacı Bektaş Veli’nin 'aslanla ceylanı bir arada tutan' öğretisinden, peribacalarının gölgesinde yazılan sürrealist öykülere kadar uzanan büyüleyici bir anlatıdır." },
    p1: { img: "", txt: "Nevşehir’in edebi ruhunun en güçlü damarı, Hacıbektaş ilçesinde atan o evrensel kalp, yani Hacı Bektaş Veli’dir. Onun 'İlimden gidilmeyen yolun sonu karanlıktır' diyen bilgeliği, bu coğrafyayı sadece bir yerleşim yeri değil, bir düşünce merkezi haline getirmiştir. 'Makalat' başta olmak üzere bu gelenekten süzülen metinler, Türk edebiyatında insan sevgisinin, adaletin ve barışın en saf kaynağıdır. Şehir, ruhun arındığı sessiz bir kütüphanedir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Kapadokya’nın eşsiz jeolojisi, yazarlar için devasa bir metafor hazinesidir. Yer altı şehirlerinin dar tünelleri, kayalara oyulmuş kiliseler ve rüzgarın şekillendirdiği peribacaları; yerel ve ulusal yazarların kaleminde yalnızlık, gizem ve tarihsel hesaplaşma temalarına dönüşür. Nevşehir, sadece üzerinde yaşanılan değil, altına doğru derinleşen hikayeleriyle Anadolu’nun en 'katmanlı' edebi sahasıdır. Burada taşın dile gelmesi bir masal değil, gerçektir." },
    p2_back: { img: "", txt: "Nevşehir edebiyatı aynı zamanda bir 'kültürel kesişme' anlatısıdır. Ürgüp, Göreme ve Avanos hattında Rumlardan kalan eski taş konaklar, mübadele hikayeleri ve ipek yolu üzerindeki kervansarayların hatıraları; şehrin sosyal hafızasını oluşturur. Avanos’un kızıl toprağından şekillenen çömlekler gibi, buradaki öyküler de sabırla, el emeğiyle ve toprak kokusuyla yoğrulmuştur. Kütüphanemiz, bu mistik vadilerin rüzgarını taşıyan lirik sayfalarla bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Nevşehir; sinema ve edebiyatın en gözde doğal platosu haline gelmiştir. Yerli ve yabancı pek çok yazarın 'büyülü gerçekçilik' akımına kapıldığı bu coğrafya, balonların gökyüzünü süslediği o modern karelerin altına, binlerce yıllık bir suskunluğu ekler. Şehir, bugün düzenlenen edebiyat festivalleri ve sanat çalıştaylarıyla, Kapadokya’nın estetik mirasını çağdaş sanatın ve kelimelerin gücüyle birleştirmeye devam etmektedir." },
    p3_back: { img: "", txt: "Bugün Nevşehir; peribacalarının arasındaki butik kütüphaneleri, Hacıbektaş’taki manevi atmosferi ve Avanos’un sanat atölyeleriyle Anadolu’nun en özgün kültür duraklarından biridir. Bir peribacasının gölgesinde veya bir mağara evin serinliğinde kitap okumak, zamanın hem durduğuna hem de sonsuzluğa aktığına tanıklık etmektir. Nevşehir’in kütüphanesini açmak; bir dervişin duasına ortak olmak, yer altının gizemini çözmek ve doğanın en güzel rüyasını okumaktır." }
},
    "Niğde": {
    base: { img: "", txt: "Niğde, İç Anadolu’nun güneyinde, Aladağlar’ın heybetli gölgesinde yükselen, Selçuklu zarafetiyle yoğrulmuş kadim bir tarihin adıdır. Edebiyatımızda 'sadakat', 'tevazu' ve 'sarsılmaz direnç'in sembolüdür. Niğde edebiyatı; Alaaddin Camii’nin taş işçiliğindeki 'Taçlı Kadın' siluetinden, bereketli elma bahçelerine ve Anadolu’nun kalbinden yükselen o mert ve vakur sese uzanan derin bir kütüphanedir." },
    p1: { img: "", txt: "Niğde’nin edebi kimliği, her şeyden önce tarihin ve geleneğin koruyuculuğuyla şekillenmiştir. Şehir, Faruk Nafiz Çamlıbel’in meşhur 'Han Duvarları' şiirinde geçen o uçsuz bucaksız yolların ve hanların ruhunu taşır. Niğde sokaklarında dolaşırken, mısraların bir Selçuklu kitabesinde donup kaldığını ya da bir kervansarayın avlusunda yankılandığını hissedersiniz. Burası, kelimelerin taşla dertleştiği, edebiyatın ise sabırla işlendiği bir Anadolu ocağıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda maneviyat ve kahramanlık iç içedir. Niğde, sadece tarihi eserleriyle değil, bağrından çıkardığı Ömer Halisdemir gibi modern çağın destan yazan isimleriyle de edebiyata konu olmuştur. Bu topraklarda yazılan epik şiirler ve hikayeler, vatan sevgisinin ve feragatin en somut örneklerini sunar. Niğde, bir milletin sadakatini ve cesaretini mısralara nakşeden, sarsılmaz bir kale gibidir." },
    p2_back: { img: "", txt: "Niğde edebiyatı aynı zamanda bir 'halk bilgeliği' ve 'gündelik hayatın mizahı' edebiyatıdır. 'Geçti Bor’un pazarı, sür eşeği Niğde’ye' deyimiyle hafızalara kazınan bu coğrafya, kaçırılan fırsatların değil, her zaman bir umudun ve yeni bir yolun varlığını anlatır. Elma bahçelerinin kokusu, Niğde kalesi’nin sessizliği ve Bor’un tarihi çarşısı; yerel yazarların kaleminde samimi, gösterişsiz ama derinliği olan insan hikayelerine dönüşür." },
    p3_front: { img: "", txt: "Modern dönemde Niğde; üniversitesinin getirdiği dinamizm ve kültürel festivalleriyle Anadolu’nun entelektüel duraklarından biri olmaya devam etmektedir. Şehir, Bolkar Dağları’nın eşsiz florası ve endemik türleri gibi, kendine has bir edebi dil geliştirmiştir. Modern Niğde şiiri, hem bozkırın hüznünü hem de gelişen bir kentin geleceğe dönük umutlarını aynı potada eritir." },
    p3_back: { img: "", txt: "Bugün Niğde; tarihi kütüphaneleri, Selçuklu mirası yapılar ve her yıl düzenlenen kültür sanat etkinlikleriyle geçmişin mirasını yarınlara taşımaktadır. Alaaddin Camii’nin gölgesinde veya bir elma ağacının altında kitap okumak, tarihin o sessiz ama güçlü fısıltısına kulak vermek demektir. Niğde’nin kütüphanesini açmak; sadakatin izini sürmek, Anadolu’nun o en dürüst ve en vakur hikayesini bizzat kaynağından dinlemektir." }
},
    "Ordu": {
    base: { img: "", txt: "Ordu, Karadeniz’in en zarif kıvrımında, denizin dağlarla el ele tutuştuğu, her tonuyla yeşilin başkentidir. Edebiyatımızda 'estetik', 'huzur' ve 'doğa tutkusu'nun sembolüdür. Ordu edebiyatı; rüzgarın fındık yapraklarındaki hışırtısından, balıkçı teknelerinin takasından yükselen umutlara ve Boztepe’den denize dökülen şiirsel bir rüyaya uzanan masmavi bir anlatıdır." },
    p1: { img: "", txt: "Ordu’nun edebi kimliği, Karadeniz’in hırçınlığını değil, dinginliğini ve sanatçı ruhunu yansıtır. Şehir, yetiştirdiği pek çok şair ve yazarla 'Kuzeyin Sanat Merkezi' olarak anılır. Ordu sokaklarında edebiyat; sadece kağıt üzerinde değil, bir sahil yürüyüşünde veya tarihi bir konağın cumbalarında soluk alır. Burası, kelimelerin deniz tuzuyla yıkanıp yayla güneşiyle kurutulduğu, naif ve derin bir edebiyat durağıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Boztepe' ve 'Deniz' vazgeçilmez iki imgedir. Şairler için Boztepe, şehre ve hayata en yukarıdan, en berrak gözle bakılan bir kürsü gibidir. Karadeniz’in o meşhur 'kara' değil, Ordu kıyılarındaki 'mor ve mavi' tonları, yerel yazarların kaleminde lirik birer tabloya dönüşür. Ordu, doğanın bizzat kendisinin bir başyapıt olduğu ve yazarın sadece bu güzelliğe şahitlik ettiği yaşayan bir kütüphanedir." },
    p2_back: { img: "", txt: "Ordu edebiyatı aynı zamanda bir 'emek ve mevsim' edebiyatıdır. Dünyanın en kaliteli fındığının yetiştiği bu topraklarda, hasat zamanı yaşanan heyecan, gurbetçilerin dönüşü ve bahçelerde yankılanan türküler; şehrin sosyal hafızasının temelidir. 'Ordunun Dereleri' türküsündeki gibi, aşkın ve ayrılığın en içli halleri bu coğrafyanın dereleriyle, tepeleriyle özdeşleşmiştir. Kütüphanemiz, fındık dallarının altındaki gölgelerde yazılmış sıcak insan hikayeleriyle bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Ordu; tiyatrosu, festivalleri ve sahil kütüphaneleriyle Karadeniz’in entelektüel ışığıdır. Türkiye’nin en eski ve köklü yerel tiyatrolarından birine sahip olması, şehre derin bir dramatik kültür katmıştır. Yason Burnu’ndaki Argonotlar efsanesinden modern şehir hikayelerine kadar Ordu, geçmişin mitolojik büyüsünü bugünün modern sanatıyla birleştiren eşsiz bir ilham kaynağıdır." },
    p3_back: { img: "", txt: "Bugün Ordu; teleferikle bulutların üzerine çıkılan Boztepe’deki seyir terasları ve sahil şeridindeki sanat duraklarıyla bir kültür limanıdır. Karadeniz’e karşı bir bankta oturup dalga sesleri eşliğinde kitap okumak, hayatın tüm telaşını geride bırakıp kelimelerin huzuruna sığınmak demektir. Ordu’nun kütüphanesini açmak; yeşilin binbir tonunu görmek, denizin sesini dinlemek ve Anadolu’nun bu en güler yüzlü kıyısında şiirle buluşmaktır." }
},
    "Rize": {
    base: { img: "", txt: "Rize, Kaçkar Dağları’nın gölgesinde, mavinin en hırçın haliyle yeşilin en bereketli tonunun kucaklaştığı, yağmurun başkentidir. Edebiyatımızda 'direnç', 'doğallık' ve 'coşku'nun sembolüdür. Rize edebiyatı; kemençenin tellerinden dökülen kıvrak atma türkülerden, fırtına deresi gibi bendine sığmayan destansı anlatılara ve yayla evlerinin dumanlı bacalarında saklı hüzünlü hikayelere uzanan capcanlı bir kütüphanedir." },
    p1: { img: "", txt: "Rize’nin edebi ruhu, doğanın sertliği ile insanın kıvrak zekasının çarpışmasından doğar. Şehir, 'Atma Türkü' geleneğiyle Türk halk edebiyatının en dinamik sözlü kültürlerinden birine sahiptir. Birbirine meydan okuyan mısralar, anlık zeka parıltıları ve mizah; Rize insanının kaleminde ve dilinde birer sanata dönüşür. Burada edebiyat, statik bir metin değil; çay bahçelerinde, yayla şenliklerinde ve horon halkalarında yaşayan, nefes alan bir eylemdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Çay' ve 'Gurbet' iç içe geçmiş iki ana temadır. 1920’lerden sonra bölgenin kaderini değiştiren çay tarımı, yerel edebiyatta emeğin ve toprağa bağlılığın simgesi olmuştur. Ancak Rize, aynı zamanda 'gurbet' demektir. Sevdiklerini geride bırakıp gidenlerin ardından yakılan ağıtlar ve geri dönenlerin getirdiği farklı kültürlerin izleri, Rize kütüphanesinin en duygulu sayfalarını oluşturur. Bu şehir, ayrılığın ve kavuşmanın Karadeniz lehçesiyle yazılmış halidir." },
    p2_back: { img: "", txt: "Rize edebiyatı aynı zamanda bir 'yaylalar ve efsaneler' anlatısıdır. Ayder’den Anzer’e, Pokut’tan Elevit’e uzanan o devasa boşlukta, sislerin arasından fırlayan masallar ve devlerin, perilerin hikayeleri yankılanır. Kaçkarlar’ın zirvelerinde yankılanan tulum sesi, aslında bu coğrafyanın yazılmamış romanlarının ezgisidir. Kütüphanemiz, yüksek rakımların oksijeniyle dolmuş, hürriyet tutkunu ve doğacı metinlerle bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Rize; ekolojik edebiyatın ve Karadeniz konulu biyografilerin merkezidir. Şehir, son yıllarda yetişen pek çok yazar ve akademisyenle, Karadeniz insanının karakteristik yapısını modern edebiyatın süzgecinden geçirerek sunmaktadır. Rize’nin sarp coğrafyası, bugün distopik kurgulardan doğa güzellemelerine kadar pek çok modern yazara, sınırları zorlayan bir mekan kurgusu ve benzersiz karakter prototipleri sağlar." },
    p3_back: { img: "", txt: "Bugün Rize; üniversitesi, çay müzeleri ve doğa içindeki kütüphaneleriyle Karadeniz’in kültürel direncini temsil etmektedir. Fırtına Deresi’nin uğultusunda veya bir yayla evinin verandasında kitap okumak, doğanın kendi sesini bir fon müziği gibi kelimelere katması demektir. Rize’nin kütüphanesini açmak; yağmurun sesini harflerde duymak, Kaçkarlar’ın heybetine tanık olmak ve bir fincan sıcak çayın buğusunda Karadeniz’in o bitmek bilmeyen enerjisini okumaktır." }
},
    "Sakarya": {
    base: { img: "", txt: "Sakarya, Marmara’nın doğusunda, adını aldığı nehrin bereketiyle yeşeren, göç yollarının ve kültürlerin harmanlandığı bir kucaklaşma şehridir. Edebiyatımızda 'insan sevgisi', 'emek' ve 'diriliş'in sembolüdür. Sakarya edebiyatı; Sait Faik’in hikayelerindeki o küçük insanların büyük dünyalarından, Necip Fazıl’ın 'Sakarya Türküsü'ndeki epik haykırışa kadar uzanan, hem hüzünlü hem de mağrur bir anlatıdır." },
    p1: { img: "", txt: "Sakarya’nın edebi ruhunun en naif ve derin sesi, modern Türk hikayeciliğinin öncüsü Sait Faik Abasıyanık’tır. Adapazarı doğumlu olan yazar, eserlerindeki o çocuksu merakı ve sıradan insana duyduğu derin şefkati bu toprakların çok kültürlü yapısından almıştır. Şehir, onun kaleminde sokaklardaki çocukların, balıkçıların ve esnafın samimiyetiyle can bulur. Sakarya, kelimelerin insan sıcaklığıyla yoğrulduğu bir 'iyilik' kütüphanesidir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Sakarya Nehri, sadece bir su kütlesi değil, bir kader arkadaşıdır. Necip Fazıl Kısakürek’in 'Sakarya Türküsü' şiiriyle bu nehir, Türk milletinin ayağa kalkışının ve tarihsel yükünün metaforu haline gelmiştir. 'Aynalarda başka bir anın aksini' arayan şairler için Sakarya, akışın ve değişimin sembolüdür. Şehir, nehrin kıyısında yazılan şiirlerle, Anadolu’nun bitmeyen enerjisini ve direncini mısralarına taşır." },
    p2_back: { img: "", txt: "Sakarya edebiyatı aynı zamanda bir 'mozaik ve kardeşlik' edebiyatıdır. Kafkaslar’dan, Balkanlar’dan ve Anadolu’nun dört bir yanından gelen insanların kurduğu bu şehir, anlatılarında bir arada yaşama sanatını işler. Çark Caddesi’nin kalabalığı, Sapanca Gölü’nün durgun huzuru ve uzun çarşının esnaf hikayeleri; Sakarya’nın sosyal hafızasının temel taşlarıdır. Kütüphanemiz, farklı dillerin ve kültürlerin birbirine eklemlendiği zengin bir insanlık öyküsüyle bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Sakarya; üniversitesi, sanat festivalleri ve yetişen genç kalemleriyle Marmara’nın kültürel dinamizmini temsil eder. 1999 depreminin getirdiği büyük acı, Sakarya edebiyatında 'yıkım ve yeniden doğuş' temalarını derinleştirmiş; şehir, acının içinden umudu çıkaran dayanıklı bir anlatı dili geliştirmiştir. Bugün Sakarya, Adapazarı’nın kalbinden Sapanca’nın kıyılarına kadar her köşesinde sanatın ve düşüncenin izini sürer." },
    p3_back: { img: "", txt: "Bugün Sakarya; Sait Faik Abasıyanık Müzesi, modern kütüphaneleri ve Sapanca Şiir Akşamları gibi etkinliklerle bir edebiyat merkezidir. Sakarya Nehri’nin kıyısında veya Sapanca Gölü’nün mavisini izlerken bir kitap okumak, hayatın akışına ve doğanın sükunetine aynı anda ortak olmak demektir. Sakarya’nın kütüphanesini açmak; insanın en saf halini keşfetmek, nehrin sesini duymak ve Anadolu’nun bu en renkli, en samimi hikayesini okumaktır." }
},
    "Samsun": {
    base: { img: "", txt: "Samsun, Karadeniz’in en geniş düzlüklerine yayılan, 19 Mayıs 1919 ruhuyla Türk milletinin kaderinin değiştiği 'Güneşin Doğduğu Şehir'dir. Edebiyatımızda 'istiklal', 'umut' ve 'yeniden doğuş'un sembolüdür. Samsun edebiyatı; Bandırma Vapuru’nun dalgaları yardığı o tarihi andan, Kızılırmak ve Yeşilırmak’ın bereketli deltalarındaki tarım hikayelerine uzanan dinamik bir kütüphanedir." },
    p1: { img: "", txt: "Samsun’un edebi kimliği, her şeyden önce 'Kurtuluş' temasıyla perçinlenmiştir. Milli Mücadele edebiyatının en önemli duraklarından biri olan şehir, pek çok şairin mısralarında bağımsızlık meşalesinin yandığı yer olarak kutsanır. Atatürk’ün şehre ayak bastığı Tütün İskelesi’nden yayılan o devrimci enerji, yerel ve ulusal yazarların kaleminde bir milletin uyanış destanına dönüşür. Samsun, kelimelerin birer hürriyet neferine dönüştüğü epik bir duraktır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda mitoloji ve doğa iç içedir. Terme civarında yaşadığına inanılan Amazon kadınlarının efsaneleri, Samsun edebiyatına kadın gücü ve savaşçı ruh temalarını katar. Öte yandan, Bafra ve Çarşamba ovalarının bereketli toprakları; tütün işçilerinin, çeltik tarlalarındaki emeğin ve toprağa bağlılığın sosyal gerçekçi öykülerini besler. Samsun, hem antik çağın gizemini hem de modern hayatın üretim gücünü aynı sayfada buluşturur." },
    p2_back: { img: "", txt: "Samsun edebiyatı aynı zamanda bir 'liman ve ticaret' edebiyatıdır. Şehrin kozmopolit yapısı, geçmişin Reji (tütün) fabrikası hatıraları ve Karadeniz’in dünyaya açılan en büyük kapısı olması; anlatılarda hareketlilik ve kültürel çeşitlilik olarak yer bulur. 'Çarşamba’yı Sel Aldı' türküsündeki hüzünlü ve lirik ton, Samsun’un yerel ağzıyla birleşerek şehrin duygusal hafızasını oluşturur. Kütüphanemiz, deniz tuzuyla kavrulmuş tütün yaprakları kokan samimi metinlerle doludur." },
    p3_front: { img: "", txt: "Modern dönemde Samsun; Karadeniz’in en büyük kütüphanelerine, tiyatrolarına ve üniversite kültürüne ev sahipliği yaparak bölgenin entelektüel lokomotifi olmuştur. Şehir, son yıllarda yetişen pek çok yazar, araştırmacı ve şairle, Karadeniz edebiyatını 'hırçınlık' kalıbından çıkarıp daha kentsel ve felsefi bir boyuta taşımıştır. Atakum sahilindeki modern kafelerde yükselen genç sesler, Samsun’un edebi geleceğini evrensel değerlerle inşa etmektedir." },
    p3_back: { img: "", txt: "Bugün Samsun; Onur Anıtı’nın gölgesindeki vakur duruşu, sahil boyu uzanan kültür yolları ve kitap fuarlarıyla bir düşünce merkezidir. Amisos Tepesi’nden denizi seyrederken bir kitap okumak, tarihin akışını ve Karadeniz’in sonsuz ufkunu aynı anda kucaklamak demektir. Samsun’un kütüphanesini açmak; umudu tazelemek, bağımsızlık aşkını yeniden hissetmek ve Anadolu’nun bu en aydınlık kıyısında hürriyetin şarkısını dinlemektir." }
},
    "Siirt": {
    base: { img: "", txt: "Siirt, Mezopotamya’nın kuzeyinde, sarp dağların ve derin vadilerin arasında yükselen, binlerce yıllık medeniyetlerin izini taşıyan bir 'İrfan Şehri'dir. Edebiyatımızda 'maneviyat', 'vefa' ve 'kadim bilgi'nin sembolüdür. Siirt edebiyatı; İbrahim Hakkı Hazretleri’nin astronomiyle harmanlanmış marifetinden, Veysel Karani’nin anne sevgisiyle yoğrulmuş eşsiz sadakatine uzanan, ruhu dinginleştiren bir kütüphanedir." },
    p1: { img: "", txt: "Siirt’in edebi ve bilimsel kimliği, Tillo (Aydınlar) ilçesinde doruğa ulaşır. İbrahim Hakkı Hazretleri’nin yazdığı 'Marifetname', sadece dini bir metin değil; astronomiden tıbba, felsefeden edebiyata uzanan devasa bir ansiklopedidir. Şehrin kütüphanesi, gökyüzünü izleyen dervişlerin ve taşları bilgiyle yoğuran alimlerin sessiz ama güçlü fısıltılarıyla doludur. Siirt, kelimelerin yıldızlarla dertleştiği bir hakikat durağıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Işık Hadisesi' muazzam bir metafor olarak yer alır. Hocası İsmail Fakirullah için güneşin ilk ışıklarını hocasının başucuna düşüren o dahi mimari ve edebi zeka, Siirt edebiyatına 'ustaya hürmet' ve 'teknik estetik' kavramlarını kazandırmıştır. Botan Çayı’nın hırçın akışıyla dengelenen bu manevi huzur, yerel anlatılarda sabrın ve tevekkülün en güzel örneklerine dönüşür. Burası, ışığın ve bilginin kutsandığı bir topraktır." },
    p2_back: { img: "", txt: "Siirt edebiyatı aynı zamanda bir 'diller ve renkler' mozaiğidir. Türkçe, Arapça ve Kürtçe’nin yüzyıllardır aynı çarşılarda, aynı sofralarda yankılanması; şehrin sözlü kültürünü ve edebiyatını zenginleştirmiştir. 'Cas' evlerin serin avlularında anlatılan masallar, fıstık hasadında söylenen türküler ve meşhur büryan kebabı etrafında dönen sosyal sohbetler; Siirt’in yaşayan edebiyatıdır. Kütüphanemiz, bu çok dilli ve çok sesli kardeşliğin samimi mısralarıyla bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Siirt; tarihi dokusunu koruyan bir ilim merkezi olmaya devam ederken, üniversite kültürüyle de yenilenmektedir. Şehir, son yıllarda yetişen yazarlar ve şairlerle, Mezopotamya’nın geleneksel anlatım kalıplarını modern edebiyatın sorgulayıcı diliyle buluşturmaktadır. Deliklitaş’ın (Rasıl Hacar) uçurumundan Botan Vadisi’ne bakarken duyulan o sonsuzluk hissi, modern Siirt edebiyatının en güçlü esin kaynaklarından biridir." },
    p3_back: { img: "", txt: "Bugün Siirt; Veysel Karani Türbesi’ndeki manevi atmosferi, Tillo’daki yazma eserleri ve fıstık kokulu sokaklarıyla bir gönül durağıdır. Botan Vadisi’nin eşsiz manzarasında veya tarihi bir medrese avlusunda kitap okumak, zamanın ötesine geçip bir bilgenin dizinin dibine oturmak gibidir. Siirt’in kütüphanesini açmak; sadakatin anlamını çözmek, bilimin ışığında yol almak ve Anadolu’nun bu en derin, en vakur hikayesini bir derviş selamıyla okumaktır." }
},
    "Sinop": {
    base: { img: "", txt: "Sinop, Karadeniz’in kuzeye uzanan en uç ucu, antik çağın bilgelik merkezi ve Türkiye’nin en mutlu insanlarının yaşadığı masmavi bir limandır. Edebiyatımızda 'hürriyet', 'sürgün' ve 'felsefi derinlik'in sembolüdür. Sinop edebiyatı; Diyojen’in fıçısından yükselen toplumsal eleştiriden, meşhur zindanlarında yankılanan mahzun şiirlere ve balıkçı ağlarına takılan deniz masallarına uzanan eşsiz bir kütüphanedir." },
    p1: { img: "", txt: "Sinop’un edebi hafızasında 'Sinop Cezaevi' sarsılmaz bir yere sahiptir. 'Anadolu’nun Alkatraz’ı' olarak bilinen bu mekan, Sebahattin Ali gibi dev kalemlerin en hüzünlü ve en güçlü eserlerine ilham olmuştur. Onun 'Aldırma Gönül' dizesi, bu tarihi kalenin duvarlarından tüm Türkiye’ye yayılmış bir direniş ve sabır çığlığıdır. Sinop, kelimelerin demir parmaklıkları aşarak hürriyete ulaştığı, hüznün ise Karadeniz’in dalgalarıyla yıkandığı edebi bir hafıza mekanıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, antik çağın kinik filozofu Diyojen ile başlar. Onun büyük bir dürüstlük ve sadelikle örülü felsefesi, Sinop’un karakterine 'eyvallahsız' bir duruş katmıştır. Sinop edebiyatı, gösterişten uzak ama derinliği olan bir anlatı diline sahiptir. Hamsilos Koyu’nun fiyortları andıran sessizliği ve denizin ormanla kucaklaştığı Erfelek Şelaleleri; doğa yazarları ve şairler için bitmek bilmeyen birer dinginlik kaynağıdır. Burası, kelimelerin doğayla dertleştiği yerdir." },
    p2_back: { img: "", txt: "Sinop edebiyatı aynı zamanda bir 'liman ve gemi' edebiyatıdır. Tersanesinde yüzyıllarca gemilerin inşa edildiği bu şehirde, denizcilerin gurbet hikayeleri ve limana sığınan fırtınalı ruhların anlatıları geniş yer tutar. Şehrin meşhur kotra maketçiliği gibi, buradaki öyküler de büyük bir titizlikle ve sabırla yontulmuştur. Kütüphanemiz, deniz tuzuyla eskimiş sayfalar, ahşap kokulu atölyeler ve Karadeniz’in ufkuna dikilen gözlerin umut dolu hikayeleriyle bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Sinop; huzuru ve yaşam kalitesiyle Türkiye’nin 'mutluluk başkenti' olarak anılırken, bu durum yerel edebiyata daha ironik, daha barışçıl ve bilgece bir ton katmıştır. Şehir, son yıllarda düzenlenen Bienaller ve sanat etkinlikleriyle Karadeniz’in entelektüel duraklarından biri haline gelmiştir. Sinop’un sakin sokakları, bugün modern yazarın kaosun uzağında kendi iç sesini dinlediği ve 'mutluluğun felsefesini' yeniden yazdığı bir sığınaktır." },
    p3_back: { img: "", txt: "Bugün Sinop; tarihi cezaevi müzesi, kütüphaneleri ve gün batımının en güzel izlendiği surlarıyla bir kültür hazinesidir. Tarihi surların üzerinde oturup denize karşı bir kitap okumak, Sebahattin Ali’nin dizelerine eşlik etmek ve Diyojen’e bir selam göndermek demektir. Sinop’un kütüphanesini açmak; hürriyetin değerini anlamak, Karadeniz’in en kuzeyindeki o sessiz bilgeyi dinlemek ve hayatın en yalın, en samimi haline tanıklık etmektir." }
},
    "Sivas": {
    base: { img: "", txt: "Sivas, Anadolu’nun ortasında, tarihin ve kültürün kavşak noktasında yer alan, ozanların teliyle ve alimlerin kalemiyle yoğrulmuş bir 'Söz Şehri'dir. Edebiyatımızda 'hikmet', 'halk irfanı' ve 'sarsılmaz duruş'un sembolüdür. Sivas edebiyatı; Selçuklu’nun muazzam medreselerinden yükselen bilimsel fısıltılardan, Pir Sultan Abdal ve Aşık Veysel’in gönül gözünden dökülen ezgilere uzanan devasa bir kütüphanedir." },
    p1: { img: "", txt: "Sivas’ın edebi kimliği, her şeyden önce bir 'Ozanlar Diyarı' olmasıyla şekillenmiştir. Bu topraklar; Pir Sultan Abdal’dan Aşık Veysel’e kadar Türk halk şiirinin ve aşıklık geleneğinin en güçlü temsilcilerini bağrından çıkarmıştır. Aşık Veysel’in toprağa, insana ve hakikate dair kurduğu o duru dil, Sivas’ın dünyaya hediyesidir. Sivas, kelimelerin bağlamanın perdesinde can bulduğu ve hakikatin en yalın haliyle mısralara döküldüğü bilge bir şehirdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Selçuklu mirası, taşın dile gelmiş halidir. Gökmedrese, Çifte Minareli Medrese ve Şifahiye gibi yapılar; sadece mimari birer şaheser değil, aynı zamanda o dönemin entelektüel derinliğini yansıtan edebi metinler gibidir. Sivas edebiyatı, bu köklü ilim geleneği ile halkın samimi deyişlerini aynı potada eritir. Burası, bilginin aşkla, taşın ise şiirle buluştuğu kadim bir medeniyet merkezidir." },
    p2_back: { img: "", txt: "Sivas edebiyatı aynı zamanda bir 'mücadele ve bağımsızlık' edebiyatıdır. Sivas Kongresi’ne ev sahipliği yapması, şehri Milli Mücadele’nin ve Cumhuriyet’in kuruluş metinlerinin başkenti yapmıştır. 'Manda ve himaye kabul olunamaz' kararı, Sivas’ın edebi ve siyasi hafızasının en güçlü cümlesidir. Kütüphanemiz, bir milletin kaderinin yazıldığı o tarihi odaların vakur sessizliği ve vatan aşkıyla tutuşan epik metinlerle bezelidir." },
    p3_front: { img: "", txt: "Modern dönemde Sivas; kütüphaneleri, yaşayan ozan kültürleri ve her yıl düzenlenen aşıklar bayramıyla Anadolu’nun kültürel nabzını tutmaya devam eder. Şehir, hem kırsalın o saf anlatım gücünü hem de modern kentin getirdiği yeni edebi arayışları bir arada yaşatır. Sivas’ın ayazında ve bozkırın sonsuz ufkunda şekillenen modern şiir, geleneğin o sarsılmaz köklerinden beslenerek evrensel bir dille konuşmayı sürdürür." },
    p3_back: { img: "", txt: "Bugün Sivas; Şems-i Sivasi’den günümüz yazarlarına kadar uzanan geniş bir edebi yelpazeye sahiptir. Gökmedrese’nin gölgesinde veya bir ozanlar kahvesinde közde çay eşliğinde kitap okumak, Anadolu’nun o en samimi ve en derin sesine kulak vermek demektir. Sivas’ın kütüphanesini açmak; toprağın sadakatini öğrenmek, bir sazın teline dokunmak ve tarihin en ulu medreselerinde bir gönül yolculuğuna çıkmaktır." }
},
