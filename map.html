    p3_back: { img: "", txt: "Bugün Gaziantep; dev kütüphaneleri, yaşayan müzeleri ve her yıl düzenlenen kültür-sanat festivalleriyle bir cazibe merkezidir. Tarihi bir handa, bir fincan menengiç kahvesi eşliğinde kitap okumak, Mezopotamya’nın binlerce yıllık nefesini ensenizde hissetmek demektir. Gaziantep’in kütüphanesini açmak; bir yanıyla şanlı bir tarihin gururunu yaşamak, diğer yanıyla fıstığın yeşili ve bakırın kızıllığı arasında gizlenmiş o samimi insan hikayelerini keşfetmektir." }
},
    "Giresun": {
    base: { img: "", txt: "Giresun, Karadeniz’in masmavi sularına uzanan kalesi ve sırtını yasladığı yemyeşil dağlarıyla, doğanın şiirleştiği bir liman şehridir. Kirazın dünyaya yayıldığı, fındığın ise bir yaşam biçimine dönüştüğü bu topraklar, edebiyatımızda saflığın ve mücadelenin sembolüdür. Giresun edebiyatı; denizin tuzlu kokusuyla ormanın derin sessizliğinin harmanlandığı, hırçın ama bir o kadar da içten bir Karadeniz anlatısıdır." },
    p1: { img: "", txt: "Giresun’un edebi ve tarihi kimliğinin en sarsılmaz sütunu, Milli Mücadele’nin kahraman gönüllüleri olan 42. ve 47. Alaylardır. Topal Osman Ağa ve silah arkadaşlarının yazdığı bu direniş destanı, yerel edebiyatta vatan sevgisinin ve fedakarlığın en yüksek ifadesi olarak işlenir. Şehir, mısralarında bağımsızlık ateşini taşıyan şairlerin ve bu kahramanlık hikayelerini nesilden nesile aktaran halk ozanlarının gurur kaynağıdır." },
    p2_front: { img: "", txt: "Şehrin mistik ve edebi çehresi, Karadeniz’in yaşanabilir tek adası olan Giresun Adası (Aretias) ile şekillenir. Mitolojide Amazon kadınlarının yaşadığı ve Herkül’ün uğradığı yer olarak geçen bu ada, edebiyatçılar için gizemli bir kurgu merkezidir. Adanın etrafında dönen efsaneler, modern Giresun yazarları için hem tarihsel bir derinlik hem de fantastik bir ilham kaynağı sunarak, şehrin edebi sınırlarını denizlerin ötesine taşır." },
    p2_back: { img: "", txt: "Giresun edebiyatı aynı zamanda bir 'fındık ve gurbet' edebiyatıdır. Fındık bahçelerinde söylenen türküler, imece usulü çalışmaların yarattığı toplumsal dayanışma ve hasat zamanının neşesi; pek çok öyküye ve şiire can vermiştir. Ancak Karadeniz’in kaderi olan gurbet, Giresunlu yazarların kaleminde en çok işlenen temadır. Denize açılıp dönmeyenlerin, uzak diyarlarda memleket hasreti çekenlerin hikayeleri, şehrin kütüphanesindeki en hüzünlü sayfalardır." },
    p3_front: { img: "", txt: "Modern dönemde Giresun; Aziz Nesin’den Sabahattin Ali’ye kadar pek çok edebiyatçının iz bıraktığı veya eserlerinde değindiği bir duraktır. Şehrin tarihi Rum evleri, dar sokakları ve liman kahveleri; toplumsal gerçekçi romanların en canlı mekanlarıdır. Giresunlu kalemler, yerel kültürü ve ağız özelliklerini modern anlatım teknikleriyle birleştirerek, Karadeniz insanının pratik zekasını ve duygusal derinliğini tüm dünyaya tanıtmaktadır." },
    p3_back: { img: "", txt: "Bugün Giresun; kütüphaneleri, kale içindeki şiir dinletileri ve aksu festivalleriyle kültürel mirasını canlı tutmaktadır. Giresun Kalesi’nden denizi seyrederek bir kitap okumak, dalgaların sesindeki binlerce yıllık hikayeye kulak misafiri olmak demektir. Giresun’un kütüphanesini açmak; bir fındık dalının eğilişini izlemek, kemençenin ritmiyle coşmak ve doğanın en yalın haliyle yazdığı o bitimsiz romanı keşfetmektir." }
},
    "Gümüşhane": {
    base: { img: "", txt: "Gümüşhane, derin vadilerin ve yalçın dağların arasında gizlenmiş, adı gibi parlayan bir tarih ve kültür hazinesidir. Harşit Çayı’nın şekillendirdiği bu coğrafya, edebiyatımızda 'metanet' ve 'derinlik' sembolüdür. Gümüşhane edebiyatı; yer altındaki gümüş madenlerinin gizeminden, Zigana’nın geçit vermez dumanlı başından ve sarp kayalıklara asılı duran tarihi konakların sessizliğinden beslenen vakur bir anlatıdır." },
    p1: { img: "", txt: "Gümüşhane’nin edebi kimliği, yüzyıllarca süregelen madencilik kültürüyle iç içedir. Evliya Çelebi’nin seyahatnamesinde ballandırarak anlattığı o gümüş madenleri, sadece bir kazanç kapısı değil, aynı zamanda zorlu yaşam şartlarının ve sabrın edebi bir metaforudur. Şehrin yerel anlatılarında 'gümüş', saflığın ve emeğin sembolü olarak işlenir; maden ocaklarında yakılan türküler ise bölge insanının yerin yedi kat altındaki umudunu ve direncini mısralara döker." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Karaca Mağarası ve Santa Harabeleri gibi mekanlar, mistik ve fantastik kurgular için eşsiz bir zemin sunar. Mağaranın damla taşlarından süzülen zaman, şairlerin kaleminde sabrın ve doğanın sanatının birer kanıtı olarak tasvir edilir. Eski birer hayalet şehri andıran Santa ve İmera gibi yerleşimler ise, yazarlar için geçmişin seslerini, yaşanmış aşkları ve terk edilmişliklerin hüznünü anlatan hüzünlü birer şiir gibidir." },
    p2_back: { img: "", txt: "Gümüşhane, Türk edebiyatına Ahmed Ziyaüddin Gümüşhanevi gibi büyük manevi önderler ve düşünürler kazandırmış bir ilim yuvasıdır. Onun tasavvufi derinliği ve eserleri, şehrin edebi çehresine ahlaki bir olgunluk ve hikmet katmıştır. Ayrıca, Gümüşhane'nin meşhur kuşburnu ve pestil-köme kültürü, halk edebiyatında bereketin ve el emeğinin en tatlı yansıması olarak yer bulur; bu kültürel ögeler, yerel öykülerin içinde samimi birer motif olarak parlar." },
    p3_front: { img: "", txt: "Modern dönemde Gümüşhane; yetiştirdiği akademisyenler ve edebiyatçılarla Anadolu’nun sessiz ama üretken bir entelektüel durağıdır. Zigana’nın sisli yamaçlarında geçen gurbet ve yol hikayeleri, şehrin modern anlatıdaki en güçlü temalarını oluşturur. Harşit vadisi boyunca uzanan o sarp coğrafya, yazarlar için insanın doğa karşısındaki küçük ama onurlu mücadelesini simgeleyen devasa bir açık hava dekoru gibidir." },
    p3_back: { img: "", txt: "Bugün Gümüşhane; üniversitesi, modern kütüphaneleri ve geleneksel festivalleriyle kültürel birikimini yarınlara taşımaktadır. Eski Gümüşhane’nin (Süleymaniye Mahallesi) taş sokaklarında bir kitap okumak, tarihin gümüş bir tepsi üzerinde sunduğu hikayeleri dinlemek demektir. Gümüşhane’nin kütüphanesini açmak; vadilerin fısıltısını duymak, Zigana’nın sert ama dürüst havasını solumak ve bir cevherin işlenişi gibi kelimelerin saflaşmasına tanık olmaktır." }
},
    "Hakkari": {
    base: { img: "", txt: "Hakkari, gökyüzüne komşu zirvelerin, derin vadilerin ve binlerce yıllık bir aşiret kültürünün harmanlandığı, Anadolu’nun en gizemli ve mağrur şehridir. Cilo ve Sat dağlarının heybetiyle şekillenen bu coğrafya, edebiyatımızda 'ulaşılmazlık' ve 'saf doğa'nın simgesidir. Hakkari edebiyatı; Zap Suyu’nun hırçın akışından dökülen destanların, kış gecelerinde anlatılan sözlü anlatıların ve yüksek yaylalarda açan ters lalelerin hüzünlü güzelliğinin bir yansımasıdır." },
    p1: { img: "", txt: "Hakkari’nin edebi kimliği, Klasik Kürt edebiyatının dev isimleriyle köklenmiştir. Bu topraklarda yaşamış olan şairler, aşkı, ilahi arayışı ve insan ruhunun derinliklerini yüksek bir estetikle dile getirmiştir. Feqiyê Teyran’ın doğa ve kuşlarla olan mistik diyaloğu, bu coğrafyanın her bir taşında yankılanmaya devam eder. Hakkari, sözün bir nakış gibi işlendiği, şiirin ise bir yaşam biçimi olarak kabul edildiği kadim bir divandır." },
    p2_front: { img: "", txt: "Şehrin modern edebiyattaki en sarsıcı yansıması, Ferit Edgü’nün 'Hakkari’de Bir Mevsim' adlı eseridir. Bu roman, Hakkari’yi sadece bir mekan olarak değil, insanın kendi iç dünyasına yaptığı zorlu ve aydınlatıcı bir yolculuğun metaforu olarak işler. Şehrin kışları, karın örttüğü sessizlik ve dış dünyaya kapalı oluşu; edebiyatçılar için yalnızlığın, varoluşun ve insanın doğa karşısındaki çırılçıplak gerçeğinin en saf haliyle tasvir edildiği bir sahnedir." },
    p2_back: { img: "", txt: "Hakkari edebiyatı aynı zamanda zengin bir sözlü gelenek hazinesidir. Dengbejlerin gırtlağından dökülen klamlar, bu coğrafyanın acılarını, sevdalarını ve kahramanlıklarını yüzyıllardır diri tutar. Bu sözlü kütüphane, yazının henüz ulaşamadığı en ücra köylerde bile kültürel bir hafıza görevi görmüştür. Zap Suyu’nun gürültüsüyle yarışan bu yanık sesler, Hakkari’nin hem dertli hem de başı dik karakterini en samimi şekilde ifade eder." },
    p3_front: { img: "", txt: "Şehrin doğası, edebiyatın en güçlü imgelerini besler. Ters Lale (Ağlayan Gelin), Hakkari edebiyatında hem hüznün hem de bu topraklara has bir zarafetin sembolüdür. Yayla kültürü, göçebe yaşamın getirdiği dinamizm ve zorlu coğrafya şartları; yerel yazarların kaleminde birer hayatta kalma ve kimlik mücadelesine dönüşür. Hakkari, kendi içine kapalı gibi görünse de, ürettiği imgelerle Türk edebiyatının en özgün ve en etkileyici damarlarından biridir." },
    p3_back: { img: "", txt: "Bugün Hakkari; kütüphaneleri, kültürel araştırmaları ve genç nesil şairleriyle kendi sesini dünyaya duyurmaya devam etmektedir. Cilo Dağı’nın eteklerinde, bembeyaz karların ortasında bir kitap okumak, dünyanın gürültüsünden uzaklaşıp tarihin ve doğanın o derin sessizliğine ortak olmaktır. Hakkari’nin kütüphanesini açmak; dağların bilgeliğine kulak vermek, sabrın en yüce halini görmek ve Mezopotamya’nın kuzey kapısındaki o masalsı gerçekliğe dokunmaktır." }
},
    "Hatay": {
    base: { img: "", txt: "Hatay, tarihin en eski yerleşimlerinden biri olan, farklı inanç ve kültürlerin binlerce yıldır barış içinde harmanlandığı bir 'insanlık mozaiği'dir. Akdeniz’in sıcaklığı ile Mezopotamya’nın derinliğini birleştiren bu şehir, edebiyatımızda hoşgörünün, kardeşliğin ve kadim bilginin simgesidir. Hatay edebiyatı; Asi Nehri’nin tersine akışındaki asi ruhu, Saint Pierre Kilisesi’nin huzurunu ve Habib-i Neccar Camii’nin manevi iklimini aynı satırlarda buluşturur." },
    p1: { img: "", txt: "Hatay’ın edebi kimliği, her şeyden önce bir 'bir arada yaşama kültürü' üzerine kuruludur. Şehir; Arapça, Türkçe ve Fransızca gibi dillerin, farklı dinlerin ve geleneklerin iç içe geçtiği bir anlatı merkezidir. Bu zenginlik, Hataylı yazarların eserlerine evrensel bir bakış açısı ve derin bir empati duygusu katar. Burası, sadece bir şehir değil, farklı seslerin tek bir koro halinde yükseldiği muazzam bir dünya kütüphanesidir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Asi Nehri, başlı başına bir karakterdir. Dünyada tersine akan ender nehirlerden biri olan Asi; edebiyatçılar için dik duruşun, kurallara meydan okumanın ve özgünlüğün simgesidir. Antakya’nın dar sokakları, eski taş evleri ve her köşeden gelen baharat kokuları; yazarlar için duyusal bir şölen sunan, her adımda yeni bir öykü fısıldayan canlı birer dekordur. Hatay, tarihin tozlu sayfalarının bugünle kucaklaştığı edebi bir sahnedir." },
    p2_back: { img: "", txt: "Hatay edebiyatı aynı zamanda 'lezzetin ve sofranın' edebiyatıdır. Mutfak kültürü burada sadece bir yemek sanatı değil, toplumsal bağları güçlendiren, hikayelerin paylaşıldığı bir iletişim dilidir. Künefenin şerbeti gibi tatlı sohbetler, zeytin ağaçlarının gölgesinde anlatılan kuşak hikayeleri, şehrin sözlü edebiyatının temelini oluşturur. Hatay kütüphanesini açmak, bir yanıyla binlerce yıllık bir medeniyet sofrasına davet edilmek demektir." },
    p3_front: { img: "", txt: "Modern dönemde Hatay; özellikle Cemil Meriç gibi düşünce dünyamızın dev isimlerini yetiştirmiş olmasıyla gurur duyar. Meriç’in 'Bu Ülke'deki o derin entelektüel sorgulamaları, aslında Hatay’ın çok kültürlü ve sorgulayan yapısının bir yansımasıdır. Şehir, son yıllarda yaşanan büyük acılara rağmen, edebiyatın iyileştirici gücüyle küllerinden yeniden doğmaya devam eder. Hatay, dayanışmanın ve umudun mısralarda yeniden yeşerdiği bir direnç merkezidir." },
    p3_back: { img: "", txt: "Bugün Hatay; kütüphaneleri, kültür merkezleri ve yeniden inşa edilen tarihi mekanlarıyla edebi mirasını geleceğe taşımaktadır. Titus Tüneli’nin serinliğinde veya sahil boyunda bir kitap okumak, zamanın ötesinde bir yolculuğa çıkmak gibidir. Hatay’ın kütüphanesini açmak; barışın dilini öğrenmek, tarihin en eski dostluk hikayelerine tanıklık etmek ve medeniyetlerin o muazzam dansını her kelimede hissetmektir." }
},
    "Isparta": {
    base: { img: "", txt: "Isparta, Akdeniz’in iç kısımlarında yükselen, gül kokulu bahçeleri ve masmavi gölleriyle Anadolu’nun en zarif şehirlerinden biridir. 'Güller Diyarı' olarak anılan bu topraklar, edebiyatımızda estetiğin, doğanın ve sabrın sembolüdür. Isparta edebiyatı; gül yapraklarından süzülen bir aşk şiiri, halı tezgahlarından yükselen bir emek hikayesi ve Eğirdir Gölü’nün kıyısında dinlenen bilge bir anlatıdır." },
    p1: { img: "", txt: "Isparta’nın edebi ve kültürel dokusunun merkezinde 'Gül' yer alır. Gül, sadece bir çiçek değil; Divan edebiyatından halk edebiyatına kadar saflığın, sevginin ve ilahi aşkın en güçlü imgesidir. Şehrin her bahar pembe bir örtüye bürünmesi, şairler için bitmek bilmeyen bir esin kaynağı olmuştur. Isparta, kelimelerin gül kokusuyla harmanlandığı, mısraların ise bir gülistan zarafetiyle kağıda döküldüğü özel bir duraktır." },
    p2_front: { img: "", txt: "Şehrin edebi hafızası, Eğirdir Gölü ve antik Psidya mirasıyla derinleşir. Selçuklu döneminden kalan medreseler ve kaleler, Isparta’yı bir ilim ve irfan merkezi haline getirmiştir. Eğirdir Gölü’nün sakin suları, pek çok yazar için durgunluğun ve içsel yolculuğun metaforu olmuştur. Suyun aynasında yansıyan tarih, modern Isparta yazarlarının kaleminde geçmişle gelecek arasında kurulan sağlam bir köprüye dönüşür." },
    p2_back: { img: "", txt: "Isparta edebiyatı aynı zamanda bir 'emek ve zanaat' edebiyatıdır. Dünyaca ünlü Isparta halıları, sabrın ve dikkatin sembolüdür. Her ilmekte bir hayat hikayesi, her desende bir halk efsanesi saklıdır. Dokuma tezgahlarının başındaki kadınların türküleri ve sessiz duaları, şehrin sözlü edebiyatının en kıymetli hazinesidir. Isparta kütüphanesi, el emeğinin göz nuruyla birleştiği o nadide sayfalardan oluşur." },
    p3_front: { img: "", txt: "Modern dönemde Isparta; üniversitesinin getirdiği dinamizm ve lavanta turizmiyle edebiyatın daha renkli ve doğacı yönlerini ön plana çıkarır. Kuyucak’ın mor tarlaları, yeni nesil şairler için görsel bir şölen ve modern bir pastoral şiir alanıdır. Şehir, milli mücadele yıllarındaki dik duruşu ve Cumhuriyet dönemindeki kalkınma azmiyle de sosyal gerçekçi edebiyatın önemli duraklarından biri olmuştur." },
    p3_back: { img: "", txt: "Bugün Isparta; kütüphaneleri, gül festivalleri ve kültürel etkinlikleriyle Anadolu’nun parlayan yıldızlarından biridir. Eğirdir Gölü kıyısında, gün batımına karşı bir kitap okumak, doğanın kalbinde huzurlu bir mısraya sığınmak demektir. Isparta’nın kütüphanesini açmak; gülün hikayesini dinlemek, suyun sesine kulak vermek ve Anadolu’nun o en naif, en kokulu sayfalarını birer birer çevirmektir." }
},
