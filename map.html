<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İstem Koleji | Edebiyat Kütüphanesi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap');
        
        body { background: #1a120b; color: #eee; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }
        
        .header { 
            text-align: center; padding: 40px 20px; 
            background: linear-gradient(to bottom, #3c2a21, #1a120b); 
            border-bottom: 5px solid #d4a373; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        h1 { font-family: 'Playfair Display', serif; color: #d4a373; font-size: 2.5rem; margin: 0; text-shadow: 2px 2px 4px #000; }
        
        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }

        .search-container {
            text-align: center; margin-bottom: 40px; padding: 20px;
            background: rgba(60, 42, 33, 0.5); border-radius: 50px;
            border: 1px solid #d4a373; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        #citySearch { 
            display: inline-block; padding: 15px 25px; border-radius: 30px; 
            border: 2px solid #d4a373; background: #1a120b; color: #fff; width: 80%; max-width: 400px; 
            outline: none; font-size: 1rem; transition: 0.3s;
        }

        .shelf-container {
            background: #3c2a21; padding: 40px 20px; border-radius: 10px;
            box-shadow: inset 0 20px 40px rgba(0,0,0,0.7), inset 0 -10px 20px rgba(0,0,0,0.5);
            margin-bottom: 50px; position: relative; border: 10px solid #261a14;
        }

        .book-shelf { display: grid; grid-template-columns: repeat(27, 1fr); gap: 5px; justify-items: center; }

        .city-book-spine {
            width: 35px; height: 180px; cursor: pointer; position: relative; transition: 0.4s;
            writing-mode: vertical-rl; text-orientation: mixed;
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 0.75rem; color: #ffd700;
            border-radius: 2px 5px 5px 2px; box-shadow: 3px 0 8px rgba(0,0,0,0.5);
            border-left: 2px solid rgba(255,255,255,0.1);
        }

        .city-book-spine:hover { transform: translateY(-15px); filter: brightness(1.2); z-index: 10; }
        .city-book-spine:nth-child(5n) { background-color: #4a0000; }
        .city-book-spine:nth-child(5n+1) { background-color: #1a4a1a; }
        .city-book-spine:nth-child(5n+2) { background-color: #1a1a4a; }
        .city-book-spine:nth-child(5n+3) { background-color: #4a3a1a; }
        .city-book-spine:nth-child(5n+4) { background-color: #2c1810; }

        #detail-page { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 9999; perspective: 1500px;
        }

        .book-wrapper {
            width: 400px; height: 500px; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            transform-style: preserve-3d; transition: width 0.8s ease-in-out;
        }

        .book-page {
            position: absolute; width: 400px; height: 100%;
            top: 0; right: 0; transform-origin: left;
            transition: transform 1s ease-in-out; transform-style: preserve-3d;
            pointer-events: none;
        }

        .page-front, .page-back {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; backface-visibility: hidden;
            padding: 30px; box-sizing: border-box;
            background: #fdf6e3; color: #2c1810;
            border: 1px solid #d4a373; box-shadow: inset 0 0 30px rgba(0,0,0,0.1);
            pointer-events: auto; overflow-y: auto;
        }

        .page-back { transform: rotateY(180deg); }
        .flipped { transform: rotateY(-180deg); }

        .book-img { width: 100%; height: 150px; object-fit: cover; border: 2px solid #d4a373; margin-bottom: 10px; border-radius: 5px; }
        .text-content { font-size: 0.9rem; line-height: 1.5; margin-bottom: 10px; text-align: justify; }

        .cover-page { background: #4a0000 !important; color: #ffd700 !important; text-align: center; border: 8px double #ffd700 !important; display: flex; flex-direction: column; justify-content: center; align-items: center; }

        .nav-btns { position: fixed; bottom: 30px; left: 0; width: 100%; text-align: center; z-index: 10010; }
        .nav-btns button { padding: 12px 25px; margin: 0 10px; cursor: pointer; background: #d4a373; border: none; font-weight: bold; border-radius: 30px; color: #1a120b; }

        .close-btn { position: absolute; top: -50px; right: 0; background: #d4a373; color: #1a120b; border: none; padding: 8px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; z-index: 10006; }
        
        .static-page {
            position: absolute; width: 400px; height: 100%;
            top: 0; left: 0; background: #fdf6e3; color: #2c1810;
            padding: 30px; box-sizing: border-box; border: 1px solid #d4a373;
            z-index: 0; opacity: 0; transition: opacity 0.5s;
        }
    </style>
</head>

    "Adana": {
        p1: { img: "https://library.coraltatil.com/img/blog-gorseller/adana-gezilecek-yerler/32.jpg", txt: "Adana, Türk edebiyatının sadece bir coğrafyası değil, bizzat kahramanıdır. Toroslar’ın zirvesinden Akdeniz’e dökülen Seyhan ve Ceyhan nehirleri, yüzyıllardır bu topraklarda anlatılan efsaneleri besler. Burası; toprağın 'sarı sıcak' altında kavrulduğu, pamuk işçilerinin alın terinin romanlara döküldüğü, destansı bir anlatımın ana vatanıdır. Adana edebiyatı demek; haksızlığa başkaldırı, doğa ile insanın amansız mücadelesi ve her şeye rağmen sönmeyen bir yaşam umudu demektir." },
        p2_front: { img: "https://cdn.oggito.com/images/full/2025/7/yasar-kemal.jpg", txt: "Edebiyatımızın 'Koca Çınarı' Yaşar Kemal, dünya edebiyatına Çukurova’nın kapılarını Anavarza kayalıklarından açmıştır. İnce Memed’in haksızlığa sıktığı her kurşun, aslında köylünün, topraksızın ve ezilenin feryadıdır. Kemal; rüzgarın esişini, karıncanın yürüyüşünü ve Akçasaz’ın bataklığını öyle bir dille anlatır ki, okuyucu kendini o tozlu yollarda, o kadim kavgaların tam ortasında bulur. Onun kalemi, toprağın nabzını tutan bir vicdanın sesidir." },

    "Adıyaman": {
        p1: { img: "https://blog.obilet.com/wp-content/uploads/2019/02/shutterstock_163768358.jpg", txt: "Adıyaman, Mezopotamya’nın kuzeyinde, tarihin ve edebiyatın efsanelerle harmanlandığı kadim bir şehirdir. Kommagene Krallığı’nın mirası üzerinde yükselen bu topraklar, sadece taşların değil, sözün de gücünü taşır. Batı ve Doğu kültürlerinin kavşağında yer alan Adıyaman; Nemrut Dağı'nın devasa heykellerinin sessiz tanıklığında, yüzyıllardır hem hüzünlü ağıtların hem de destansı hikayelerin beşiği olmuştur. Fırat’ın suları gibi dingin ama derinden akan bir edebi geleneğe sahiptir." },
        p2_front: { img: "https://www.academic-tour.com/resim/media/antiochos.jpg", txt: "Adıyaman edebiyatı denince akla gelen ilk imge, Kommagene Kralı I. Antiochos’un tanrılara sunduğu o devasa taş anıtlardır. Bu mekan, yerel yazarlar ve şairler için bir ilham kaynağı olmaktan öte, insanın ölümsüzlük arayışının bir simgesidir. Nemrut Dağı'nın zirvesinde güneşin doğuşu, bölge şiirinde karanlıktan aydınlığa çıkışı ve bilgeliği temsil eder. Mitolojik öyküler, bugün bile modern anlatıların temel taşını oluşturmaya devam eder." }, 
        p2_back: { img: "https://gotocars.com.tr/Files/img/article/c67de90a-6b66-488b-bdd6-9602edb2bd46.jpg", txt: "Bu topraklar, sözlü edebiyatın en saf hallerinden biri olan ağıtlarla yoğrulmuştur. Adıyaman’ın edebi ruhu; düğünlerde söylenen manilerde, yaslarda yakılan derin ağıtlarda ve halk ozanlarının deyişlerinde saklıdır. Harfane geleneği gibi kültürel buluşmalar, şiirin ve müziğin nasıl bir toplumsal harç olduğunu gösterir. Halkın günlük yaşamı, geçim sıkıntısı ve kadim inançları, bu lirik anlatımlarla kuşaktan kuşağa aktarılarak şehrin yaşayan kütüphanesini oluşturur." },

        p3_back: { img: "https://gezimanya.com/sites/default/files/styles/800x600_/public/gezilecek-yerler/2019-12/ataturk-baraji-1024x683_0.jpg", txt: "Bugün Adıyaman, geçmişin görkemli mirasını modern edebiyatın yenilikçi diliyle birleştirmektedir. Yerel şairler ve yazarlar, şehrin dar sokaklarını, tütün tarlalarını ve Atatürk Barajı ile değişen çehresini eserlerine konu ederler. Kütüphanelerinde korunan nadide yazma eserler, şehrin ilme ve söze verdiği değerin kanıtıdır. Adıyaman’ın sayfalarını çevirmek; bir yanıyla Nemrut'un gizemine dokunmak, diğer yanıyla Anadolu insanının samimi ve bilge sesini işitmektir." }

    p2_front: { img: "https://i.pinimg.com/originals/2d/6c/57/2d6c571097cf5f293651345d0d9ca207.jpg", txt: "Milli Mücadele’nin dönüm noktası olan Kocatepe, Afyon edebiyatının en görkemli sahnesidir. Nazım Hikmet’in 'Kuvayı Milliye Destanı'nda tasvir ettiği o meşhur tepede, 'dağlarda tek tek ateşler yanıyordu' mısraları bu toprakların ruhunu özetler. Afyon; sadece bir savaş meydanı değil, bir milletin varoluş hikayesinin destanlaştığı, edebiyatçılar için vatan savunmasının en somutlaştığı kutsal bir coğrafyadır." }, 
    p2_back: { img: "https://afyonsehir.com/wp-content/uploads/2025/02/7-Manset-5-1100x650.jpg", txt: "Konya’dan sonra Mevleviliğin en önemli merkezi olan Afyon Mevlevihanesi, şehre mistik bir derinlik katar. Klasik Türk edebiyatının ve divan şiirinin pek çok ismi, bu dergahtan yükselen ney sesiyle pişmiş, insan-ı kamil yolculuğunu satırlara dökmüştür. Bu sayfalarda; sabır, hoşgörü ve aşkın en saf hali saklıdır. Afyon edebiyatı, dışarıdaki sert soğuğa rağmen içeride her daim yanan bir aşk fırını gibidir." }, 
    p3_front: { img: "https://www.afyon.bel.tr/upload/tr/resim/icerikyonetimi/afyonkarahisar-da-nereleri-gezelim-38_08102025101154.jpg", txt: "Afyonkarahisar, Cumhuriyet dönemi yazarları için Anadolu’nun gerçek yüzünü gördükleri bir aynadır. Şehrin tarihi konakları, mermer işçiliği ve termal kültürünün getirdiği sosyal yaşam, modern Türk edebiyatında kendine geniş bir yer bulur. Fakir Baykurt gibi toplumcu yazarların köy hayatını işleyen metinlerinden, Cumhuriyet ideallerini anlatan hatıratlara kadar Afyon, Anadolu insanının karakteristik yapısını en dürüst haliyle yansıtan bir laboratuvar gibidir." }, 
    p3_back: { img: "https://i20.haber7.net/resize/1280x720//haber/haber7/photos/2020/32/rengarenk_hashas_tarlalari_dogal_studyo_gibi_1596609105_2309.jpg", txt: "Şehrin edebi dokusu, mermerin soğuk ama asil duruşuyla haşhaş tarlalarının büyüleyici görselliği arasında gidip gelir. Halk edebiyatında haşhaşın (afyonun) çiçeği üzerine yakılan türküler, maniler ve yerel hikayeler; bu toprakların kendine has 'acı' ve 'huzur' dengesini anlatır. Bugün Afyon, edebiyat müzeleri ve kütüphaneleriyle, kale gibi sağlam geçmişini geleceğin genç yazarlarına bir miras olarak sunmaya devam etmektedir." }

    p3_front: { img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTnSO4Q5ubl8snyOx3cB1Cxe8CILRkYsNFM0g&s", txt: "Ağrı'da halk edebiyatı, kış gecelerinde anlatılan dengbej hikayeleri ve efsanelerle beslenir. Nuh Tufanı'ndan sonra insanlığın yeniden doğuşuna tanıklık eden bu topraklar, sözlü anlatı geleneğinde 'umudun ve yeniden başlangıcın' simgesidir. Ahmed-i Hani’nin felsefesiyle harmanlanan halk deyişleri, dağların sertliğine inat insanın içindeki sıcaklığı ve misafirperverliği anlatır. Şehir, adeta anlatılmayı bekleyen binlerce sayfalık bir destan gibidir." },

    "Amasya": {
    base: { img: "", txt: "Yeşilırmak’ın ikiye böldüğü bu masalsı şehir, Anadolu’nun 'Şehzadeler Şehri' olarak edebiyat ve tarihin en zarif birleşimini sunar. Amasya, sadece fiziksel bir mekan değil; dar sokakları, nehir boyundaki konakları ve üzerine titreyen devasa kayalarıyla yaşayan bir şiir gibidir. Kralların, alimlerin ve şairlerin yetiştiği bu topraklar, yüzyıllardır hem saray edebiyatının nezaketini hem de halk anlatılarının samimiyetini bünyesinde barındırmaktadır." },
    p1: { img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTHyzyZxxJqBsOt32SabCFN0lbtRhiIZpoi9w&s", txt: "Amasya denince edebiyatın kalbinde yankılanan ilk ses, Ferhat ile Şirin’in ölümsüz aşkıdır. Şehrin sert kayalarını aşkı için delen Ferhat’ın hikayesi, Türk edebiyatında 'imkansızın peşinden koşmanın' ve 'emeğin kutsallığının' en büyük sembolü olmuştur. Nazım Hikmet’ten yerel ozanlara kadar pek çok yazar, bu efsaneyi Amasya’nın coğrafyasıyla özdeşleştirmiş; dağı delmenin aslında zorluklara göğüs germek olduğunu bu sokaklarda mısralara dökmüştür." },
    p2_front: { img: "https://www.kulturportali.gov.tr/repoKulturPortali/large/SehirRehberi//GezilecekYer/20241220135236618_AMASYA%20YALIBOYU%20GECE%20GULCAN%20ACAR%20(7)%20kopya.jpg?format=jpg&quality=50", txt: "Amasya, Osmanlı döneminde şehzadelerin eğitim gördüğü bir merkez olması hasebiyle, klasik Türk edebiyatının ve divan şiirinin en parlak dönemlerine tanıklık etmiştir. Mihri Hatun gibi edebiyatımızın ilk kadın şairlerinden bazılarının bu şehirde yaşamış olması, Amasya’nın entelektüel derinliğinin bir kanıtıdır. Saray kültürünün getirdiği ince üslup, Yeşilırmak’ın durgun sularında ve Yalıboyu Evleri'nin cumbalarında hala hissedilen bir edebi mirastır." },
    p2_back: { img: "https://i.ytimg.com/vi/tiai2Fcl1Ls/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLAyuAZo1P-JhhHZG3M45IMp9dGYMg", txt: "Milli Mücadele döneminde Amasya, 'Milletin bağımsızlığını yine milletin azim ve kararı kurtaracaktır' cümlesinin kaleme alındığı yerdir. Amasya Tamimi, sadece siyasi bir belge değil; Türk edebiyatında hitabet sanatının ve direniş ruhunun en güçlü metinlerinden biridir. Bu şehir, kalemlerin sadece aşk için değil, vatan savunması ve hürriyet için de nasıl birer meşaleye dönüştüğünün en canlı şahididir." },
    p3_front: { img: "https://media.istockphoto.com/id/635992010/tr/foto%C4%9Fraf/old-town-of-amasya-central-anatolia-turkey.jpg?s=612x612&w=0&k=20&c=S9at1dga8cls-_4sMAzoO35oEAbg3bJ_LXk3GJHT2zg=", txt: "Coğrafya bilgini Strabon’un doğum yeri olan Amasya, anlatının ve tasvirin kadim merkezidir. Yeşilırmak (Iris) boyunca uzanan tarihi doku, Evliya Çelebi’den modern gezginlere kadar pek çok yazarın seyahatnamelerinde 'Anadolu’nun incisi' olarak betimlenmiştir. Şehirdeki medreseler ve kütüphaneler, bilginin ve edebiyatın yüzyıllarca el üstünde tutulduğu, doğunun bilgeliği ile batının merakının harmanlandığı kültürel duraklardır." },
    p3_back: { img: "https://turkiyeturizmansiklopedisi.com/uploads/img/2023/07/03/bcb36c9f3fd37e28f6d5e24e911d92fd16150753.gif", txt: "Bugün Amasya, nehir kenarında kitap okuyan gençleri, düzenlenen şiir akşamları ve korunan tarihi dokusuyla edebi bir huzur durağıdır. Dağlara kazınmış kral mezarları geçmişin heybetini fısıldarken, Yalıboyu’ndaki kafelerden yükselen edebiyat sohbetleri şehrin güncelliğini korur. Amasya’nın kütüphanesini açmak; bir yanıyla bir efsaneye dokunmak, diğer yanıyla tarihin akışını değiştiren o kararlı sesleri yeniden duymaktır." }
},
    "Ankara": {
    base: { img: "", txt: "Ankara, sadece Türkiye’nin başkenti değil, modern Türk edebiyatının ve Cumhuriyet ruhunun kalbinde filizlendiği bir şehirdir. Bozkırın ortasında bir 'irade' olarak yükselen bu şehir, edebiyatımızda köklü bir dönüşümün sembolüdür. Kerpiç evlerden modern binalara geçişin sancıları, Milli Mücadele'nin heyecanı ve yeni kurulan bir devletin umudu; Ankara’nın her sokağında, her kütüphanesinde bir edebi iz bırakmıştır." },
    p1: { img: "https://www.iroamly.com/images/ataturk-mausoleum-.webp", txt: "Milli Mücadele yıllarında Ankara, vatan şairlerinin ve yazarların buluşma noktası olmuştur. Mehmet Akif Ersoy, İstiklal Marşı’nı bu şehirde, Taceddin Dergahı’nın sükunetinde kaleme almıştır. Halide Edip Adıvar’ın 'Türk’ün Ateşle İmtihanı'nda anlattığı o destansı direnişin merkezi burasıdır. Ankara edebiyatı, bağımsızlık aşkıyla yanan kalemlerin bir araya gelerek bir milletin kaderini yeniden yazdığı yerdir." },
    p2_front: { img: "https://cdn-gaecj.nitrocdn.com/JMwuRIbFKRytZpZBQQGkRvqmTfGyKhHA/assets/images/optimized/rev-0ce1456/turkeytravelplanner.com/wp-content/uploads/2023/08/entrance-ankara-castle.jpg", txt: "Cumhuriyet’in ilanıyla birlikte Ankara, memuriyetin, bürokrasinin ve yeni toplumsal hayatın edebi laboratuvarı haline gelmiştir. Yakup Kadri Karaosmanoğlu’nun 'Ankara' romanı, bir kasabanın modern bir başkente dönüşümünü ve bu süreçteki toplumsal değişimleri en derin haliyle işler. Şehir, edebiyatçılar için sadece bir mekan değil; devrimlerin, baloların ve yeni bir kimlik inşasının canlı bir tanığıdır." },
    p2_back: { img: "https://www.civitatis.com/f/turquia/ankara/ankara.jpg", txt: "1940'larda Ankara, Türk şiirinde devrim yaratan Garip (Birinci Yeni) akımının doğum yeridir. Orhan Veli, Melih Cevdet ve Oktay Rifat; Kızılay sokaklarında, Gençlik Parkı’nda yürürken 'küçük adamın' büyük dünyasını mısralara dökmüşlerdir. 'Ankara’nın taşına bak' diyen marşlardan, 'Belediye çukurlarına' şiir yazan şairlere uzanan bu süreç, şehrin edebi dilini sadeleştirmiş ve halka yaklaştırmıştır." },
    p3_front: { img: "https://turkmaarifansiklopedisi.org.tr/uploads/matter/original/ankara-167ab149a7365f.webp", txt: "Ankara'nın edebi dokusu, puslu sabahları ve meşhur pastane-kahvehane sohbetleriyle örülüdür. Eski Ankara’nın dar sokaklarından, bugünün geniş bulvarlarına uzanan bu yolculukta; Adalet Ağaoğlu’ndan Sevgi Soysal’a kadar pek çok yazar, şehrin melankolisini ve entelektüel derinliğini eserlerine taşımıştır. Ankara, yazarlar için kışın soğuğunda sığınılan sıcak bir kütüphane, yazın ise bozkır rüzgarıyla savrulan düşünceler demektir." },
    p3_back: { img: "https://dynamic-media-cdn.tripadvisor.com/media/photo-o/12/62/bd/4b/ankara-kalesi.jpg?w=800&h=-1&s=1", txt: "Bugün Ankara, Milli Kütüphane’den edebiyat festivallerine, butik kitapçılardan akademik yayıncılığa kadar Türkiye’nin en güçlü entelektüel havzalarından biridir. Şehir, gri binalarının ardında rengarenk bir hayal gücü saklar. Ankara’nın sayfasını açmak; bir yanıyla bir devletin kuruluşuna şahitlik etmek, diğer yanıyla bozkırın ortasında bitmeyen bir okuma ve yazma tutkusuna ortak olmaktır." }
},
    "Antalya": {
    base: { img: "", txt: "Antalya, Akdeniz’in masmavi sularıyla Toroslar’ın heybetli zirveleri arasında sıkışmış, doğanın ve tarihin en lirik buluşma noktasıdır. Antik çağın bilgeliğinden modern Türkiye'nin parlayan yüzüne uzanan bu şehir, şairler ve yazarlar için her zaman bir ışık kaynağı olmuştur. Palmiye ağaçlarının gölgesinde, Kaleiçi’nin dar sokaklarında ve antik kentlerin sessizliğinde; Antalya, sadece bir tatil rotası değil, derin bir edebi ilham merkezidir." },
    p1: { img: "https://images.contentstack.io/v3/assets/blt06f605a34f1194ff/blt21155ac1ca63f676/687f9d115903b3a04b04e07c/BCC-2024-EXPLORER-ANTALYA-FREE_THINGS_TO_DO-HEADER-MOBILE.jpg?fit=crop&disable=upscale&auto=webp&quality=60&crop=smart", txt: "Antalya edebiyatı denince akla gelen en önemli isimlerden biri Ahmet Hamdi Tanpınar’dır. Onun 'Beş Şehir'inde yer almasa da, Antalya üzerine yazdığı metinlerde şehrin ışığını, denizini ve tarihini benzersiz bir estetikle anlatır. Tanpınar için Antalya, 'bir ışık ve rüya şehri'dir. Onun gözünde bu şehir, geçmişin masalları ile bugünün gerçekliğinin denizin maviliğinde birbirine karıştığı büyülü bir coğrafyadır." },
    p2_front: { img: "https://www.villanizburada.com/assets/images/blog/big/side_antik_kenti_drone_cekim_manzarasi.jpg", txt: "Şehrin edebi dokusu, binlerce yıl öncesinin mitolojisiyle örülüdür. Olympos’un sönmeyen ateşi, Yanartaş efsanesi ve antik tiyatrolarda yankılanan tragedyalar; Antalya’yı dünya edebiyatının köklerine bağlar. Homeros’un destanlarından modern anlatılara kadar bu topraklar, insanın doğayla ve tanrılarla olan mücadelesinin en estetik sahnesi olmuştur. Her antik taş, üzerine yazılacak yeni bir romanın ilk cümlesi gibidir." },
    p2_back: { img: "https://media.brate.com/images/europa/turcja/antalya/antalya.jpg?tr=n-open_graph", txt: "Antalya, yerel edebiyatta narenciye bahçelerinin, pamuk tarlalarının ve göçer kültürünün izlerini taşır. Yörüklerin Toroslar’daki yaşamı, yayla göçleri ve doğanın döngüsü; bölge yazarlarının eserlerinde güçlü birer tema olarak işlenir. Şehir, sadece sahil şeridinden ibaret değildir; dağ köylerindeki masallar, aşık atışmaları ve halk hikayeleri, Antalya’nın sözlü edebiyat kütüphanesini zenginleştiren en samimi sayfalardır." },
    p3_front: { img: "https://i.ytimg.com/vi/cDOpL6b7J70/sddefault.jpg", txt: "Kaleiçi, Antalya’nın edebi hafızasının saklandığı bir sandık gibidir. Hadrian Kapısı’ndan geçerek girilen bu labirent sokaklar; hatıraların, eski evlerin ve yaşanmışlıkların kokusunu taşır. Modern dönem yazarları için Kaleiçi, melankolinin ve huzurun iç içe geçtiği bir sığınaktır. Şehirde düzenlenen uluslararası sinema ve edebiyat festivalleri, bu tarihi atmosferi güncel sanatın dinamizmiyle birleştirerek Antalya'yı evrensel bir kültür durağına dönüştürür." },
    p3_back: { img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSQWvix177qoUNJvTVDbYR2Og3Fx2MF17FYrg&s", txt: "Bugün Antalya; kütüphaneleri, deniz manzaralı okuma salonları ve her yıl binlerce kitapseveri buluşturan kitap fuarlarıyla yaşayan bir edebiyat şehridir. Akdeniz’in tuzlu rüzgarı sayfaların arasından geçerken, okuyucuya sonsuz bir özgürlük hissi fısıldar. Antalya’nın kütüphanesini açmak; güneşin tadına bakmak, antik bir tiyatronun basamaklarında tarihin sesini dinlemek ve maviliğin sonsuzluğunda kendi hikayeni aramaktır." }
},
    "Artvin": {
    base: { img: "", txt: "Artvin, doğanın en hırçın ve en zarif hallerinin birleştiği, gökyüzüne komşu bir masal şehridir. Kaçkar Dağları'nın sisli zirvelerinden Çoruh Nehri'nin derin vadilerine uzanan bu coğrafya, edebiyatçılar için bir 'tabiat kütüphanesi' gibidir. Artvin edebiyatı; insanın doğa ile olan amansız mücadelesini, yayla yollarındaki gurbet türkülerini ve ladin ağaçlarının fısıldadığı kadim masalları içinde barındırır." },
    p1: { img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSQWvix177qoUNJvTVDbYR2Og3Fx2MF17FYrg&s", txt: "Artvin’in edebi ruhu, yüzyıllardır süregelen aşık geleneği ile yoğrulmuştur. Köy kahvelerinden yayla şenliklerine kadar her yerde yankılanan aşık atışmaları, bu toprakların sözlü kütüphanesinin temelidir. Efkarî'den Huzurî'ye kadar pek çok halk ozanı; Artvin’in doğasını, sevdalarını ve insanının mertliğini sazıyla sözüyle ölümsüzleştirmiştir. Burası, kelimelerin mermi gibi sert, duyguların ise Karagöl kadar berrak olduğu bir yerdir." },
    p2_front: { img: "https://iasbh.tmgrup.com.tr/c61937/650/344/0/31/1197/660?u=https://isbh.tmgrup.com.tr/sbh/2019/09/17/artvinde-gezilecek-yerler-artvinde-gorulmesi-gereken-10-guzel-yer-1568705864238.jpg", txt: "Şehrin edebi dokusunda Çoruh Nehri, bir nehirden çok daha fazlasıdır; o, hırçınlığıyla bir direnişin, akışıyla ise geçip giden zamanın simgesidir. Çoruh üzerine yazılan şiirler ve hikayeler, Artvin insanının karakterini yansıtır: Eğilmeyen, coşkulu ve her zaman kendi yolunu bulan... Vadiler boyunca yankılanan destanlar, barajların gölgesinde kalsa da, bu suların getirdiği kültürel birikim şairlerin mısralarında yaşamaya devam eder." },
    p2_back: { img: "https://image.tatileksper.com/blog/759x439/artvin-de-gezilecek-yerler_32_artvin-de-gezilecek-yerler-1570364551.jpg", txt: "Artvin, sadece Türk edebiyatı için değil, Kafkas kültürünün geçiş noktası olmasıyla çok sesli bir edebi zenginliğe sahiptir. Yayla göçleri sırasında anlatılan efsaneler, ormanların derinliklerindeki mitolojik varlıklara dair hikayeler, bölge yazarlarının hayal gücünü besleyen en büyük kaynaktır. Doğa, Artvinli yazarlar için bir fon değil, bizzat konuşan, öğreten ve terbiye eden ulu bir karakter, bir bilge öğretmen gibidir." },
    p3_front: { img: "https://www.etstur.com/letsgo/wp-content/uploads/2025/11/01-artvin-letsgo.jpg", txt: "Borçka, Şavşat ve Ardanuç gibi ilçelerin her biri kendi başına birer edebi duraktır. Şavşat’ın ahşap evlerinde yazılan anılar, Borçka’nın yağmurlu ormanlarında filizlenen şiirler; Artvin’in yerel kimliğini evrensel bir dille buluşturur. Modern dönem yazarları, bu sarp coğrafyanın yalnızlığını ve insanın iç dünyasındaki yansımalarını, Artvin’in sisli manzaraları eşliğinde kağıda dökerek kütüphanemize eşsiz eserler kazandırmıştır." },
    p3_back: { img: "https://www.iroamly.com/images/artvin-attraction.webp", txt: "Bugün Artvin; festivalleri, kütüphaneleri ve doğa ile iç içe olan kültür evleriyle okuma tutkusunun hiç sönmediği bir şehirdir. Ladin ve çam kokulu sayfalar arasında bir yolculuğa çıkmak, sarp kayalıkların ardındaki o sıcak insan hikayelerini keşfetmek demektir. Artvin’in kütüphanesini açmak; bulutların üzerinde bir yürüyüşe çıkmak ve tabiatın yazdığı o devasa şiirin bir parçası olduğunuzu hissetmektir." }
},
    "Aydın": {
    base: { img: "", txt: "Aydın, antik çağlardan bu yana 'dağlarından yağ, ovalarından bal akan' bir bereket ve bilgelik coğrafyasıdır. Büyük Menderes’in suladığı bu topraklar, tarihin en eski kütüphanelerine ve felsefe okullarına ev sahipliği yapmıştır. Aydın edebiyatı; zeytin ağaçlarının gölgesinde yeşeren bir huzur, antik kentlerin tiyatrolarında yankılanan bir entelektüel birikim ve Ege'nin o kendine has vakur duruşunun kağıda dökülmüş halidir." },
    p1: { img: "https://gezimanya.com/sites/default/files/styles/800x600_/public/lokasyon-detay/2021-02/aydin-gezilecek-yerler.jpg", txt: "Aydın’ın edebi ve kültürel kimliğinin en sarsılmaz figürü 'Efe'dir. Zeybek kültürü, bölge edebiyatında sadece bir halk oyunu değil; haksızlığa başkaldırının, mertliğin ve vatan sevgisinin sembolüdür. Yörük Ali Efe gibi kahramanların destanları, halk ozanlarının türkülerinden modern yazarların romanlarına kadar her yere sinmiştir. Bir zeybeğin dizini yere vuruşu, Aydın edebiyatında adaletin ve hürriyetin mısralara dökülmüş ritmidir." },
    p2_front: { img: "https://blog.tatildenince.com/wp-content/uploads/2024/01/aydin-gezilecek-yerler.jpg", txt: "Aydın, antik dünyanın en büyük zihinlerinin yetiştiği bir okuldur. 'Değişmeyen tek şey değişimin kendisidir' diyen Herakleitos’tan, tarihin ilk şehir plancısı Hippodamos’a kadar pek çok düşünür bu topraklarda yürümüştür. Afrodisias ve Milet gibi antik kentlerin kütüphane kalıntıları, Aydın’ın edebi köklerinin binlerce yıl öncesine, felsefenin ve sanatın ilk filizlendiği anlara kadar uzandığını kanıtlayan görkemli şahitlerdir." },
    p2_back: { img: "https://aydinihlamurkizyurdu.com/Upload/Images/06e3f7f8-2e90-4e73-b8c5-53b647c0eacd-aydin.jpg?width=500", txt: "Modern Türk edebiyatında Aydın, tarımsal dönüşümün ve Ege insanının samimi portresinin çizildiği bir merkezdir. Samim Kocagöz’ün 'Kalpaklılar' ve 'Doludizgin' gibi eserleri, Milli Mücadele’nin Aydın cephesini ve halkın direnişini epik bir dille anlatır. Şehrin incir bahçeleri, menderes boyundaki pamuk tarlaları ve sıcak iklimi; yazarların kaleminde insan doğa ilişkisinin en samimi anlatılarına dönüşmüştür." },
    p3_front: { img: "https://aydinkuliscom.teimg.com/aydinkulis-com/uploads/2025/03/aydin-51.gif", txt: "Aydın edebiyatı aynı zamanda mizahın ve hicvin de şehridir. Yerel ağızla anlatılan hikayeler, Nasrettin Hoca geleneğinin Ege’deki yansımaları ve Aydınlı şairlerin toplumsal olaylara karşı geliştirdiği iğneleyici ama sevgi dolu dil, bu kütüphanenin en renkli sayfalarını oluşturur. Şehir; geçmişin ağırbaşlı felsefesiyle, bugünün neşeli ve hayat dolu insan karakterini aynı potada eritmeyi başarmıştır." },
    p3_back: { img: "https://blog.biletbayi.com/wp-content/uploads/2020/03/aydin-scaled.jpg", txt: "Bugün Aydın; gelişmiş kütüphaneleri, kültür merkezleri ve zeytin kokulu sokaklarında düzenlenen edebiyat günleriyle geçmişine sahip çıkmaktadır. Tralleis antik kentinden yükselen akşam güneşi altında bir kitap okumak, tarihin ve edebiyatın zamansız bir döngüsüne katılmak demektir. Aydın’ın kütüphanesini açmak; bilgeliğin izini sürmek, bir efeyle omuz omuza durmak ve toprağın bereketini ruhunda hissetmektir." }
},
"Balıkesir": {
    base: { img: "", txt: "Balıkesir, Marmara ve Ege denizlerine kıyısı olan, Kaz Dağları’nın (İda) mitolojik görkemiyle sarmalanmış, Kuvayi Milliye ruhunun filizlendiği bir hürriyet ve bereket şehridir. Edebiyatımızda 'direniş', 'mitoloji' ve 'zeytin dalı'nın sembolüdür. Balıkesir edebiyatı; antik çağ efsanelerinden Ömer Seyfettin’in hikâyelerine ve Edremit Körfezi’nin huzurlu kıyı anlatılarına uzanan devasa bir kütüphanedir." },
    p1: { img: "https://iasbh.tmgrup.com.tr/20aafe/650/344/0/132/1000/656?u=https://isbh.tmgrup.com.tr/sbh/2022/08/23/iki-deniz-bir-sehir-balikesir-1661276807177.jpeg", txt: "Balıkesir’in edebi kimliği denince akla gelen en sarsılmaz isim, modern Türk öykücülüğünün kurucularından Gönenli Ömer Seyfettin’dir. Onun bu topraklardan süzülen yalın ve milli dili, şehrin edebi karakterini belirlemiştir. Şehir; kelimelerin bir zeytin ağacı gibi uzun ömürlü, mısraların ise Ege rüzgârı gibi ferah olduğu bir duraktır. Balıkesir, tarihin tozlu sayfalarıyla denizin taze kokusunu aynı cümlede buluşturan bir yazın merkezidir." },
    p2_front: { img: "https://isinolsun.com/blog/wp-content/uploads/2025/02/balikesir-is-ve-yasam-rehberi.jpg", txt: "Şehrin edebi dokusunda Kaz Dağları (İda), binlerce yıldır süregelen bir anlatı kaynağıdır. Dünyanın ilk güzellik yarışmasından Sarıkız efsanesine kadar bu dağlar, şairler ve yazarlar için mistik bir ilham pınarıdır. Öte yandan, kentin sembolü olan zeytin hasadı, sadece bir tarım faaliyeti değil; sabrın, bereketin ve barışın edebi bir tezahürüdür. Balıkesir edebiyatı, dağın bilgeliği ile denizin özgürlüğünü harmanlayan bir dengeye sahiptir." },
    p2_back: { img: "https://sevenforlife.com/wp-content/uploads/2025/02/balikesir-gezilecek-yerler.png", txt: "Balıkesir edebiyatı aynı zamanda bir 'milli mücadele' anlatısıdır. İşgale karşı ilk kurşunun sıkıldığı, milli şuurun uyandığı bu topraklar; bağımsızlık aşkını işleyen pek çok hatırat ve romana ev sahipliği yapmıştır. Kütüphanemiz, Ayvalık’ın dar taş sokaklarındaki mübadele hüzünlerinden, Bandırma’nın vapur dumanına ve Bigadiç’in termal huzuruna kadar geniş bir coğrafyayı kapsar. Burası, Anadolu’nun batıya açılan en asil kapısıdır." },
    p3_front: { img: "https://www.etstur.com/letsgo/wp-content/uploads/2025/05/balikesir-gezilecek-yerler-10.jpg", txt: "Modern dönemde Balıkesir; üniversitesi, düzenlenen kitap fuarları ve özellikle Edremit-Ayvalık hattındaki yoğun entelektüel göçle kültürel bir çekim merkezi haline gelmiştir. Şehir, son yıllarda yetişen yazar ve sanatçılarla, doğa koruma bilincini ve ekolojik edebiyatı ön plana çıkaran eserlere ilham vermektedir. Balıkesir’in sesi bugün, geleneksel bağlarını koparmadan modern dünyanın sancılarını ve güzelliklerini anlatan duru bir tona sahiptir." },
    p3_back: { img: "https://wp.oggusto.com/wp-content/uploads/2025/10/cunda-yel-degirmeni.webp", txt: "Bugün Balıkesir; Cunda’nın eşsiz mimarisi, Şeytan Sofrası’nın büyüleyici manzarası ve Kaz Dağları’nın serin pınarlarıyla yaşayan bir açık hava kitabıdır. Bir zeytinliğin altında, denize karşı kitap okumak, hem toprağın derinliğine hem de suyun sonsuzluğuna aynı anda dokunmak demektir. Balıkesir’in kütüphanesini açmak; bir halk kahramanının cesaretini okumak, zeytinin şifasını hissetmek ve Anadolu’nun bu 'iki denizli' hikâyesine ortak olmaktır." }
},
    "Bilecik": {
    base: { img: "", txt: "Bilecik, 'İnsanı yaşat ki devlet yaşasın' düsturunun doğduğu, koca bir imparatorluğun ilk tohumlarının serpildiği kutsal bir topraktır. Sakarya Nehri’nin bereketiyle sulanan bu şehir, Türk edebiyatında kuruluşun, kökleşmenin ve manevi mirasın sembolüdür. Söğüt’ten yükselen o ilk ses, yüzyıllar boyunca destanlara, romanlara ve şiirlere konu olmuş; Bilecik’i bir şehirden öte, bir milletin hafıza tazelediği bir edebi durak haline getirmiştir." },
    p1: { img: "https://upload.wikimedia.org/wikipedia/commons/1/11/Bilecik.jpg", txt: "Bilecik edebiyatının en güçlü figürü, kuşkusuz Şeyh Edebali’dir. Onun Osman Bey’e verdiği öğütler, sadece siyasi bir vasiyet değil, Türk edebiyatındaki 'nasihatname' geleneğinin en seçkin örneklerinden biridir. Bu metinler, adaleti, sabrı ve bilgeliği lirik bir dille anlatarak Anadolu irfanının temel taşlarını döşemiştir. Bilecik; kalemle kılıcın, bilgiyle cesaretin nasıl harmanlanacağını tüm dünyaya bu satırlarla göstermiştir." },
    p2_front: { img: "https://dynamic-media-cdn.tripadvisor.com/media/photo-o/08/5e/b4/e1/bilecik-seyh-edebali.jpg?w=800&h=500&s=1", txt: "Modern edebiyatımızda Bilecik, özellikle Tarık Buğra’nın 'Osmancık' romanıyla yeniden hayat bulur. Buğra, bir cihan devletinin kuruluşunu sadece savaşlarla değil, bir insanın iç dünyasındaki olgunlaşma süreciyle anlatırken Söğüt ve Domaniç ovalarını adeta birer tablo gibi tasvir eder. 'Osmancık', Bilecik’in taşını toprağını edebi bir efsaneye dönüştürerek, bu coğrafyanın ruhunu okuyucunun zihnine nakşetmiştir." },
    p2_back: { img: "https://www.tourturka.com/images/blog/big/9wchvb/9wchvb_922.webp", txt: "Şehrin edebi dokusu, Kurtuluş Savaşı’nın o çetin günlerine tanıklık eden 'Metristepe' ile daha da derinleşir. 'Siz orada sadece düşmanı değil, milletin makus talihini de yendiniz' cümlesiyle özdeşleşen İnönü Savaşları, bölge edebiyatında direnişin ve yeniden doğuşun simgesi olmuştur. Bilecik; hem kuruluşun hem de kurtuluşun şehri olarak, Türk yazar ve şairleri için vatan sevgisinin en somutlaştığı edebi laboratuvarlardan biridir." },
    p3_front: { img: "https://i.test.neredekal.com/i/75/800x600/604de588067127e05588bb60", txt: "Bilecik’in dar sokakları, tarihi evleri ve ipek böcekçiliği geleneği; yerel edebiyatta zarafetin ve emeğin hikayesini anlatır. Pelitözü’nün huzuru, mermer yataklarının sertliği ve Sakarya’nın akış hızı; yazarların kaleminde insan karakterinin farklı yönlerini temsil eder. Şehir; geçmişin o vakur ve ağırbaşlı havasını, bugün yetiştirdiği genç kalemlerin taze enerjisiyle birleştirerek kütüphanesini her geçen gün zenginleştirmektedir." },
    p3_back: { img: "https://i.test.neredekal.com/i/75/800x600/604de588067127e05588bb60", txt: "Bugün Bilecik; Edebali Türbesi’nin gölgesinde yankılanan dualardan, üniversite kütüphanelerindeki modern araştırmalara kadar geniş bir kültürel yelpazeye sahiptir. Söğüt Ertuğrul Gazi şenliklerinde okunan destanlar, bu şehrin hikayesinin bitmediğini, aksine her nesilde yeniden yazıldığını kanıtlar. Bilecik’in kütüphanesini açmak; bir çınarın köklerine dokunmak ve tarihin yazıldığı o ilk mürekkebin kokusunu içine çekmektir." }
},
    "Bingöl": {
    base: { img: "", txt: "Bingöl, Doğu Anadolu’nun kalbinde, yüce dağların ve binlerce gözenin fısıltısıyla şekillenmiş bir destan şehridir. Adını üzerinde barındırdığı binlerce gölden alan bu coğrafya, edebiyatımızda saflığın, el değmemiş doğanın ve yüksek yaylaların sembolüdür. Bingöl edebiyatı; rüzgarın kayalıklara çarpan sesiyle yankılanan ağıtların, Turnalar gibi göç eden sevdaların ve kuşaktan kuşağa aktarılan kadim halk hikayelerinin harmanlandığı samimi bir anlatıdır." },
    p1: { img: "", txt: "Bingöl’ün edebi kimliği denince akla ilk gelen, Türk şiirinin unutulmaz ismi Faruk Nafiz Çamlıbel’in 'Çoban Çeşmesi' ve 'Bingöl Çobanları' şiirleridir. Bu mısralarda Bingöl, bozkırın ortasında bir vaha gibi betimlenir. 'Gönlümü yayla yaptım Bingöl çobanlarına' diyen şair, bu toprakların masumiyetini ve doğa ile iç içe yaşayan insanının bilgeliğini tüm Türkiye'ye tanıtmıştır. Şehir, Türk pastoral şiirinin en önemli duraklarından biri olarak edebiyat tarihimize kazınmıştır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, köklü bir sözlü anlatı geleneği olan 'Dengbejlik' kültürüyle yoğrulmuştur. Bingöl’ün derin vadilerinde ve yüksek yaylalarında yankılanan kılamlar (şarkılı hikayeler), bölgenin tarihini, acılarını ve kahramanlıklarını kağıda ihtiyaç duymadan hafızalara nakşeder. Bu anlatılar, modern dönem yazarları için paha biçilemez bir kaynak oluştururken, bölge insanının dile ve söze verdiği değerin de en somut göstergesidir." },
    p2_back: { img: "", txt: "Bingöl, mistik anlatıların ve doğa olaylarının efsaneleştiği bir yerdir. Özellikle 'Yüzen Ada' ve 'Kös Kaplıcaları' etrafında şekillenen hikayeler, yerel edebiyatta doğanın mucizelerine duyulan saygıyı temsil eder. Dağların doruklarında güneşin doğuşunu izleyen gezginlerin ve yazarların notları, Bingöl'ü 'ışığın şehri' olarak betimler. Bu topraklar, insanın kendi iç dünyasına döndüğü, sessizliğin en derin şiirlerini fısıldadığı bir inziva köşesi gibidir." },
    p3_front: { img: "", txt: "Modern dönemde Bingöl edebiyatı, şehrin yaşadığı değişimleri ve toplumsal yapıyı ele alan yerel yazarların kaleminde yükselmektedir. Karlıova’nın beyaz örtüsünden Solhan’ın yeşiline kadar her ilçe, kendi hikayesini edebiyat dünyasına sunar. Eğitim enstitülerinden ve kültür evlerinden yetişen kalemler, Bingöl’ün mahalli değerlerini evrensel temalarla birleştirerek, bu kadim coğrafyanın sesini daha geniş kitlelere ulaştırmayı başarmıştır." },
    p3_back: { img: "", txt: "Bugün Bingöl; her yıl düzenlenen kitap fuarları, şiir dinletileri ve kütüphaneleriyle kültürel bir uyanış içerisindedir. Muradiye Camii’nin huzurunda veya bir yayla çadırında okunan bir kitap, bu şehrin ruhuyla bütünleşmek demektir. Bingöl’ün kütüphanesini açmak; dağların dilini öğrenmek, çobanların kavalından dökülen nağmeleri hissetmek ve güneşin ilk ışıklarıyla birlikte yeniden doğan umuda şahitlik etmektir." }
},
    "Bitlis": {
    base: { img: "", txt: "Bitlis, sarp kayalıkların üzerine inşa edilmiş kalesi ve vadiye yayılan tarihi dokusuyla, Doğu Anadolu’nun en köklü kültür merkezlerinden biridir. 'Kadim Şehir' ünvanını sonuna kadar hak eden Bitlis, edebiyatımızda hem hüznün hem de ilmin simgesidir. Vadinin içinden yükselen beş minarenin gölgesi, yüzyıllardır şairlere, yazarlara ve gezginlere ilham vermiş; bu taş şehir, her bir sokağında ayrı bir edebi hatıra saklayan devasa bir kütüphaneye dönüşmüştür." },
    p1: { img: "", txt: "Bitlis edebiyatının en hüzünlü ve en bilinen sayfası, Rus işgali sırasında yakılan o meşhur 'Bitlis’te Beş Minare' ağıtıdır. Bu türkü, sadece bir müzik eseri değil; bir şehrin yıkımını, gurbeti ve geri dönüş umudunu anlatan epik bir anlatıdır. Edebiyatımızda 'şehir ve hafıza' denince akla gelen bu eser, Bitlis insanının vatanına olan bağlılığının ve yaşadığı büyük acıların mısralara dökülmüş en somut halidir." },
    p2_front: { img: "", txt: "Bitlis, tarih boyunca yetiştirdiği büyük alimler ve düşünürlerle bir irfan merkezi olmuştur. İdris-i Bitlisi gibi devlet adamı ve tarihçilerin kaleminden çıkan eserler, klasik Türk edebiyatı ve tarih yazıcılığının temel taşlarındandır. Şehirdeki medrese kültürü, estetik bir dilin ve derin bir felsefenin gelişmesini sağlamıştır. Burası, kelamın ve kalemin mukaddes sayıldığı, bilginin taş binaların serinliğinde nesilden nesile aktarıldığı bir ilim yuvasıdır." },
    p2_back: { img: "", txt: "Şehrin edebi dokusunda tütün ve el sanatları, toplumsal gerçekçiliğin en güçlü temalarıdır. William Saroyan gibi dünya çapında yazarların köklerinin bu topraklara dayanması, Bitlis’in edebi mirasının sınırları aşan gücünü gösterir. Ahlat Selçuklu Mezarlığı’ndaki abidevi taşlar ise başlı başına birer şiir, birer sanat eseridir. Bu taşlar üzerine kazınan motifler ve yazılar, Bitlis edebiyatının taşa yazılmış sonsuzluk beyitleri gibidir." },
    p3_front: { img: "", txt: "Modern Türk edebiyatında Bitlis; dar sokakları, taş evleri ve kışın bitmek bilmeyen kar beyazlığıyla bir atmosfer şehri olarak yer alır. Yerel yazarlar, Nemrut Krater Gölü’nün mistik havasını ve Van Gölü kıyısındaki Adilcevaz ile Ahlat’ın huzurunu eserlerine taşırlar. Şehir, sert coğrafyasına inat, içten içe yanan bir edebi kandil gibi Anadolu’nun karanlıkta kalan hikayelerini aydınlatmaya devam eder." },
    p3_back: { img: "", txt: "Bugün Bitlis; kütüphaneleri, restore edilen tarihi yapıları ve kültürel etkinlikleriyle geçmişin mirasını geleceğe taşımaktadır. Bitlis Kalesi'ne karşı oturup bir kitap okumak, tarihin derinliklerinden gelen sesleri duymak demektir. Bitlis’in kütüphanesini açmak; bir yanıyla beş minarenin yankısını dinlemek, diğer yanıyla Selçuklu’dan Osmanlı’ya uzanan o büyük medeniyet yürüyüşünün edebi izlerini sürmektir." }
},
    "Bolu": {
    base: { img: "", txt: "Bolu, Batı Karadeniz’in zirvesinde, İstanbul ve Ankara gibi iki devin arasında nefes alan, göllerin ve ormanların şehridir. Edebiyatımızda 'kahramanlık', 'doğaya dönüş' ve 'estetik dinginlik'in sembolüdür. Bolu edebiyatı; Köroğlu’nun Bolu Beyi’ne karşı yükselttiği gür sesten, çam ormanlarının fısıltısına ve kışın beyaz sessizliğine uzanan vakur bir kütüphanedir." },
    p1: { img: "", txt: "Bolu’nun edebi kimliğinin temel taşı Köroğlu’dur. 'Tüfek icat oldu, mertlik bozuldu' diyen o epik duruş, sadece bir başkaldırı değil; Anadolu insanının haksızlığa karşı kalemle değil, sözle ve sazla verdiği mücadelenin destanıdır. Şehir; kelimelerin bir çam ağacı gibi dik ve sarsılmaz, mısraların ise dağ rüzgârı gibi hür olduğu bir edebi duraktır. Bolu, Türk halk edebiyatının en yiğit sayfalarından biridir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Göller' ve 'Mevsimler' merkezi bir yer tutar. Abant, Gölcük ve Yedigöller; şairler ve yazarlar için birer imge deposudur. Sonbaharın sarıdan kızıla dönen yaprakları, edebiyatımızda hüznün ve geçiciliğin değil, doğanın görkemli bir vedasının anlatısıdır. Bolu edebiyatı, insanın tabiatla kurduğu o kadim dostluğu, şehrin gürültüsünden kaçıp ağacın gölgesine sığınanların içsel yolculuğunu başarıyla işler." },
    p2_back: { img: "", txt: "Bolu edebiyatı aynı zamanda bir 'mutfak ve zanaat' kültürüdür. Mengenli aşçıların dünyaca ünlü becerisi, aslında bir sabır ve estetik anlatısıdır. Kütüphanemiz, eski Bolu evlerinin ahşap kokulu odalarında anlatılan masallardan, Seben’in kaya evlerindeki gizemli tarihe ve Mudurnu-Göynük hattındaki Osmanlı zarafetine kadar uzanır. Burası, her adımda tarihin ve doğanın el ele verdiği sessiz bir şiir gibidir." },
    p3_front: { img: "", txt: "Modern dönemde Bolu; Abant İzzet Baysal Üniversitesi ve her yıl düzenlenen İzzet Baysal Şükran Günleri ile kültürel bir çekim merkezidir. Şehir, son yıllarda yetişen doğa yazarları ve araştırmacılarla, ekolojik edebiyatın ve yerel tarihin en önemli merkezlerinden biri haline gelmiştir. Bolu’nun sesi bugün, hem Köroğlu’nun o tarihi mirasını koruyan hem de modern insanın doğayla barışma arzusunu dile getiren bilgece bir tona sahiptir." },
    p3_back: { img: "", txt: "Bugün Bolu; Mudurnu’nun tescilli sakinliği, Akkayalar’ın traverten beyazı ve kışın Kartalkaya’nın kristal karlarıyla yaşayan bir masaldır. Bir göl kıyısında, suyun yüzeyindeki yansımalara bakarak kitap okumak, zamanın hem ne kadar hızlı hem de ne kadar durgun olabileceğini hissetmek demektir. Bolu’nun kütüphanesini açmak; dağlara selam vermek, bir halk kahramanının izini sürmek ve Anadolu’nun bu en yeşil, en vakur hikâyesini soluyarak okumaktır." }
},
    "Burdur": {
    base: { img: "", txt: "Burdur, Göller Yöresi’nin kalbinde, antik medeniyetlerin mirasıyla Türkmen geleneklerinin iç içe geçtiği, huzurun ve tarihin şehridir. Edebiyatımızda 'teke ruhu', 'antik sessizlik' ve 'bozkırın gölü'nün sembolüdür. Burdur edebiyatı; Sagalassos’un fıskiyelerinden süzülen su sesinden, halk ozanlarının bağlamasındaki gurbet havasına ve Salda Gölü’nün turkuaz derinliğine uzanan mistik bir kütüphanedir." },
    p1: { img: "", txt: "Burdur’un edebi kimliği, her şeyden önce Teke Yöresi’nin o kendine has folkloruyla şekillenmiştir. Burası, halk edebiyatının en canlı damarlarından biri olan 'Teke Zortlatması' ve 'Gurbet Havaları'nın ana vatanıdır. Şehir; kelimelerin bir çoban ateşinin sıcaklığında kavrulduğu, mısraların ise Toroslar’dan aşağı süzülen birer keçi yolu gibi dolambaçlı ve özgün olduğu edebi bir duraktır. Burdur, sözün saza, sazın ise toprağa değdiği yerdir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Sagalassos ve Kibyra antik kentleri, zamanın ötesinden gelen birer anlatıcı gibidir. Aşkların ve savaşların taşa kazındığı bu kadim şehirler, yerel yazarlar için 'geçicilik' ve 'insanlık mirası' temalarının ilham kaynağıdır. Öte yandan, kentin sembolü olan Burdur Gölü ve çevresindeki sulak alanlar, doğa edebiyatının en hüzünlü ve kırılgan sayfalarını oluşturur. Burdur edebiyatı, tarihin heybeti ile doğanın zarafetini aynı satırda buluşturur." },
    p2_back: { img: "", txt: "Burdur edebiyatı aynı zamanda bir 'mücadele ve vatan' anlatısıdır. İstiklal Marşı şairimiz Mehmet Akif Ersoy’un Burdur milletvekili olması, şehre manevi bir edebi sorumluluk yüklemiştir. Kütüphanemiz, eski Burdur evlerinin ahşap tavanlarındaki geometrik şiirsellikten, İnsuyu Mağarası’nın derinliklerindeki kristal sessizliğe kadar geniş bir imge dünyasına sahiptir. Burası, Akdeniz’in iç kesimlerinde yükselen vakur bir kültür adasıdır." },
    p3_front: { img: "", txt: "Modern dönemde Burdur; Mehmet Akif Ersoy Üniversitesi ve düzenlenen kültür-sanat çalıştaylarıyla, köklü geçmişini akademik bir derinlikle harmanlamaktadır. Şehir, son yıllarda Salda Gölü’nün dünya çapındaki popülaritesiyle birlikte, ekolojik edebiyat ve gezi yazarlığı konusunda yeni bir soluk kazanmıştır. Burdur’un sesi bugün, geleneksel sipsi sesini modern şiirin imge dünyasıyla buluşturan, sakin ama etkileyici bir tona sahiptir." },
    p3_back: { img: "", txt: "Bugün Burdur; Arkeoloji Müzesi’ndeki görkemli heykelleri, Salda’nın beyaz kumsalları ve Bucak’ın salebiyle yaşayan bir lezzet ve kültür durağıdır. Antik bir tiyatronun basamaklarında, batan güneşe karşı kitap okumak, binlerce yıl önceki bir seyirciyle aynı duyguda buluşmak demektir. Burdur’un kütüphanesini açmak; tarihin tozlu yollarında yürümek, Teke Yöresi’nin hür sesini duymak ve Anadolu’nun bu en bilge hikâyesini sessizce okumaktır." }
},
    "Bursa": {
    base: { img: "", txt: "Bursa, Osmanlı'nın kuruluş rüyasının görüldüğü, tarihin ve yeşilin iç içe geçtiği bir 'ruhaniyetli' şehirdir. Uludağ’ın heybetli gölgesinde yükselen bu kadim payitaht, Türk edebiyatında her zaman bir ilham merkezi olmuştur. Bursa edebiyatı; ipek böceklerinin sabrını, çınarların asaletini ve çarşılarındaki o bitmeyen hayat enerjisini taşır. Burası, her sokağında bir evliyanın veya bir şairin izine rastlayabileceğiniz, zamanın durduğu bir açık hava kütüphanesidir." },
    p1: { img: "", txt: "Bursa denince akla gelen en büyük edebi eser, Ahmet Hamdi Tanpınar’ın 'Beş Şehir' adlı deneme kitabındaki Bursa bölümüdür. Tanpınar, Bursa’yı 'ikinci bir zaman' olarak tanımlar; ona göre bu şehirde tarih, sadece geçmişte kalmamış, bugünün içine sinmiştir. 'Bursa’da Zaman' şiirinde dile getirdiği o mistik ve huzurlu atmosfer, şehrin edebi kimliğinin en zarif özetidir. Tanpınar’ın kaleminde Bursa, rüyalarla gerçeklerin birleştiği büyülü bir mekandır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, Osmanlı divan şiirinin ve tasavvufun kökleriyle örülüdür. Süleyman Çelebi’nin yazdığı ve İslam dünyasında büyük yankı uyandıran 'Vesiletü'n-Necat' (Mevlid), Bursa’nın manevi ikliminde doğmuştur. Ulu Cami’nin duvarlarından yankılanan bu dizeler, sadece dini bir metin değil, Türk dilinin ve estetiğinin en yüksek zirvelerinden biridir. Bursa, yüzyıllar boyunca şairlerin sultanı olmuş, medreseleriyle ilim ve sanatı aynı potada eritmiştir." },
    p2_back: { img: "", txt: "Bursa edebiyatı, aynı zamanda halkın neşesini ve toplumsal eleştiriyi de içinde barındırır. Gölge oyunu kahramanları Karagöz ve Hacivat’ın bu şehirde doğduğuna inanılır. Bu gelenek, Türk edebiyatında mizahın, hicvin ve halk anlatısının en önemli damarlarından birini oluşturur. Bursa’nın tarihi çarşılarında, hanlarında gelişen bu sözlü kültür, şehrin sadece saraylı değil, aynı zamanda halkın içinden gelen samimi bir edebi sese sahip olduğunu kanıtlar." },
    p3_front: { img: "", txt: "Modern edebiyatta Bursa; Nâzım Hikmet’in mahpusluk yıllarını geçirdiği ve 'Memleketimden İnsan Manzaraları' gibi dev eserlerin temellerini attığı şehirdir. Şehrin dokusu; sadece eski camilerle değil, fabrikalarla, tütün işçileriyle ve göçmen hikayeleriyle de zenginleşmiştir. Reşat Nuri Güntekin’in 'Çalıkuşu' romanındaki Feride’nin yolu da bu şehirden geçer. Bursa, hem klasik hem de modern anlatıların birbirini dışlamadan yaşadığı nadir şehirlerden biridir." },
    p3_back: { img: "", txt: "Bugün Bursa; uluslararası edebiyat günleri, devasa kütüphaneleri ve kitap fuarlarıyla Türkiye’nin en canlı kültür duraklarından biridir. Irgandı Köprüsü üstünde sanatı solumak veya Muradiye Külliyesi’nin sessizliğinde bir kitap sayfasını çevirmek, insanı tarihin kalbine götürür. Bursa’nın kütüphanesini açmak; ulu bir çınarın gölgesinde dinlenmek, ipekten dokunmuş mısraları okumak ve zamanın ruhaniyetli akışına kendinizi bırakmaktır." }
},
    "Çanakkale": {
    base: { img: "", txt: "Çanakkale, sadece iki kıtayı değil, tarihin en büyük destanlarını ve insanlık onurunu birbirine bağlayan bir boğaz şehridir. Antik Troya’dan Gelibolu’nun siperlerine kadar her karışı hikayelerle örülü olan bu topraklar, edebiyatımızda 'direnişin' ve 'ölümsüzlüğün' simgesidir. Çanakkale edebiyatı; rüzgarın boğazdan getirdiği hüzünlü ıslık, şehitliklerin sessiz duası ve Homeros’tan Mehmet Akif’e uzanan devasa bir anlatı köprüsüdür." },
    p1: { img: "", txt: "Çanakkale denince Türk edebiyatının zirve metni, Mehmet Akif Ersoy’un 'Çanakkale Şehitlerine' şiiridir. Akif, bu savaşın ruhunu; 'Vurulup tertemiz alnından uzanmış yatıyor / Bir hilal uğruna ya Rab ne güneşler batıyor' dizeleriyle tarihin hafızasına kazımıştır. Bu şiir, bir askeri başarının ötesinde, bir milletin varoluş iradesini ve kutsal değerlerini savunuşunu anlatan epik bir başyapıttır. Çanakkale, Akif’in kaleminde bir şehirden çok bir mabet haline gelmiştir." },
    p2_front: { img: "", txt: "Şehrin edebi kökleri, Batı edebiyatının ilk büyük eseri kabul edilen Homeros’un 'İlyada' destanına kadar uzanır. Troya Savaşı'nın yaşandığı bu topraklar; aşkın, ihanetin ve kahramanlığın evrensel temalarının dünyaya yayıldığı yerdir. Antik kentin kalıntıları arasında dolaşırken duyulan rüzgar, binlerce yıl öncesinin efsanelerini bugünün modern yazarlarına fısıldamaya devam eder. Çanakkale, antik çağın mitolojisiyle modern çağın destanını aynı coğrafyada birleştirir." },
    p2_back: { img: "", txt: "Çanakkale, aynı zamanda bir 'mektuplar ve hatıratlar' şehridir. Cepheden yazılan ve birçoğu hiç ulaşamayan hüzünlü mektuplar, askerlerin günlükleri ve siper aralarında karalanan şiirler; bu şehrin en saf ve en gerçek edebi belgeleridir. Bu metinlerde savaşın sadece stratejik boyutu değil, insanın korkusu, hasreti ve sarsılmaz inancı anlatılır. Çanakkale kütüphanesi, bu isimsiz kahramanların samimi ve hüzünlü sesleriyle dopdoludur." },
    p3_front: { img: "", txt: "Modern dönemde Çanakkale; Buket Uzuner’den Turgut Özakman’a kadar pek çok yazarın 'vatan' ve 'insan' temalarını işlediği bir merkezdir. Gelibolu Yarımadası’ndaki şehitlikler ve Anzak koyu, edebiyatımızda barışın ve ortak acıların diliyle yeniden kurgulanır. Şehir, savaşın dehşetinden dostlukların doğduğu bir anlatı alanına dönüşmüştür. 'Dur Yolcu!' nidası, bugün sadece bir karşılama değil, herkesi tarihin derinliğini düşünmeye davet eden edebi bir duruştur." },
    p3_back: { img: "", txt: "Bugün Çanakkale; üniversitesi, boğaz kıyısındaki kütüphaneleri ve kültür merkezleriyle yaşayan bir düşünce limanıdır. Kordon boyunda denize karşı bir kitap okumak, bir yanıyla tarihin akışını değiştiren gemileri hayal etmek, diğer yanıyla özgürlüğün tadını çıkarmaktır. Çanakkale’nin kütüphanesini açmak; bir devrin battığı ama insanlık onurunun göğe yükseldiği o muazzam hikayeye tanıklık etmek ve her mısrada bir kahramanın sesini duymaktır." }
},
    "Çankırı": {
    base: { img: "", txt: "Çankırı, İç Anadolu’nun sessiz ama derin ruhlu şehri, kadim geleneklerin ve sarsılmaz bir misafirperverliğin kalesidir. Tuz mağaralarının serinliğinden yükselen bu şehir, edebiyatımızda 'Yaran Kültürü' ile özdeşleşmiştir. Burası; dostluğun, edebin ve sözün namus sayıldığı bir ocaktır. Çankırı edebiyatı, sadece yazılı metinlerden değil, yüzyıllardır yaran odalarında yankılanan hikmetli sözlerden ve halkın ortak vicdanından beslenen bir hayat okuludur." },
    p1: { img: "", txt: "Çankırı’nın edebi ve sosyal dokusunun temelini 'Yaranlık' teşkil eder. Bu kültür, Türk edebiyatındaki 'Fütüvvet' ve 'Ahilik' geleneğinin günümüze ulaşan en canlı halkasıdır. Yaran meclislerinde anlatılan kıssalar, okunan şiirler ve yapılan nükteli sohbetler; şehre has bir edebi disiplin ve zarafet kazandırmıştır. Bu meclisler, birer halk üniversitesi gibi çalışarak hem dili korumuş hem de toplumsal ahlakı edebi bir estetikle harmanlamıştır." },
    p2_front: { img: "", txt: "Şehrin edebi hafızasında, Milli Mücadele’nin lojistik kalbi olan 'İstiklal Yolu'nun silinmez izleri vardır. İnebolu’dan Ankara’ya cephane taşıyan kağnıların gıcırtısı, Çankırı sokaklarında birer hürriyet şiirine dönüşmüştür. Şerife Bacıların fedakarlığı, bu topraklarda yazılan pek çok romanın ve epik şiirin ana temasını oluşturur. Çankırı, vatan sevgisinin kelimelere sığmayan o sessiz ve vakur direnişinin edebi merkezlerinden biridir." },
    p2_back: { img: "", txt: "Çankırı edebiyatı denince akla gelen en özgün mekanlardan biri de Tuz Mağarası’dır. Binlerce yıllık kaya tuzu yatakları, yazarlar için hem mistik bir atmosfer hem de zamansızlığın bir sembolü olmuştur. Şehrin yerel anlatılarında tuz; bereketin, saflığın ve korunması gereken değerlerin simgesidir. Kaya tuzunun sertliği ile halkın yumuşak kalbi arasındaki tezat, bölge şairlerinin mısralarında sıkça işlenen, kendine has bir estetik imge oluşturur." },
    p3_front: { img: "", txt: "Modern dönemde Çankırı, yetiştirdiği yerel kalemler ve halk ozanlarıyla Anadolu’nun sesini duyurmaya devam eder. Şehrin kalesi, tarihi evleri ve Ilgaz Dağı’nın heybeti; şiirlerde bazen bir sığınak bazen de ulaşılamaz bir ideal olarak tasvir edilir. Özellikle 'Ilgaz, Anadolu’nun sen yüce bir dağısın' dizeleriyle çocukluktan itibaren zihinlere kazınan bu coğrafya, edebiyatımızda doğanın en görkemli ve dost yüzlerinden biri olarak kabul edilir." },
    p3_back: { img: "", txt: "Bugün Çankırı; kütüphaneleri, yaşayan yaran odaları ve tuz kokulu sokaklarıyla kültürel mirasını geleceğe taşımaktadır. Tarihi Buğday Pazarı Medresesi’nde bir çay eşliğinde kitap okumak, geçmişin o ağırbaşlı ve bilge dünyasına kapı aralamak demektir. Çankırı’nın kütüphanesini açmak; dostluk meclisine davet edilmek, toprağın tuzuna ve insanın sözüne olan güveni yeniden tazelemektir." }
},
    "Çorum": {
    base: { img: "", txt: "Çorum, Anadolu’nun kalbinde Hitit Güneşi’nin hala parladığı, tarihin en eski yazılı anlaşmalarına ev sahipliği yapmış bir medeniyetler harmanıdır. Hattuşa’nın devasa taşlarından süzülüp gelen o kadim ruh, şehrin edebi kimliğini hem çok eski hem de çok sağlam kılmıştır. Çorum edebiyatı; bir yanıyla binlerce yıllık tabletlerin sessiz çığlığı, diğer yanıyla ise Anadolu insanının o neşeli, çalışkan ve misafirperver sesinin kağıda dökülmüş halidir." },
    p1: { img: "", txt: "Çorum’un edebi hafızası, insanlık tarihinin ilk yazılı barış antlaşması olan 'Kadeş' ile başlar. Bu topraklar, sözün sadece havada kalmadığı, taşa kazınarak ölümsüzleştiği bir yerdir. Hititlerin adalet anlayışı, duaları ve kral mektupları; Çorum edebiyatının temelini oluşturan en eski metinlerdir. Bu köklü miras, bugünün yazarları için de geçmişin bilgeliğini bugüne taşıyan, dünyada eşi benzeri olmayan bir edebi ilham kaynağıdır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, halk edebiyatının en lirik örnekleriyle zenginleşmiştir. Çorumlu şairler ve ozanlar; Menderes boyundaki tarlalardan, şehrin tarihi saat kulesine kadar her köşeyi mısralarına taşımışlardır. 'Leblebi' sadece bir yiyecek değil, Çorum edebiyatında bolluğun ve bereketin simgesidir. Çarşıların o kendine has ritmi, yerel ağızla anlatılan fıkralar ve sıcak insan hikayeleri, Çorum kütüphanesinin en samimi sayfalarını oluşturur." },
    p2_back: { img: "", txt: "Modern Türk edebiyatında Çorum, özellikle toplumsal gerçekçiliğin ve yerel kültürü evrenselleştiren kalemlerin odağındadır. Kemal Tahir gibi dev yazarların bu topraklara olan ilgisi ve eserlerinde bölge insanının karakter yapısını işlemesi, Çorum’u edebi bir çekim merkezi haline getirmiştir. Şehrin tarihi konakları ve kalesi; geçmişle bugün arasındaki çatışmaların, aşkların ve toplumsal değişimlerin anlatıldığı romanlar için en doğal dekor olmuştur." },
    p3_front: { img: "", txt: "Çorum edebiyatı aynı zamanda hoşgörü ve inanç turizminin de sesidir. Hacı Bektaş-ı Veli geleneğinin bu topraklardaki izdüşümleri ve yerel dervişlerin deyişleri, şehre mistik bir derinlik katar. Yazılıkaya’daki tanrı kabartmalarının karşısında duyulan o huşu, şairlerin kaleminde bazen bir yakarışa bazen de varoluşun sorgulandığı derin felsefi metinlere dönüşür. Çorum, kadim inançların ve modern düşüncenin bir arada yaşadığı edebi bir kavşaktır." },
    p3_back: { img: "", txt: "Bugün Çorum; modern kütüphaneleri, arkeoloji müzesindeki sessiz anlatıları ve her yıl düzenlenen Hitit Festivali ile kültürel canlılığını korumaktadır. Bir Hitit aslanının gölgesinde veya restore edilmiş bir konakta kitap okumak, zamanı binlerce yıl geriye sarmak demektir. Çorum’un kütüphanesini açmak; tarihin ilk satırlarını okumak, Hitit güneşinin altında ısınmak ve Anadolu’nun sönmeyen o büyük kültür ateşine tanıklık etmektir." }
},
    "Denizli": {
    base: { img: "", txt: "Denizli, Ege’nin iç kesimlerinde bir inci gibi parlayan, beyaz travertenleri ve köklü sanayi kültürüyle Anadolu’nun en dinamik şehirlerinden biridir. Adı her ne kadar denizi çağrıştırsa da, bu şehir aslında 'bereketli suların' ve 'üretimin' vatanıdır. Denizli edebiyatı; antik çağın şifalı sularından dökülen efsanelerle, dokuma tezgahlarında ilmek ilmek işlenen halk hikayelerinin eşsiz bir birleşimidir." },
    p1: { img: "", txt: "Denizli’nin edebi ve tarihi simgesi, haksızlığa karşı dimdik duruşuyla bilinen meşhur horozudur. Bu figür, yerel edebiyatta sadece bir hayvan değil; çalışkanlığın, uyanışın ve mertliğin sembolüdür. Şehrin her sabah yankılanan bu sesi, şairlerin kaleminde Anadolu’nun dirilişine ve sabaha olan umuda dönüşür. Denizli, sesini ve sözünü sakınmayan, vakur bir duruşun edebi kalesidir." },
    p2_front: { img: "", txt: "Şehrin edebi kökleri, Pamukkale’nin hemen yanı başındaki Hierapolis ve Laodikeia antik kentlerine uzanır. Epiktetos gibi 'özgürlük ve irade' üzerine derinleşen filozofların bu topraklardan geçmesi, Denizli’ye antik bir bilgelik katmıştır. Tiyatroların basamaklarında yankılanan eski zaman anlatıları, modern Denizli yazarları için hala taptaze bir esin kaynağıdır. Beyaz travertenler ise edebiyatımızda saflığın ve doğanın sunduğu en büyük şiirin somut hali olarak tasvir edilir." },
    p2_back: { img: "", txt: "Denizli edebiyatı, aynı zamanda 'alın terinin' ve 'zanaatın' edebiyatıdır. Babadağ ve Buldan’da yüzyıllardır süregelen dokumacılık geleneği, sayısız halk hikayesine ve modern romana konu olmuştur. Tezgahların ritmi, bir yazarın kaleminin kağıttaki hareketi gibidir. İşçi ailelerin yaşamları, göç hikayeleri ve el emeğinin kutsallığı, Denizli’nin toplumsal gerçekçi edebiyatındaki en güçlü damarları oluşturur." },
    p3_front: { img: "", txt: "Şehrin manevi ikliminde, halk edebiyatının ve tasavvufun izlerini taşıyan 'Yatağan Baba' gibi erenlerin hikayeleri önemli yer tutar. Milli Mücadele döneminde Müftü Ahmet Hulusi Efendi’nin yaktığı direniş meşalesi, Denizli’nin edebi hafızasında vatanseverliğin en yüksek mertebesi olarak işlenir. Şehir, hem dünyevi üretimin hem de manevi derinliğin aynı satırlarda buluşabildiği ender coğrafyalardan biridir." },
    p3_back: { img: "", txt: "Bugün Denizli; modern kütüphaneleri, tiyatro festivalleri ve kültürel etkinlikleriyle Ege’nin entelektüel lokomotiflerinden biridir. Pamukkale’nin beyaz basamaklarında oturup bir kitap okumak, hem suyun sesini hem de tarihin fısıltısını duymak demektir. Denizli’nin kütüphanesini açmak; üretimin gücüne tanık olmak, antik bir bilgeliği selamlamak ve Anadolu’nun çalışkan ruhuyla kucaklaşmaktır." }
},
    "Diyarbakır": {
    base: { img: "", txt: "Diyarbakır, surlarının heybeti ve Dicle’nin bereketiyle yoğrulmuş, tarihin ve edebiyatın en görkemli buluşma noktalarından biridir. 33 medeniyete ev sahipliği yapmış bu kadim şehir, edebiyatımızda 'sözün ve kalemin kalesi' olarak anılır. Siyah bazalt taşların sertliği ile içindeki insanların sıcaklığı arasındaki o eşsiz denge; Diyarbakır’ı şairlerin, dengbejlerin ve düşünürlerin bitip tükenmeyen ilham kaynağı haline getirmiştir." },
    p1: { img: "", txt: "Diyarbakır edebiyatı denince akla gelen ilk isimlerden biri, 'Hasretinden Prangalar Eskittim' ile gönüllere taht kuran Ahmed Arif’tir. Onun şiirlerinde Diyarbakır; delikanlı bir duruşun, mertliğin ve Anadolu’nun dertli ama vakur sesidir. Cahit Sıtkı Tarancı ise bu şehrin çocukluk hatıralarını ve 'Otuz Beş Yaş'ın melankolisini mısralarına taşımıştır. Bu şehir, Türk şiirinin en güçlü damarlarından biri olarak edebiyat tarihimizde silinmez bir iz bırakmıştır." },
    p2_front: { img: "", txt: "Diyarbakır, sadece modern şiirin değil, 'Dengbejlik' geleneğiyle sözlü edebiyatın da dünya çapındaki merkezidir. Dengbejlerin 'divan' adını verdikleri meclislerde saatlerce süren destanlar, aşklar ve göç hikayeleri; Mezopotamya’nın kolektif hafızasını diri tutar. Bu anlatılar, yazının icadından çok önce bu topraklarda başlayan edebi yolculuğun, bugün hala yaşayan en canlı ve en etkileyici kanıtıdır." },
    p2_back: { img: "", txt: "Şehrin edebi dokusunda dinler ve diller arası zenginlik büyük yer tutar. Ulu Cami’nin avlusundan Meryem Ana Kilisesi’nin sessizliğine kadar her köşe, farklı kültürlerin birbirine karıştığı edebi bir mozaiktir. Sezai Karakoç’un mistik şiir dünyasından Ziya Gökalp’in sosyolojik yaklaşımlarına kadar pek çok farklı fikir bu iklimde filizlenmiştir. Diyarbakır; dogudan batıya, kadimden moderne uzanan devasa bir düşünce köprüsüdür." },
    p3_front: { img: "", txt: "Diyarbakır küçeleri (dar sokakları) ve tarihi konakları, pek çok romana ve öyküye ev sahipliği yapmıştır. Hevsel Bahçeleri’nden esen rüzgar, yazarların kaleminde bazen bir özgürlük şarkısı bazen de hüzünlü bir hatıra olarak yankılanır. Şehrin tarihi hanlarında içilen kaçak çay eşliğinde yapılan edebiyat sohbetleri, Diyarbakır’ın sadece bir tarih şehri değil, her an üreten ve tartışan bir kültür şehri olduğunu kanıtlar." },
    p3_back: { img: "", txt: "Bugün Diyarbakır; bölgenin en büyük kitap fuarları, kütüphaneleri ve sanat festivalleriyle edebi mirasını geleceğe taşımaktadır. Tarihi surların üzerinde Dicle’ye karşı bir kitap okumak, zamanın ötesinde bir yolculuğa çıkmak demektir. Diyarbakır’ın kütüphanesini açmak; bazalt taşların hikayesini dinlemek, Ahmed Arif ile hasret çekmek ve Mezopotamya’nın bitmeyen o destansı sesine ortak olmaktır." }
},
    "Edirne": {
    base: { img: "", txt: "Edirne, Osmanlı İmparatorluğu'na yüzyıllarca payitahtlık yapmış, Avrupa’ya açılan kapımız ve Rumeli’nin edebi başkentidir. Selimiye’nin gölgesinde yükselen bu şehir, Türk edebiyatında zarafetin, tarihin ve sınırın simgesidir. Nehirlerin (Meriç, Tunca, Arda) nazlı akışıyla şekillenen Edirne, her bir köşesinde bir sultanın fermanını, bir şairin gazelini veya bir halk ozanının Balkan özlemini saklayan canlı bir kültür müzesidir." },
    p1: { img: "", txt: "Edirne edebiyatı denince akla gelen en görkemli 'metin', aslında taştan bir şiir olan Selimiye Camii’dir. Mimar Sinan’ın 'ustalık eserim' dediği bu yapı, klasik Türk sanatının ve edebiyatının estetik zirvesini temsil eder. Şehir, Divan edebiyatının en parlak dönemlerini burada yaşamış; şairler, bu caminin minarelerini ve Edirne’nin bahçelerini mısralarında cennetin yeryüzündeki yansıması olarak tasvir etmiştir." },
    p2_front: { img: "", txt: "Edirne, aynı zamanda Balkan edebiyatının Anadolu’daki sesidir. Rumeli’den gelen göçlerin, ayrılıkların ve vatan hasretinin en derin işlendiği yer burasıdır. Şehrin dar sokaklarında ve eski konaklarında yankılanan Balkan türküleri, aslında birer sözlü edebiyat şaheseridir. Edirne; hüznü ve neşeyi aynı potada eriten, hıdrellez ateşinde umudu, gurbet türkülerinde ise dinmeyen bir sızıyı anlatan özel bir edebi coğrafyadır." },
    p2_back: { img: "", txt: "Kırkpınar’ın yiğitlik destanları, Edirne’nin sadece bir tarih şehri değil, aynı zamanda bir kahramanlık anlatısı merkezi olduğunu kanıtlar. Pehlivanların er meydanındaki mücadelesi, halk edebiyatında mertliğin ve gücün sembolü olarak işlenmiştir. Ayrıca Edirne’nin meşhur çarşıları ve el sanatları, bölge yazarları için toplumsal hayatın ve zanaatkarlığın en renkli detaylarını sunan birer hikaye deposu gibidir." },
    p3_front: { img: "", txt: "Modern edebiyatta Edirne; bir sınır şehri olmanın getirdiği o çok kültürlü ve melankolik havayla yer alır. Ahmet Hamdi Tanpınar’dan günümüz yazarlarına kadar pek çok isim, Edirne’nin 'huzurlu ve vakur' yalnızlığını kaleme almıştır. Nehir kenarındaki çay bahçelerinde yapılan edebiyat sohbetleri, şehrin entelektüel damarını besleyen en önemli unsurdur. Burası, her adımda tarihin tozlu sayfalarından modern bir romanın içine düşebileceğiniz bir şehirdir." },
    p3_back: { img: "", txt: "Bugün Edirne; Trakya Üniversitesi'nin dinamizmi, kütüphaneleri ve her yıl düzenlenen kitap fuarlarıyla kültürel bir çekim merkezidir. Meriç Köprüsü üzerinde gün batımını izlerken bir kitap okumak, hem Doğu’nun hem de Batı’nın ruhuna aynı anda dokunmak demektir. Edirne’nin kütüphanesini açmak; bir payitahtın asaletine şahitlik etmek, Rumeli rüzgarını teninde hissetmek ve tarihin en zarif cümlelerini yerinde duymaktır." }
},
   "Elazığ": {
    base: { img: "", txt: "Elazığ, tarihin ve kültürün harmanlandığı kadim Harput’un varisidir. Fırat Nehri’nin bereketiyle sulanan bu topraklar, edebiyatımızda mertliğin, misafirperverliğin ve derin bir musiki anlayışının sembolüdür. Elazığ edebiyatı; Harput Kalesi’nin burçlarından yükselen hüzünlü mayaların, üzüm bağlarının kokusuyla karışan halk hikayelerinin ve 'Gakgoş' ruhunun o vakur duruşunun kağıda dökülmüş halidir." },
    p1: { img: "", txt: "Elazığ’ın edebi ruhu, kelimenin tam anlamıyla 'Harput' üzerine kuruludur. Şiirle musikinin iç içe geçtiği bu topraklarda, her gazel bir hikaye, her türkü bir şiirdir. Harput Musikisi, Türk edebiyatında sözün sesle buluştuğu en yüksek zirvelerden biri kabul edilir. Şairlerin kaleminde Harput; bir yanıyla ulaşılmaz bir kale, diğer yanıyla terk edilmiş bir sevgilinin hüznünü taşıyan, yaşayan bir efsanedir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda 'Hazar Şiir Akşamları'nın çok özel bir yeri vardır. Uluslararası boyutta düzenlenen bu etkinlikler, Elazığ’ı sadece Türkiye’nin değil, Türk dünyasının bir edebiyat köprüsü haline getirmiştir. Hazar Gölü’nün kıyısında yankılanan mısralar, bu şehrin sadece geçmişine değil, geleceğin modern Türk şiirine de yön verme arzusunun en güçlü kanıtıdır. Burada şiir, rüzgarın göl yüzeyinde bıraktığı iz kadar naiftir." },
    p2_back: { img: "", txt: "Elazığ edebiyatı aynı zamanda bir 'mertlik ve kardeşlik' anlatısıdır. 'Gakgoş' kavramı, yerel yazarların ve şairlerin eserlerinde sadece bir hitap şekli değil; bir ahlak felsefesi, dürüstlük ve dayanışma sembolü olarak işlenir. Şehrin dar sokaklarından (küçelerinden) taşan bu samimi dil, halk edebiyatının en duru örneklerini sunar. Elazığlı yazarlar için insan sevgisi ve memleket aidiyeti, her satırın değişmez mürekkebidir." },
    p3_front: { img: "", txt: "Modern dönemde Elazığ; yetiştirdiği akademisyen şairler, gazeteciler ve romancılarla Anadolu’nun entelektüel merkezlerinden biridir. Çaydaçıra’nın ritmi, yazarların kurgularına bir tempo kazandırırken; tarihi Ulu Cami ve eğik minaresi, mistik ve metafizik derinlik arayan kalemler için birer imge deposu olur. Şehir, köklü Harput geleneğini modern bir kentsel kimlikle birleştiren edebi bir laboratuvar gibidir." },
    p3_back: { img: "", txt: "Bugün Elazığ; kütüphaneleri, üniversitesinin kültürel birikimi ve edebiyat dergileriyle Anadolu’nun sesini gür bir şekilde duyurmaktadır. Harput’un balkonundan ovaya bakarken bir kitap okumak, binlerce yıllık bir mirası solumak demektir. Elazığ’ın kütüphanesini açmak; bir yanıyla bir hoyratın içinde kaybolmak, diğer yanıyla bir Gakgoş’un sofrasına oturup en samimi hikayeleri en baştan dinlemektir." }
},
    "Erzincan": {
    base: { img: "", txt: "Erzincan, Munzur ve Keşiş dağlarının kuşattığı geniş bir ovada, Fırat’ın kollarından biri olan Karasu’nun bereketiyle nefes alan bir dayanışma şehridir. Tarih boyunca pek çok kez yıkılıp yeniden kurulan bu şehir, edebiyatımızda 'sabır' ve 'yeniden doğuş'un sembolüdür. Erzincan edebiyatı; dağların sertliğine inat insanın yumuşak kalbini, bakıra işlenen nakışların inceliğini ve tarlalarda yankılanan bereketli halk türkülerini barındırır." },
    p1: { img: "", txt: "Erzincan’ın edebi hafızasında, 1939 ve 1992 depremlerinin bıraktığı derin izler çok önemli bir yer tutar. Bu trajediler, yerel edebiyatta hüzünlü birer motif olmanın ötesinde, insanların birbirine olan bağlılığını ve yaşama sevincini anlatan metinlere dönüşmüştür. Nazım Hikmet’in 'Kara Haber' şiirinde dile getirdiği o sarsıcı tablo, Erzincan’ın acısını Türk edebiyatının ortak acısı haline getirmiş; şehri, yıkıntıların arasından umudu yeşerten bir anlatı merkezi yapmıştır." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, köklü bir 'Aşıklık ve Tasavvuf' geleneğiyle yoğrulmuştur. Terzi Baba gibi gönül sultanlarının manevi mirası, Erzincan’ın bilge ve alçakgönüllü karakterini şekillendirmiştir. Bu manevi iklim, şairlerin kaleminde nefislere hitap eden lirik bir dile dönüşür. Ayrıca, Erzincan'ın meşhur bakır işlemeciliği, sadece bir zanaat değil; bir yazarın kelimeleri özenle seçmesi gibi, sabrın ve dikkatin taşa ve metale dökülmüş edebi bir yansımasıdır." },
    p2_back: { img: "", txt: "Erzincan, aynı zamanda modern Türk hikayeciliğinin en büyük ustalarından Mustafa Kutlu’nun doğduğu topraklardır. Kutlu’nun hikayelerindeki o samimi kasaba hayatı, manevi derinlik ve doğa ile insan arasındaki kopmaz bağ; aslında Erzincan’ın ruhundan süzülüp gelen bir yansımadır. Onun eserlerinde hissedilen o 'uzun hikaye', bu coğrafyanın geniş ufuklarından ve insanının içtenliğinden beslenen evrensel bir Erzincan anlatısıdır." },
    p3_front: { img: "", txt: "Doğal güzellikleriyle de edebiyata ilham veren şehir; Kemaliye (Eğin) ilçesiyle başlı başına bir edebi mekan sunar. Karanlık Kanyon’un ürpertici görkemi ve tarihi evlerin zarafeti, yazarlar için gizemli ve mistik bir atmosfer oluşturur. Erzincan edebiyatı; tulum peynirinin tuzu, üzüm bağlarının tadı ve Fırat’ın coşkulu sesiyle, Anadolu’nun en sahici ve en gösterişsiz ama bir o kadar da etkileyici kütüphanelerinden birini oluşturur." },
    p3_back: { img: "", txt: "Bugün Erzincan; kütüphaneleri, üniversitesinin kültürel araştırmaları ve yerel festivalleriyle geçmişin mirasını geleceğe taşımaktadır. Girlevik Şelalesi’nin serinliğinde bir kitap sayfasını çevirmek, doğanın yazdığı o muazzam şiire eşlik etmek demektir. Erzincan’ın kütüphanesini açmak; sarsılmaz bir inançla hayata tutunmak, bir bakır ustasının titizliğiyle mısraları işlemek ve Munzur’un zirvelerinden esen o hür rüzgarı hissetmektir." }
},
    "Erzurum": {
    base: { img: "", txt: "Erzurum, deniz seviyesinden binlerce metre yüksekte, Palandöken’in eteklerinde yükselen bir 'direniş ve irfan' kalesidir. Anadolu’nun damı olarak bilinen bu kadim şehir, edebiyatımızda vakur duruşun, mertliğin ve manevi derinliğin sembolüdür. Erzurum edebiyatı; Çifte Minareli Medrese'nin taşlarındaki gizemden, dadaşların bar oyunundaki ritme ve soğuk kış gecelerinde soba başında anlatılan destanlara kadar uzanan köklü bir kütüphanedir." },
    p1: { img: "", txt: "Erzurum’un edebi ruhu denince akla gelen en büyük isim İbrahim Hakkı Hazretleri ve onun ölümsüz eseri 'Marifetname'dir. Tasavvuftan astronomiye, fizikten edebiyata kadar geniş bir yelpazeyi kapsayan bu eser, Erzurum’un sadece bir serhat şehri değil, aynı zamanda bir dünya bilim merkezi olduğunu kanıtlar. 'Mevla görelim neyler, neylerse güzel eyler' dizeleri, bu toprakların tevekkül ve huzur dolu felsefesini tüm dünyaya ilan etmiştir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusunda Milli Mücadele’nin çok özel bir yeri vardır. Erzurum Kongresi'nde alınan 'Vatan bir bütündür, parçalanamaz' kararı, Türk edebiyatında hitabet ve siyasi düşünce tarihinin en güçlü metinlerinden biridir. Bu şehir, bağımsızlık aşkıyla yanan şairlerin ve yazarların kaleminde bir 'kurtuluş kapısı' olarak tasvir edilir. Erzurum; kalemlerin vatan savunması için birer süngüye dönüştüğü o destansı günlerin şahididir." },
    p2_back: { img: "", txt: "Erzurum, halk edebiyatının 'Aşıklık Geleneği'nin en canlı yaşadığı merkezlerden biridir. Kahvehanelerinde hala yankılanan aşık atışmaları, dudağa değmezler ve koçaklamalar; Erzurum’un sözlü kütüphanesini diri tutar. Bu gelenek, dadaşlık kültürüyle birleşerek yiğitliği, cömertliği ve dürüstlüğü mısralara döker. Erzurum’un sokakları, her an bir ozanın sazından dökülen dertli bir uzun havaya ya da neşeli bir türküye ev sahipliği yapabilir." },
    p3_front: { img: "", txt: "Modern edebiyatta Erzurum; Ahmet Hamdi Tanpınar’ın 'Beş Şehir'inde anlattığı o 'eski zamanın içindeki' halinden, yerel yazarların kaleminden çıkan kar manzaralarına kadar geniş yer bulur. Şehrin soğuğu, yazarlar için sadece bir iklim olayı değil; sabrın, dayanıklılığın ve içe dönüşün bir metaforudur. Taş binaların serinliğinde yazılan şiirler, Palandöken’in beyazlığı kadar saf ve etkileyicidir." },
    p3_back: { img: "", txt: "Bugün Erzurum; üniversiteleri, devasa kütüphaneleri ve her yıl düzenlenen kitap fuarlarıyla Doğu Anadolu’nun en önemli kültür havzalarından biridir. Çifte Minareli Medrese’nin avlusunda kitap okumak, tarihin o ağırbaşlı ve bilge dünyasına konuk olmak demektir. Erzurum’un kütüphanesini açmak; bir dadaşla omuz omuza durmak, soğuğun içinde saklı o sıcak insan hikayelerini keşfetmek ve vatanın bölünmez bütünlüğünü her satırda hissetmektir." }
},
    "Eskişehir": {
    base: { img: "", txt: "Eskişehir, bozkırın ortasında bir vaha gibi yükselen, içinden nehir geçen ve her köşesinde sanatın soluk aldığı bir kültür başkentidir. Adı 'Eski' olsa da ruhu her zaman 'Yeni' olan bu şehir, edebiyatımızda aydınlanmanın, gençliğin ve hoşgörünün sembolüdür. Eskişehir edebiyatı; Yunus Emre’nin insan sevgisinden Nasreddin Hoca’nın keskin zekasına, demir yolu işçilerinin emeğinden üniversiteli gençlerin taze fikirlerine uzanan çok katmanlı bir anlatıdır." },
    p1: { img: "", txt: "Eskişehir’in edebi ruhunun en derin kökü, dünya hümanizminin öncüsü Yunus Emre’dir. 'Sevelim sevilelim' diyen o eşsiz ses, bu toprakların bağrından çıkarak evrensel bir barış diline dönüşmüştür. Onun duru Türkçesi ve kalbe dokunan şiirleri, Eskişehir’i sadece bir yerleşim yeri değil, manevi bir arınma merkezi yapar. Şehir, Yunus’un sevgi dolu felsefesiyle harmanlanmış, dili ve gönlü zengin bir kütüphanenin kalbidir." },
    p2_front: { img: "", txt: "Şehrin mizah ve zeka dolu bir başka edebi yüzü ise Nasreddin Hoca’dır. Sivrihisar’da doğan ve 'Dünyanın merkezi burasıdır' diyen Hoca, Türk edebiyatında hazırcevaplığın ve toplumsal eleştirinin en büyük ustasıdır. Onun fıkraları, Eskişehir insanının pratik zekasını, hayata karşı ironik ve bilge bakışını yansıtır. Eskişehir, kelimelerin hem güldürdüğü hem de derin derin düşündürdüğü o meşhur Anadolu mizahının anavatanıdır." },
    p2_back: { img: "", txt: "Eskişehir edebiyatı aynı zamanda bir 'şehirleşme ve demir yolu' edebiyatıdır. Cumhuriyet’in ilanından sonra demir yolu ağlarının merkezine yerleşen şehir, işçi hikayelerinin, göçmen anlatılarının ve modern Türkiye’nin gelişim sancılarının edebi laboratuvarı olmuştur. Lületaşının beyaz yumuşaklığına işlenen motifler gibi, yazarlar da bu şehrin dönüşümünü, Porsuk Çayı’nın kıyısındaki değişimleri ve Odunpazarı’nın tarihi dokusunu eserlerinde titizlikle işlemişlerdir." },
    p3_front: { img: "", txt: "Bugün Eskişehir, 'öğrenci şehri' kimliğiyle çağdaş edebiyatın ve sanatın en dinamik üretim merkezlerinden biridir. Tiyatroları, operaları ve sanat galerileriyle beslenen bu atmosfer, genç yazarlar için özgür bir düşünce alanı sunar. Porsuk kıyısında bir bankta oturan gençlerin tartıştığı bir şiir veya Odunpazarı’nın dar sokaklarında bir ressamın tuvaline düşen hikaye; Eskişehir’in sürekli yenilenen edebi çehresinin birer parçasıdır." },
    p3_back: { img: "", txt: "Eskişehir; devasa kütüphaneleri, yaşayan müzeleri ve her yıl düzenlenen uluslararası sanat festivalleriyle bir kültür vahasıdır. Sazova Parkı’ndaki masal şatosunun gölgesinde bir kitap okumak, hayal gücüyle gerçeğin birleştiği o büyülü ana ortak olmaktır. Eskişehir’in kütüphanesini açmak; Yunus ile dost olmak, Hoca ile gülümsemek ve bozkırın ortasında yeşeren o aydınlık geleceğin mısralarına dokunmaktır." }
},
    "Gaziantep": {
    base: { img: "", txt: "Gaziantep, tarihin sıfır noktasına komşu, İpek Yolu’nun kalbinde atan, emeğin ve lezzetin başkentidir. Antik Zeugma’nın gizemli mozaiklerinden yükselen bu şehir, edebiyatımızda 'direniş' ve 'bereket'in sarsılmaz sembolüdür. Gaziantep edebiyatı; hem Antep Kalesi’nin burçlarında yankılanan kahramanlık türkülerini hem de fıstık ağaçlarının gölgesinde anlatılan o köklü halk masallarını barındıran devasa bir kültürel hazinedir." },
    p1: { img: "", txt: "Gaziantep’in edebi ve tarihi kimliğinin omurgası, Fransız işgaline karşı sergilenen eşsiz 'Antep Savunması'dır. Şahin Beylerin, Karayılanların ve isimsiz binlerce kahramanın yazdığı bu destan, Türk edebiyatında bağımsızlık aşkının en somutlaştığı metinlere ilham olmuştur. Nazım Hikmet’in 'Kuvayı Milliye Destanı'nda yer alan Antepli Karayılan hikayesi, şehrin o cesur ve boyun eğmez ruhunun edebi zirvesidir. Bu şehir, mısraların barutla, kelimelerin kanla yazıldığı bir hürriyet kütüphanesidir." },
    p2_front: { img: "", txt: "Şehrin edebi dokusu, Zeugma’da bulunan 'Çingene Kızı' mozaiğinin o hüzünlü ve derin bakışları gibi gizemli ve köklüdür. Fırat’ın kıyısında yükselen bu kadim miras, modern Gaziantep yazarları için geçmişin estetiğini bugüne taşıyan bir ilham pınarıdır. Antik dünyanın mitolojik anlatıları ile Mezopotamya’nın masalsı atmosferi, şehrin edebi çehresini evrensel bir boyuta taşır. Burası, taşın üzerine işlenen sanatın, kağıda dökülen kelimeyle kardeş olduğu bir yerdir." },
    p2_back: { img: "", txt: "Gaziantep edebiyatı aynı zamanda bir 'esnaf ve zanaat' edebiyatıdır. Bakırcılar Çarşısı’ndaki çekiç sesleri, bir şairin dizesindeki vezin gibidir; ritmik, sabırlı ve usta işi. Şehrin meşhur mutfak kültürü ise sadece mideye değil, edebiyata da hitap eder. Yemek tariflerinin içine gizlenmiş hayat hikayeleri, bereketli sofralarda yapılan uzun sohbetler ve yerel ağızla anlatılan fıkralar, Gaziantep’in yaşayan sözlü kütüphanesini her daim diri ve iştah açıcı tutar." },
    p3_front: { img: "", txt: "Modern dönemde Gaziantep; yetiştirdiği romancılar, oyun yazarları ve şairlerle Anadolu’nun en güçlü kalem merkezlerinden biridir. Şehrin dar sokaklarındaki tarihi evler, modern anlatıların en gizemli dekorları olurken; sanayinin ve ticaretin getirdiği hızlı değişim, toplumsal gerçekçi edebiyatın ana konularını oluşturur. Gaziantep, geleneksel ile modernin çatışmasını değil, bu iki dünyanın muazzam uyumunu edebi bir dille anlatmayı başarmış nadir şehirlerdendir." },
